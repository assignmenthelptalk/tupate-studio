  <rect x="306" y="165" width="188" height="42" fill="#16213E" rx="5"/>
  <text x="326" y="183" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#E94560">Title Tags</text>
  <text x="326" y="199" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#CCCCCC">Keyword + location + brand</text>

  <rect x="306" y="215" width="188" height="42" fill="#16213E" rx="5"/>
  <text x="326" y="233" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#E94560">Content Depth</text>
  <text x="326" y="249" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#CCCCCC">Topical coverage + EAV</text>

  <rect x="306" y="265" width="188" height="42" fill="#16213E" rx="5"/>
  <text x="326" y="283" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#E94560">Heading Hierarchy</text>
  <text x="326" y="299" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#CCCCCC">H1 → H2 → H3 structure</text>

  <rect x="306" y="315" width="188" height="42" fill="#16213E" rx="5"/>
  <text x="326" y="333" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#E94560">Images</text>
  <text x="326" y="349" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#CCCCCC">Alt text + WebP format</text>

  <rect x="306" y="365" width="188" height="42" fill="#16213E" rx="5"/>
  <text x="326" y="383" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#E94560">Meta Descriptions</text>
  <text x="326" y="399" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#CCCCCC">Click-through optimised</text>

  <rect x="306" y="415" width="188" height="42" fill="#16213E" rx="5"/>
  <text x="326" y="433" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#E94560">Internal Linking</text>
  <text x="326" y="449" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#CCCCCC">Contextual bridges between pages</text>

