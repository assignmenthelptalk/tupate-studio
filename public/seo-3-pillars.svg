<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" width="100%" height="auto" role="img" aria-labelledby="infographic-title-2">
  <title id="infographic-title-2">How Google Ranks Kenyan Business Websites: 3-Pillar SEO Framework</title>

  <!-- Background -->
  <rect width="800" height="620" fill="#F5F5F5" rx="12"/>

  <!-- Header band -->
  <rect width="800" height="80" fill="#1A1A2E" rx="12"/>
  <rect x="0" y="68" width="800" height="12" fill="#1A1A2E"/>
  <text x="400" y="36" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#FFFFFF">How Google Ranks Kenyan Business Websites</text>
  <text x="400" y="60" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#E94560">The 3-Pillar SEO Framework</text>

  <!-- Pillar 1 - Technical SEO -->
  <rect x="40" y="100" width="218" height="380" fill="#1A1A2E" rx="8"/>
  <rect x="40" y="100" width="218" height="50" fill="#0F3460" rx="8"/>
  <rect x="40" y="130" width="218" height="20" fill="#0F3460"/>
  <text x="149" y="132" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">01</text>
  <text x="149" y="148" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">Technical SEO</text>

  <!-- Pillar 1 items -->
  <rect x="55" y="165" width="188" height="42" fill="#16213E" rx="5"/>
  <text x="75" y="183" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#E94560">Crawlability</text>
  <text x="75" y="199" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#CCCCCC">robots.txt + XML sitemap</text>

  <rect x="55" y="215" width="188" height="42" fill="#16213E" rx="5"/>
  <text x="75" y="233" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#E94560">Core Web Vitals</text>
  <text x="75" y="249" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#CCCCCC">LCP, INP, CLS scores</text>

  <rect x="55" y="265" width="188" height="42" fill="#16213E" rx="5"/>
  <text x="75" y="283" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#E94560">Schema Markup</text>
  <text x="75" y="299" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#CCCCCC">LocalBusiness, Product JSON-LD</text>

  <rect x="55" y="315" width="188" height="42" fill="#16213E" rx="5"/>
  <text x="75" y="333" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#E94560">HTTPS Security</text>
  <text x="75" y="349" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#CCCCCC">SSL + secure hosting</text>

  <rect x="55" y="365" width="188" height="42" fill="#16213E" rx="5"/>
  <text x="75" y="383" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#E94560">Mobile-First Index</text>
  <text x="75" y="399" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#CCCCCC">Responsive + fast on 4G</text>

  <rect x="55" y="415" width="188" height="42" fill="#16213E" rx="5"/>
  <text x="75" y="433" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#E94560">URL Structure</text>
  <text x="75" y="449" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#CCCCCC">Clean, descriptive slugs</text>

