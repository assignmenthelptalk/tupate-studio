  <rect x="557" y="165" width="188" height="42" fill="#16213E" rx="5"/>
  <text x="577" y="183" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#E94560">Google Business Profile</text>
  <text x="577" y="199" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#CCCCCC">Verified + fully optimised</text>

  <rect x="557" y="215" width="188" height="42" fill="#16213E" rx="5"/>
  <text x="577" y="233" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#E94560">NAP Citations</text>
  <text x="577" y="249" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#CCCCCC">Consistent across directories</text>

  <rect x="557" y="265" width="188" height="42" fill="#16213E" rx="5"/>
  <text x="577" y="283" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#E94560">Customer Reviews</text>
  <text x="577" y="299" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#CCCCCC">4.5★+ on Google Maps</text>

  <rect x="557" y="315" width="188" height="42" fill="#16213E" rx="5"/>
  <text x="577" y="333" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#E94560">Location Pages</text>
  <text x="577" y="349" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#CCCCCC">Nairobi, Mombasa, Kisumu…</text>

  <rect x="557" y="365" width="188" height="42" fill="#16213E" rx="5"/>
  <text x="577" y="383" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#E94560">Local Keywords</text>
  <text x="577" y="399" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#CCCCCC">"[service] in Nairobi Kenya"</text>

  <rect x="557" y="415" width="188" height="42" fill="#16213E" rx="5"/>
  <text x="577" y="433" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#E94560">Google Maps Embed</text>
  <text x="577" y="449" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#CCCCCC">On contact + service pages</text>

  <!-- Base of pillars (foundation) -->
  <rect x="40" y="480" width="720" height="8" fill="#1A1A2E" rx="2"/>

  <!-- Arrow upward result -->
  <rect x="180" y="505" width="440" height="60" fill="#1A1A2E" rx="8"/>
  <!-- Arrow -->
  <polygon points="400,500 380,520 390,520 390,505 410,505 410,520 420,520" fill="#E94560"/>
  <text x="400" y="533" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">Higher Rankings on Google.co.ke</text>
  <text x="400" y="553" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#CCCCCC">More Kenyan customers find your business first</text>

  <!-- Footer -->
  <text x="400" y="606" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#999999">tupate.studio</text>
</svg>
