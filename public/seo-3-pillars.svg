  <rect x="291" y="100" width="218" height="380" fill="#1A1A2E" rx="8"/>
  <rect x="291" y="100" width="218" height="50" fill="#E94560" rx="8"/>
  <rect x="291" y="130" width="218" height="20" fill="#E94560"/>
  <text x="400" y="132" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">02</text>
  <text x="400" y="148" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">On-Page SEO</text>

