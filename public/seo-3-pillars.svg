  <rect x="542" y="100" width="218" height="380" fill="#1A1A2E" rx="8"/>
  <rect x="542" y="100" width="218" height="50" fill="#16213E" rx="8"/>
  <rect x="542" y="130" width="218" height="20" fill="#16213E"/>
  <line x1="542" y1="100" x2="760" y2="100" stroke="#4A90D9" stroke-width="3"/>
  <text x="651" y="132" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#4A90D9">03</text>
  <text x="651" y="148" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">Local SEO</text>

