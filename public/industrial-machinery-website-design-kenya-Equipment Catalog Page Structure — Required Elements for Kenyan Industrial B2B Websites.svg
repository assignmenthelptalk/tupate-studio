  <text x="96" y="836" text-anchor="middle" fill="#888" font-size="7">Quality Mgmt</text>

  <rect x="154" y="810" width="96" height="34" rx="4" fill="#F5F5F5" stroke="#1A1A2E" stroke-width="0.8"/>
  <text x="202" y="824" text-anchor="middle" fill="#1A1A2E" font-size="8" font-weight="700">KEBS Approval</text>
  <text x="202" y="836" text-anchor="middle" fill="#888" font-size="7">Product Standards</text>

  <rect x="260" y="810" width="96" height="34" rx="4" fill="#F5F5F5" stroke="#1A1A2E" stroke-width="0.8"/>
  <text x="308" y="824" text-anchor="middle" fill="#1A1A2E" font-size="8" font-weight="700">NEMA Cert.</text>
  <text x="308" y="836" text-anchor="middle" fill="#888" font-size="7">Environmental</text>

  <rect x="366" y="810" width="96" height="34" rx="4" fill="#F5F5F5" stroke="#1A1A2E" stroke-width="0.8"/>
  <text x="414" y="824" text-anchor="middle" fill="#1A1A2E" font-size="8" font-weight="700">NCA Reg.</text>
  <text x="414" y="836" text-anchor="middle" fill="#888" font-size="7">Construction</text>

  <rect x="472" y="810" width="96" height="34" rx="4" fill="#F5F5F5" stroke="#1A1A2E" stroke-width="0.8"/>
  <text x="520" y="824" text-anchor="middle" fill="#1A1A2E" font-size="8" font-weight="700">KRA PIN</text>
  <text x="520" y="836" text-anchor="middle" fill="#888" font-size="7">Tax Compliance</text>

  <rect x="578" y="810" width="96" height="34" rx="4" fill="#F5F5F5" stroke="#1A1A2E" stroke-width="0.8"/>
  <text x="626" y="824" text-anchor="middle" fill="#1A1A2E" font-size="8" font-weight="700">County Permit</text>
  <text x="626" y="836" text-anchor="middle" fill="#888" font-size="7">Current Year</text>

  <rect x="684" y="810" width="80" height="34" rx="4" fill="#E94560"/>
  <text x="724" y="824" text-anchor="middle" fill="#FFFFFF" font-size="8" font-weight="700">IFMIS Reg.</text>
  <text x="724" y="836" text-anchor="middle" fill="#FFFFFF" font-size="7">Govt Tenders</text>

  <!-- RFQ Workflow -->
  <rect x="30" y="868" width="740" height="20" rx="4" fill="#E94560"/>
  <text x="400" y="883" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="700">RFQ WORKFLOW — FROM FORM TO FIRST RESPONSE</text>

  <rect x="30" y="894" width="740" height="55" rx="6" fill="#FFFFFF" stroke="#1A1A2E" stroke-width="1"/>
  <!-- Flow steps -->
  <rect x="48" y="905" width="100" height="30" rx="4" fill="#1A1A2E"/>
  <text x="98" y="918" text-anchor="middle" fill="#FFFFFF" font-size="7.5">Procurement Mgr</text>
  <text x="98" y="929" text-anchor="middle" fill="#FFFFFF" font-size="7.5">fills RFQ form</text>
  <line x1="148" y1="920" x2="168" y2="920" stroke="#E94560" stroke-width="2"/><polygon points="165,916 173,920 165,924" fill="#E94560"/>
  <rect x="175" y="905" width="110" height="30" rx="4" fill="#16213E"/>
  <text x="230" y="918" text-anchor="middle" fill="#FFFFFF" font-size="7.5">WhatsApp auto-reply</text>
  <text x="230" y="929" text-anchor="middle" fill="#FFFFFF" font-size="7.5">within 60 seconds</text>
  <line x1="285" y1="920" x2="305" y2="920" stroke="#E94560" stroke-width="2"/><polygon points="302,916 310,920 302,924" fill="#E94560"/>
  <rect x="312" y="905" width="110" height="30" rx="4" fill="#16213E"/>
  <text x="367" y="918" text-anchor="middle" fill="#FFFFFF" font-size="7.5">Sales CRM</text>
  <text x="367" y="929" text-anchor="middle" fill="#FFFFFF" font-size="7.5">notification</text>
  <line x1="422" y1="920" x2="442" y2="920" stroke="#E94560" stroke-width="2"/><polygon points="439,916 447,920 439,924" fill="#E94560"/>
  <rect x="449" y="905" width="110" height="30" rx="4" fill="#1A1A2E"/>
  <text x="504" y="918" text-anchor="middle" fill="#FFFFFF" font-size="7.5">"We respond to all</text>
  <text x="504" y="929" text-anchor="middle" fill="#FFFFFF" font-size="7.5">RFQs within 4hrs"</text>
  <line x1="559" y1="920" x2="579" y2="920" stroke="#E94560" stroke-width="2"/><polygon points="576,916 584,920 576,924" fill="#E94560"/>
  <rect x="586" y="905" width="150" height="30" rx="4" fill="#E94560"/>
  <text x="661" y="918" text-anchor="middle" fill="#FFFFFF" font-size="7.5" font-weight="700">Tender document ZIP</text>
  <text x="661" y="929" text-anchor="middle" fill="#FFFFFF" font-size="7.5" font-weight="700">available for download</text>

  <!-- Pricing note -->
  <rect x="30" y="958" width="360" height="50" rx="6" fill="#1A1A2E"/>
  <text x="210" y="976" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="700">INDUSTRIAL WEBSITE PRICING (KENYA)</text>
  <text x="210" y="991" text-anchor="middle" fill="#aaaacc" font-size="9">Brochure + static catalog (20 products): Ksh 35,000–50,000</text>
  <text x="210" y="1005" text-anchor="middle" fill="#E94560" font-size="9" font-weight="600">Custom DB catalog + RFQ workflow: from Ksh 80,000</text>

  <!-- SEO note -->
  <rect x="410" y="958" width="360" height="50" rx="6" fill="#E94560"/>
  <text x="590" y="976" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="700">SEO ADVANTAGE — KENYA INDUSTRIAL SERP</text>
  <text x="590" y="991" text-anchor="middle" fill="#FFFFFF" font-size="9">Most Kenyan industrial sites: slow WP, thin content, no spec pages</text>
  <text x="590" y="1005" text-anchor="middle" fill="#FFFFFF" font-size="9" font-weight="700">First-page rankings achievable in 3–6 months</text>

  <!-- Footer -->
  <text x="400" y="1068" text-anchor="middle" fill="#999" font-size="11">tupate.studio</text>
