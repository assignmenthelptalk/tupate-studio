  <line x1="98" y1="173" x2="400" y2="133" stroke="#E94560" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="240" y1="173" x2="400" y2="133" stroke="#E94560" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="382" y1="173" x2="400" y2="133" stroke="#E94560" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="524" y1="173" x2="400" y2="133" stroke="#E94560" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="684" y1="173" x2="400" y2="133" stroke="#E94560" stroke-width="0.8" stroke-dasharray="3,2"/>

