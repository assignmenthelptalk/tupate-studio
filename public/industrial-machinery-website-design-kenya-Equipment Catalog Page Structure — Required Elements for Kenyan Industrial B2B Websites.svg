  <!-- RIGHT COLUMN: 7 Critical Elements -->
  <text x="315" y="337" fill="#1A1A2E" font-size="11" font-weight="700">7 KENYA-SPECIFIC CATALOG REQUIREMENTS</text>

  <!-- Req 1 -->
  <rect x="310" y="344" width="460" height="56" rx="5" fill="#1A1A2E"/>
  <rect x="310" y="344" width="5" height="56" fill="#E94560"/>
  <circle cx="330" cy="356" r="9" fill="#E94560"/>
  <text x="330" y="360" text-anchor="middle" fill="#FFFFFF" font-size="9" font-weight="700">1</text>
  <text x="348" y="358" fill="#FFFFFF" font-size="9" font-weight="700">240V / 50Hz Compatibility (Non-negotiable)</text>
  <text x="348" y="372" fill="#aaaacc" font-size="8">Kenya standard — imported 110V/60Hz equipment will damage Kenyan infrastructure</text>
  <text x="348" y="386" fill="#E94560" font-size="8" font-weight="600">Procurement managers filter for this BEFORE requesting a quote</text>

  <!-- Req 2 -->
  <rect x="310" y="406" width="460" height="50" rx="5" fill="#FFFFFF" stroke="#1A1A2E" stroke-width="1"/>
  <rect x="310" y="406" width="5" height="50" fill="#16213E"/>
  <circle cx="330" cy="418" r="9" fill="#16213E"/>
  <text x="330" y="422" text-anchor="middle" fill="#FFFFFF" font-size="9" font-weight="700">2</text>
  <text x="348" y="420" fill="#1A1A2E" font-size="9" font-weight="700">Spare Parts Availability Statement</text>
  <text x="348" y="434" fill="#2C2C2C" font-size="8">"Key spare parts stocked in Nairobi Industrial Area warehouse"</text>
  <text x="348" y="448" fill="#888" font-size="8">Local parts supplier preferred over 6–8 week China import lead time</text>

  <!-- Req 3 -->
  <rect x="310" y="462" width="460" height="50" rx="5" fill="#1A1A2E"/>
  <rect x="310" y="462" width="5" height="50" fill="#E94560"/>
  <circle cx="330" cy="474" r="9" fill="#E94560"/>
  <text x="330" y="478" text-anchor="middle" fill="#FFFFFF" font-size="9" font-weight="700">3</text>
  <text x="348" y="476" fill="#FFFFFF" font-size="9" font-weight="700">Pricing in Kenya Shillings (Ksh)</text>
  <text x="348" y="490" fill="#aaaacc" font-size="8">Even for USD-sourced equipment — procurement teams build budgets in Ksh</text>
  <text x="348" y="504" fill="#E94560" font-size="8">USD pricing = friction point competitors who quote in Ksh avoid</text>

  <!-- Req 4 -->
  <rect x="310" y="518" width="460" height="50" rx="5" fill="#FFFFFF" stroke="#1A1A2E" stroke-width="1"/>
  <rect x="310" y="518" width="5" height="50" fill="#16213E"/>
  <circle cx="330" cy="530" r="9" fill="#16213E"/>
  <text x="330" y="534" text-anchor="middle" fill="#FFFFFF" font-size="9" font-weight="700">4</text>
  <text x="348" y="532" fill="#1A1A2E" font-size="9" font-weight="700">Service Coverage Map by County</text>
  <text x="348" y="546" fill="#2C2C2C" font-size="8">County hospital projects, county government facilities need county-level coverage</text>
  <text x="348" y="560" fill="#888" font-size="8">Multi-site manufacturers need to confirm coverage outside Nairobi</text>

  <!-- Req 5 -->
  <rect x="310" y="574" width="460" height="50" rx="5" fill="#1A1A2E"/>
  <rect x="310" y="574" width="5" height="50" fill="#E94560"/>
  <circle cx="330" cy="586" r="9" fill="#E94560"/>
  <text x="330" y="590" text-anchor="middle" fill="#FFFFFF" font-size="9" font-weight="700">5</text>
  <text x="348" y="588" fill="#FFFFFF" font-size="9" font-weight="700">Free PDF Datasheet (No Registration Gate)</text>
  <text x="348" y="602" fill="#aaaacc" font-size="8">Procurement managers share spec sheets internally for technical review</text>
  <text x="348" y="616" fill="#E94560" font-size="8">Registration gates = use competitor's freely downloadable sheet instead</text>

  <!-- Req 6 -->
  <rect x="310" y="630" width="460" height="50" rx="5" fill="#FFFFFF" stroke="#1A1A2E" stroke-width="1"/>
  <rect x="310" y="630" width="5" height="50" fill="#16213E"/>
  <circle cx="330" cy="642" r="9" fill="#16213E"/>
  <text x="330" y="646" text-anchor="middle" fill="#FFFFFF" font-size="9" font-weight="700">6</text>
  <text x="348" y="644" fill="#1A1A2E" font-size="9" font-weight="700">Product-Specific RFQ Form</text>
  <text x="348" y="658" fill="#2C2C2C" font-size="8">Pre-populated with equipment model, county of operation dropdown</text>
  <text x="348" y="672" fill="#888" font-size="8">WhatsApp auto-reply within 60 seconds of submission (B2B expectation)</text>

  <!-- Req 7 -->
  <rect x="310" y="686" width="460" height="50" rx="5" fill="#1A1A2E"/>
  <rect x="310" y="686" width="5" height="50" fill="#E94560"/>
  <circle cx="330" cy="698" r="9" fill="#E94560"/>
  <text x="330" y="702" text-anchor="middle" fill="#FFFFFF" font-size="9" font-weight="700">7</text>
  <text x="348" y="700" fill="#FFFFFF" font-size="9" font-weight="700">Application Compatibility by Kenyan Industry</text>
  <text x="348" y="714" fill="#aaaacc" font-size="8">Construction · Mining · Agriculture · Food Processing · Healthcare · Education</text>
  <text x="348" y="728" fill="#E94560" font-size="8">Connects product to the buyer's specific Kenyan use case</text>

