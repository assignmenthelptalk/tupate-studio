  <text x="400" y="789" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="700">CERTIFICATIONS TO DISPLAY WITH SCANNED IMAGES + REGISTRATION NUMBERS</text>

  <rect x="30" y="800" width="740" height="58" rx="6" fill="#FFFFFF" stroke="#1A1A2E" stroke-width="1"/>
  <!-- Cert badges -->
  <rect x="48" y="810" width="96" height="34" rx="4" fill="#F5F5F5" stroke="#1A1A2E" stroke-width="0.8"/>
