  <line x1="73" y1="251" x2="73" y2="264" stroke="#E94560" stroke-width="1.5"/>
  <polygon points="69,264 77,264 73,271" fill="#E94560"/>
  <text x="73" y="282" text-anchor="middle" fill="#E94560" font-size="8" font-weight="700">INDIVIDUAL PRODUCT PAGE</text>

