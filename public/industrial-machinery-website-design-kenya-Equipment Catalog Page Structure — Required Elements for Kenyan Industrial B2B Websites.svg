  <polygon points="94,210 102,210 98,217" fill="#888"/>
  <text x="98" y="230" text-anchor="middle" fill="#888" font-size="7.5">Level 2</text>
  <rect x="32" y="233" width="82" height="18" rx="3" fill="#888" fill-opacity="0.3"/>
  <text x="73" y="245" text-anchor="middle" fill="#2C2C2C" font-size="7.5">Diesel Generators</text>
  <rect x="120" y="233" width="82" height="18" rx="3" fill="#888" fill-opacity="0.3"/>
  <text x="161" y="245" text-anchor="middle" fill="#2C2C2C" font-size="7.5">Gas Generators</text>

