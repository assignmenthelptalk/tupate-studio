<svg viewBox="0 0 800 1080" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="infographic-title" font-family="'Inter', 'Segoe UI', Arial, sans-serif">
  <title id="infographic-title">Equipment Catalog Page Structure — Required Elements for Kenyan Industrial B2B Websites</title>
  <defs>
