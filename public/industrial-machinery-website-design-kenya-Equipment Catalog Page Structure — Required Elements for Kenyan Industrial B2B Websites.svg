  <text x="162" y="427" text-anchor="middle" fill="#aaa" font-size="7.5">Kenyan client site installation photo</text>

  <!-- Spec table -->
  <rect x="40" y="460" width="245" height="138" rx="4" fill="#F5F5F5"/>
  <text x="162" y="474" text-anchor="middle" fill="#1A1A2E" font-size="8.5" font-weight="700">TECHNICAL SPECIFICATIONS</text>
  <line x1="40" y1="478" x2="285" y2="478" stroke="#ddd" stroke-width="0.5"/>
  <text x="52" y="491" fill="#888" font-size="7.5">Power Rating</text><text x="220" y="491" text-anchor="end" fill="#2C2C2C" font-size="7.5" font-weight="600">500 kVA / 400 kW</text>
  <text x="52" y="504" fill="#888" font-size="7.5">Voltage / Freq</text><text x="220" y="504" text-anchor="end" fill="#E94560" font-size="7.5" font-weight="700">240V / 50Hz (Kenya Std.)</text>
  <text x="52" y="517" fill="#888" font-size="7.5">Dimensions (mm)</text><text x="220" y="517" text-anchor="end" fill="#2C2C2C" font-size="7.5">3200 × 1100 × 1800</text>
  <text x="52" y="530" fill="#888" font-size="7.5">Weight</text><text x="220" y="530" text-anchor="end" fill="#2C2C2C" font-size="7.5">3,850 kg</text>
  <text x="52" y="543" fill="#888" font-size="7.5">Fuel Consumption</text><text x="220" y="543" text-anchor="end" fill="#2C2C2C" font-size="7.5">98 L/hr at full load</text>
  <text x="52" y="556" fill="#888" font-size="7.5">Altitude Limit</text><text x="220" y="556" text-anchor="end" fill="#2C2C2C" font-size="7.5">2,500m (Nairobi +)</text>
