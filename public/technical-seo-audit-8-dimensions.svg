  <text x="34" y="201" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#AAAAAA">No orphaned pages</text>
  <text x="34" y="218" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#777777">Ensures Google indexes every page</text>

