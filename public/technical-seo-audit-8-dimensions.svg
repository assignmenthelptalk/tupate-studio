  <text x="115" y="121" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">Crawlability</text>
  <line x1="26" y1="132" x2="194" y2="132" stroke="#2C3E6A" stroke-width="1"/>
  <text x="34" y="150" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#CCCCCC">robots.txt rules</text>
