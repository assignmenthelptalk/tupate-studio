<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700" width="100%" role="img" aria-labelledby="infographic-title" version="1.1">
  <title id="infographic-title">Google Ads Conversion Tracking Setup for Kenyan Businesses</title>
  <defs>
    <linearGradient id="bgGrad5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#16213E"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="700" fill="url(#bgGrad5)" rx="12"/>

  <!-- Header -->
  <rect x="0" y="0" width="800" height="78" fill="#E94560" rx="12"/>
  <rect x="0" y="66" width="800" height="12" fill="#E94560"/>
  <text x="400" y="32" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="19" font-weight="700" fill="#FFFFFF" text-anchor="middle">Google Ads Conversion Tracking for Kenya</text>
  <text x="400" y="58" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" fill="#ffd0d8" text-anchor="middle">Without tracking you are spending Ksh blind — every conversion source must be measured</text>

  <!-- Flow: Ad Click → Website → Conversion Actions -->
  <!-- Step 1: Kenyan user searches -->
  <rect x="40" y="96" width="155" height="72" fill="#2C2C2C" rx="10"/>
  <rect x="40" y="96" width="155" height="5" fill="#E94560" rx="4"/>
  <text x="118" y="120" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="20" text-anchor="middle">🔍</text>
  <text x="118" y="142" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#F5F5F5" text-anchor="middle">Kenyan searches</text>
  <text x="118" y="158" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#aaa" text-anchor="middle">Google.co.ke query</text>

  <!-- Arrow -->
  <polygon points="200,132 216,125 216,139" fill="#E94560"/>
  <line x1="195" y1="132" x2="216" y2="132" stroke="#E94560" stroke-width="2"/>

  <!-- Step 2: Sees ad -->
  <rect x="220" y="96" width="155" height="72" fill="#2C2C2C" rx="10"/>
  <rect x="220" y="96" width="155" height="5" fill="#E94560" rx="4"/>
  <text x="298" y="120" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#E94560" text-anchor="middle">SPONSORED</text>
  <text x="298" y="138" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#F5F5F5" text-anchor="middle">Your Kenya ad appears</text>
  <text x="298" y="154" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#aaa" text-anchor="middle">Top of Google.co.ke</text>

  <!-- Arrow -->
  <polygon points="380,132 396,125 396,139" fill="#E94560"/>
  <line x1="375" y1="132" x2="396" y2="132" stroke="#E94560" stroke-width="2"/>

  <!-- Step 3: Clicks → website -->
  <rect x="400" y="96" width="155" height="72" fill="#2C2C2C" rx="10"/>
  <rect x="400" y="96" width="155" height="5" fill="#2980b9" rx="4"/>
  <text x="478" y="125" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" font-weight="700" fill="#2980b9" text-anchor="middle">CLICK!</text>
  <text x="478" y="143" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#F5F5F5" text-anchor="middle">Arrives on your website</text>
  <text x="478" y="159" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#aaa" text-anchor="middle">Ksh CPC charged</text>

  <!-- Arrow down -->
  <polygon points="478,174 471,190 485,190" fill="#E94560"/>
  <line x1="478" y1="168" x2="478" y2="190" stroke="#E94560" stroke-width="2"/>

  <!-- Step 4: Conversion Decision box -->
  <rect x="330" y="194" width="296" height="52" fill="#E94560" rx="8" opacity="0.2"/>
  <rect x="330" y="194" width="296" height="52" fill="none" stroke="#E94560" stroke-width="1.5" rx="8"/>
  <text x="478" y="218" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" fill="#E94560" text-anchor="middle">Visitor takes action on website</text>
  <text x="478" y="236" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#F5F5F5" text-anchor="middle">Which action? → Google Ads must know</text>

  <!-- 5 Conversion Types as vertical cards -->
  <text x="400" y="278" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#E94560" text-anchor="middle">5 Conversion Actions to Track for Kenyan Businesses</text>

  <!-- Card 1: Contact Form -->
  <rect x="40" y="292" width="136" height="160" fill="#2C2C2C" rx="10"/>
  <rect x="40" y="292" width="136" height="5" fill="#27ae60" rx="4"/>
  <text x="108" y="320" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="22" text-anchor="middle">📋</text>
  <text x="108" y="344" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#27ae60" text-anchor="middle">Form Submit</text>
  <line x1="60" y1="354" x2="156" y2="354" stroke="#333" stroke-width="1"/>
  <text x="108" y="370" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#F5F5F5" text-anchor="middle">Contact form</text>
  <text x="108" y="386" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#aaa" text-anchor="middle">Thank-you page</text>
  <text x="108" y="402" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#aaa" text-anchor="middle">trigger or GTM</text>
  <text x="108" y="420" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#aaa" text-anchor="middle">form event</text>
  <text x="108" y="442" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9" fill="#27ae60" text-anchor="middle">PRIORITY: HIGH</text>

  <!-- Card 2: Phone Call -->
  <rect x="189" y="292" width="136" height="160" fill="#2C2C2C" rx="10"/>
  <rect x="189" y="292" width="136" height="5" fill="#E94560" rx="4"/>
  <text x="257" y="320" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="22" text-anchor="middle">📞</text>
  <text x="257" y="344" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#E94560" text-anchor="middle">Phone Click</text>
  <line x1="209" y1="354" x2="305" y2="354" stroke="#333" stroke-width="1"/>
  <text x="257" y="370" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#F5F5F5" text-anchor="middle">Click-to-call</text>
  <text x="257" y="386" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#aaa" text-anchor="middle">Missing in most</text>
  <text x="257" y="402" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#aaa" text-anchor="middle">Kenya accounts</text>
  <text x="257" y="420" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#aaa" text-anchor="middle">GTM phone tag</text>
  <text x="257" y="442" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9" fill="#E94560" text-anchor="middle">MOST MISSED</text>

  <!-- Card 3: WhatsApp -->
  <rect x="338" y="292" width="136" height="160" fill="#2C2C2C" rx="10"/>
  <rect x="338" y="292" width="136" height="5" fill="#25d366" rx="4"/>
  <text x="406" y="320" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="22" text-anchor="middle">💬</text>
  <text x="406" y="344" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#25d366" text-anchor="middle">WhatsApp Click</text>
  <line x1="358" y1="354" x2="454" y2="354" stroke="#333" stroke-width="1"/>
  <text x="406" y="370" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#F5F5F5" text-anchor="middle">wa.me link click</text>
  <text x="406" y="386" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#aaa" text-anchor="middle">GTM click tag</text>
  <text x="406" y="402" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#aaa" text-anchor="middle">on WA button</text>
  <text x="406" y="420" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#aaa" text-anchor="middle">Primary Kenya CTA</text>
  <text x="406" y="442" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9" fill="#25d366" text-anchor="middle">PRIORITY: HIGH</text>

  <!-- Card 4: M-Pesa Payment -->
  <rect x="487" y="292" width="136" height="160" fill="#2C2C2C" rx="10"/>
  <rect x="487" y="292" width="136" height="5" fill="#4caf50" rx="4"/>
  <text x="555" y="320" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="22" text-anchor="middle">💳</text>
  <text x="555" y="344" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#4caf50" text-anchor="middle">M-Pesa Payment</text>
  <line x1="507" y1="354" x2="603" y2="354" stroke="#333" stroke-width="1"/>
  <text x="555" y="370" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#F5F5F5" text-anchor="middle">Daraja API</text>
  <text x="555" y="386" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#aaa" text-anchor="middle">transaction complete</text>
  <text x="555" y="402" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#aaa" text-anchor="middle">Pass Ksh value</text>
  <text x="555" y="420" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#aaa" text-anchor="middle">for value bidding</text>
  <text x="555" y="442" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9" fill="#4caf50" text-anchor="middle">E-COMMERCE KEY</text>

  <!-- Card 5: Engagement -->
  <rect x="636" y="292" width="124" height="160" fill="#2C2C2C" rx="10"/>
  <rect x="636" y="292" width="124" height="5" fill="#f39c12" rx="4"/>
  <text x="698" y="320" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="22" text-anchor="middle">📊</text>
  <text x="698" y="344" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#f39c12" text-anchor="middle">Engagement</text>
  <line x1="656" y1="354" x2="740" y2="354" stroke="#333" stroke-width="1"/>
  <text x="698" y="370" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#F5F5F5" text-anchor="middle">Time on site</text>
  <text x="698" y="386" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#aaa" text-anchor="middle">Page depth</text>
  <text x="698" y="402" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#aaa" text-anchor="middle">Scroll depth</text>
  <text x="698" y="420" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#aaa" text-anchor="middle">Proxy signal for</text>
  <text x="698" y="436" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#aaa" text-anchor="middle">low-volume phase</text>
  <text x="698" y="452" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9" fill="#f39c12" text-anchor="middle">SECONDARY</text>

  <!-- Tech implementation section -->
  <rect x="40" y="472" width="720" height="88" fill="#2C2C2C" rx="10"/>
  <rect x="40" y="472" width="720" height="5" fill="#2980b9" rx="4"/>
  <text x="400" y="496" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" fill="#2980b9" text-anchor="middle">Technical Implementation Stack</text>

  <!-- Three columns -->
  <line x1="280" y1="505" x2="280" y2="552" stroke="#444" stroke-width="1"/>
  <line x1="520" y1="505" x2="520" y2="552" stroke="#444" stroke-width="1"/>

  <text x="160" y="518" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" font-weight="600" fill="#F5F5F5" text-anchor="middle">Google Tag Manager</text>
  <text x="160" y="534" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#aaa" text-anchor="middle">Install GA4 + Ads tags</text>
  <text x="160" y="550" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#aaa" text-anchor="middle">Track all click events</text>

  <text x="400" y="518" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" font-weight="600" fill="#F5F5F5" text-anchor="middle">Google Analytics 4</text>
  <text x="400" y="534" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#aaa" text-anchor="middle">Import events to Ads</text>
  <text x="400" y="550" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#aaa" text-anchor="middle">Full attribution view</text>

  <text x="640" y="518" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" font-weight="600" fill="#F5F5F5" text-anchor="middle">GA4 Audience Bidding</text>
  <text x="640" y="534" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#aaa" text-anchor="middle">Bid higher for pricing</text>
  <text x="640" y="550" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#aaa" text-anchor="middle">page visitors (warm)</text>

  <!-- ROAS section -->
  <rect x="40" y="572" width="720" height="82" fill="#E94560" rx="8" opacity="0.1"/>
  <rect x="40" y="572" width="4" height="82" fill="#E94560" rx="2"/>
  <text x="56" y="596" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" fill="#E94560">Expected ROAS for Kenya — With Proper Tracking &amp; Optimization</text>
  <text x="56" y="618" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">Well-managed Kenyan service campaigns: <tspan font-weight="700" fill="#27ae60">3–8× ROAS</tspan> within 3 months of optimization</text>
  <text x="56" y="636" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#aaa">= Ksh 3–8 in revenue for every Ksh 1 in ad spend  ·  Optimization period: 4–8 weeks to learn Kenya user behaviour</text>
  <text x="56" y="652" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#aaa">Minimum recommended budget: Ksh 15,000–25,000/month ad spend (service) · Ksh 20,000–40,000/month (e-commerce)</text>

  <!-- Footer -->
  <text x="400" y="692" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#999" text-anchor="middle">tupate.studio</text>
</svg>
