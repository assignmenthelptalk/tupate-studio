<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="100%" height="auto" role="img" aria-labelledby="infographic-title-3">
  <title id="infographic-title-3">M-Pesa STK Push: How Customers Pay on Your Kenyan Store</title>

  <!-- Background -->
  <rect width="800" height="520" fill="#1A1A2E" rx="12"/>

  <!-- Header -->
  <rect width="800" height="75" fill="#0A0A1A" rx="12"/>
  <rect x="0" y="63" width="800" height="12" fill="#0A0A1A"/>
  <text x="400" y="35" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="700" fill="#FFFFFF">M-Pesa STK Push Payment Flow</text>
  <text x="400" y="58" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#00A550">How Customers Pay on Your Kenyan Store</text>

  <!-- Step boxes - 6 steps in a row (horizontal flow) -->
  <!-- Step 1 -->
  <rect x="20" y="105" width="110" height="130" fill="#16213E" rx="8" stroke="#00A550" stroke-width="1.5"/>
  <rect x="20" y="105" width="110" height="32" fill="#0F3460" rx="8"/>
  <rect x="20" y="125" width="110" height="12" fill="#0F3460"/>
  <text x="75" y="127" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#00A550">1</text>
  <!-- Cart icon placeholder -->
  <rect x="40" y="148" width="70" height="40" fill="#0F3460" rx="4"/>
  <text x="75" y="172" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" fill="#FFFFFF">🛒</text>
  <text x="75" y="205" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">Customer Adds</text>
  <text x="75" y="219" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#AAAAAA">to Cart</text>
  <text x="75" y="232" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#AAAAAA">&amp; Clicks Pay</text>

  <!-- Arrow 1→2 -->
  <polygon points="138,165 150,158 150,172" fill="#E94560"/>
  <line x1="130" y1="165" x2="150" y2="165" stroke="#E94560" stroke-width="2"/>

  <!-- Step 2 -->
  <rect x="152" y="105" width="110" height="130" fill="#16213E" rx="8" stroke="#00A550" stroke-width="1.5"/>
  <rect x="152" y="105" width="110" height="32" fill="#0F3460" rx="8"/>
  <rect x="152" y="125" width="110" height="12" fill="#0F3460"/>
  <text x="207" y="127" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#00A550">2</text>
  <rect x="172" y="148" width="70" height="40" fill="#0F3460" rx="4"/>
  <text x="207" y="172" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#FFFFFF">📱</text>
  <text x="207" y="205" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">Enters M-Pesa</text>
  <text x="207" y="219" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#AAAAAA">Phone Number</text>
  <text x="207" y="232" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#AAAAAA">0712 345 678</text>

  <!-- Arrow 2→3 -->
  <polygon points="270,165 282,158 282,172" fill="#E94560"/>
  <line x1="262" y1="165" x2="282" y2="165" stroke="#E94560" stroke-width="2"/>

  <!-- Step 3 — Daraja API (M-Pesa) -->
  <rect x="284" y="105" width="110" height="130" fill="#005C2E" rx="8" stroke="#00A550" stroke-width="2"/>
  <rect x="284" y="105" width="110" height="32" fill="#007A3D" rx="8"/>
  <rect x="284" y="125" width="110" height="12" fill="#007A3D"/>
  <text x="339" y="127" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">3</text>
  <rect x="299" y="142" width="80" height="22" fill="#00A550" rx="3"/>
  <text x="339" y="158" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">M-PESA</text>
  <text x="339" y="178" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#AAFFAA">Daraja API</text>
  <text x="339" y="192" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#AAFFAA">sends STK Push</text>
  <text x="339" y="205" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">STK Push Sent</text>
  <text x="339" y="219" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#AAFFAA">to Customer</text>
  <text x="339" y="232" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#AAFFAA">Phone Screen</text>

  <!-- Arrow 3→4 -->
  <polygon points="402,165 414,158 414,172" fill="#E94560"/>
  <line x1="394" y1="165" x2="414" y2="165" stroke="#E94560" stroke-width="2"/>

  <!-- Step 4 -->
  <rect x="416" y="105" width="110" height="130" fill="#16213E" rx="8" stroke="#00A550" stroke-width="1.5"/>
  <rect x="416" y="105" width="110" height="32" fill="#0F3460" rx="8"/>
  <rect x="416" y="125" width="110" height="12" fill="#0F3460"/>
  <text x="471" y="127" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#00A550">4</text>
  <rect x="436" y="148" width="70" height="40" fill="#0F3460" rx="4"/>
  <text x="471" y="172" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#FFFFFF">✅</text>
  <text x="471" y="205" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">Customer</text>
  <text x="471" y="219" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#AAAAAA">Approves on</text>
  <text x="471" y="232" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#AAAAAA">M-Pesa App</text>

  <!-- Arrow 4→5 -->
  <polygon points="534,165 546,158 546,172" fill="#E94560"/>
  <line x1="526" y1="165" x2="546" y2="165" stroke="#E94560" stroke-width="2"/>

  <!-- Step 5 — confirmation -->
  <rect x="548" y="105" width="110" height="130" fill="#16213E" rx="8" stroke="#00A550" stroke-width="1.5"/>
  <rect x="548" y="105" width="110" height="32" fill="#0F3460" rx="8"/>
  <rect x="548" y="125" width="110" height="12" fill="#0F3460"/>
  <text x="603" y="127" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#00A550">5</text>
  <rect x="563" y="148" width="80" height="22" fill="#00A550" rx="3"/>
  <text x="603" y="163" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">⚡ 5–10 Seconds</text>
  <text x="603" y="190" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">Payment</text>
  <text x="603" y="205" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#AAAAAA">Confirmed to</text>
  <text x="603" y="219" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#AAAAAA">Store Server</text>
  <text x="603" y="232" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#AAAAAA">via Webhook</text>

  <!-- Arrow 5→6 -->
  <polygon points="666,165 678,158 678,172" fill="#E94560"/>
  <line x1="658" y1="165" x2="678" y2="165" stroke="#E94560" stroke-width="2"/>

  <!-- Step 6 -->
  <rect x="680" y="105" width="100" height="130" fill="#16213E" rx="8" stroke="#00A550" stroke-width="1.5"/>
  <rect x="680" y="105" width="100" height="32" fill="#0F3460" rx="8"/>
  <rect x="680" y="125" width="100" height="12" fill="#0F3460"/>
  <text x="730" y="127" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#00A550">6</text>
  <rect x="695" y="148" width="70" height="40" fill="#0F3460" rx="4"/>
  <text x="730" y="172" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#FFFFFF">📦</text>
  <text x="730" y="205" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">Order</text>
  <text x="730" y="219" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#AAAAAA">Processed</text>
  <text x="730" y="232" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#AAAAAA">Automatically</text>

  <!-- Key benefits row -->
  <text x="400" y="270" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#E94560">Why M-Pesa STK Push?</text>

  <rect x="30" y="285" width="220" height="70" fill="#16213E" rx="6"/>
  <text x="140" y="310" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" fill="#00A550">97%</text>
  <text x="140" y="330" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#FFFFFF">M-Pesa market penetration</text>
  <text x="140" y="348" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#AAAAAA">in Kenya</text>

  <rect x="290" y="285" width="220" height="70" fill="#16213E" rx="6"/>
  <text x="400" y="310" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" fill="#00A550">0 Redirects</text>
  <text x="400" y="330" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#FFFFFF">No card needed, no bank account</text>
  <text x="400" y="348" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#AAAAAA">Pay directly from phone</text>

  <rect x="550" y="285" width="220" height="70" fill="#16213E" rx="6"/>
  <text x="660" y="310" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" fill="#00A550">Auto</text>
  <text x="660" y="330" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#FFFFFF">Reconciliation via webhook</text>
  <text x="660" y="348" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#AAAAAA">No manual payment tracking</text>

  <!-- Additional integration types -->
  <rect x="30" y="375" width="740" height="90" fill="#0F3460" rx="8"/>
  <text x="400" y="398" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">Daraja API Integration Types Supported</text>
  <rect x="55" y="408" width="200" height="45" fill="#16213E" rx="5"/>
  <text x="155" y="428" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#00A550">C2B — Paybill</text>
  <text x="155" y="446" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#AAAAAA">Paybill fallback option</text>
  <rect x="300" y="408" width="200" height="45" fill="#16213E" rx="5"/>
  <text x="400" y="428" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#00A550">STK Push — Primary</text>
  <text x="400" y="446" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#AAAAAA">Seamless checkout flow</text>
  <rect x="545" y="408" width="200" height="45" fill="#16213E" rx="5"/>
  <text x="645" y="428" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#00A550">B2C — Refunds</text>
  <text x="645" y="446" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#AAAAAA">Automated customer refunds</text>

  <!-- Footer -->
  <text x="400" y="507" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#999999">tupate.studio</text>
</svg>
