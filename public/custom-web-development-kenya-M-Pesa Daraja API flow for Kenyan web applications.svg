<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1060" width="100%" role="img" aria-labelledby="infographic-title" font-family="'Inter','Segoe UI',Arial,sans-serif">
  <title id="infographic-title">M-Pesa Daraja API Flow for Kenyan Web Applications — Tupate Studio</title>

  <!-- Background -->
  <rect width="800" height="1060" fill="#F5F5F5"/>

  <!-- Header -->
  <rect x="0" y="0" width="800" height="86" fill="#1A1A2E"/>
  <text x="400" y="32" text-anchor="middle" fill="#FFFFFF" font-size="18" font-weight="700">M-PESA DARAJA API INTEGRATION</text>
  <text x="400" y="56" text-anchor="middle" fill="#E94560" font-size="13" font-weight="600">Payment Flow for Kenyan Web Applications</text>
  <text x="400" y="76" text-anchor="middle" fill="#94A3B8" font-size="11">Safaricom developer.safaricom.co.ke — Used by Kenyan e-commerce, booking systems &amp; SACCO portals</text>

  <!-- ===== SECTION 1: API Types Overview ===== -->
  <rect x="20" y="102" width="760" height="32" fill="#16213E" rx="4"/>
  <text x="400" y="123" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="700">4 DARAJA API TYPES — Kenyan Business Use Cases</text>

  <!-- API type cards -->
  <!-- STK Push -->
  <rect x="20" y="146" width="178" height="130" fill="#FFFFFF" rx="6"/>
  <rect x="20" y="146" width="178" height="8" fill="#E94560" rx="6 6 0 0"/>
  <text x="109" y="172" text-anchor="middle" fill="#E94560" font-size="11" font-weight="800">STK PUSH</text>
  <text x="109" y="188" text-anchor="middle" fill="#555" font-size="9.5">Lipa Na M-Pesa Online</text>
  <line x1="30" y1="196" x2="188" y2="196" stroke="#E5E7EB" stroke-width="1"/>
  <text x="109" y="212" text-anchor="middle" fill="#1A1A2E" font-size="10" font-weight="600">Online checkout</text>
  <text x="109" y="226" text-anchor="middle" fill="#1A1A2E" font-size="10">PIN prompt on</text>
  <text x="109" y="240" text-anchor="middle" fill="#1A1A2E" font-size="10">customer's phone</text>
  <text x="109" y="258" text-anchor="middle" fill="#22C55E" font-size="9.5" font-weight="700">RECOMMENDED</text>
  <text x="109" y="272" text-anchor="middle" fill="#555" font-size="9.5">for e-commerce &amp; bookings</text>

  <!-- C2B -->
  <rect x="210" y="146" width="178" height="130" fill="#FFFFFF" rx="6"/>
  <rect x="210" y="146" width="178" height="8" fill="#1A1A2E" rx="6 6 0 0"/>
  <text x="299" y="172" text-anchor="middle" fill="#1A1A2E" font-size="11" font-weight="800">C2B</text>
  <text x="299" y="188" text-anchor="middle" fill="#555" font-size="9.5">Customer to Business</text>
  <line x1="220" y1="196" x2="378" y2="196" stroke="#E5E7EB" stroke-width="1"/>
  <text x="299" y="212" text-anchor="middle" fill="#1A1A2E" font-size="10" font-weight="600">Paybill / Till confirmation</text>
  <text x="299" y="226" text-anchor="middle" fill="#1A1A2E" font-size="10">Auto-confirms manual</text>
  <text x="299" y="240" text-anchor="middle" fill="#1A1A2E" font-size="10">M-Pesa to Paybill</text>
  <text x="299" y="260" text-anchor="middle" fill="#555" font-size="9.5">Eliminates manual</text>
  <text x="299" y="274" text-anchor="middle" fill="#555" font-size="9.5">reconciliation overhead</text>

  <!-- B2C -->
  <rect x="400" y="146" width="178" height="130" fill="#FFFFFF" rx="6"/>
  <rect x="400" y="146" width="178" height="8" fill="#F59E0B" rx="6 6 0 0"/>
  <text x="489" y="172" text-anchor="middle" fill="#92400E" font-size="11" font-weight="800">B2C</text>
  <text x="489" y="188" text-anchor="middle" fill="#555" font-size="9.5">Business to Customer</text>
  <line x1="410" y1="196" x2="568" y2="196" stroke="#E5E7EB" stroke-width="1"/>
  <text x="489" y="212" text-anchor="middle" fill="#1A1A2E" font-size="10" font-weight="600">Outbound payments</text>
  <text x="489" y="226" text-anchor="middle" fill="#1A1A2E" font-size="10">Refunds, dividends,</text>
  <text x="489" y="240" text-anchor="middle" fill="#1A1A2E" font-size="10">employee payouts</text>
  <text x="489" y="260" text-anchor="middle" fill="#555" font-size="9.5">SACCO dividends</text>
  <text x="489" y="274" text-anchor="middle" fill="#555" font-size="9.5">distributor commissions</text>

  <!-- B2B -->
  <rect x="590" y="146" width="190" height="130" fill="#FFFFFF" rx="6"/>
  <rect x="590" y="146" width="190" height="8" fill="#16213E" rx="6 6 0 0"/>
  <text x="685" y="172" text-anchor="middle" fill="#16213E" font-size="11" font-weight="800">B2B</text>
  <text x="685" y="188" text-anchor="middle" fill="#555" font-size="9.5">Business to Business</text>
  <line x1="600" y1="196" x2="770" y2="196" stroke="#E5E7EB" stroke-width="1"/>
  <text x="685" y="212" text-anchor="middle" fill="#1A1A2E" font-size="10" font-weight="600">Inter-business transfers</text>
  <text x="685" y="226" text-anchor="middle" fill="#1A1A2E" font-size="10">Supply chain payments</text>
  <text x="685" y="240" text-anchor="middle" fill="#1A1A2E" font-size="10">between companies</text>
  <text x="685" y="260" text-anchor="middle" fill="#555" font-size="9.5">Wholesale / distributor</text>
  <text x="685" y="274" text-anchor="middle" fill="#555" font-size="9.5">payment systems</text>

  <!-- ===== SECTION 2: STK Push Flow ===== -->
  <rect x="20" y="292" width="760" height="32" fill="#16213E" rx="4"/>
  <text x="400" y="313" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="700">STK PUSH PAYMENT FLOW — Step-by-Step (Most Common Integration)</text>

  <!-- Flow steps: centered layout -->
  <!-- Step boxes with arrows between them -->
  <!-- Row 1: Steps 1-4 -->

  <!-- STEP 1 -->
  <rect x="20" y="336" width="164" height="90" fill="#FFFFFF" rx="6"/>
  <rect x="20" y="336" width="164" height="6" fill="#E94560" rx="3"/>
  <circle cx="55" cy="366" r="14" fill="#E94560"/>
  <text x="55" y="371" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="800">1</text>
  <text x="107" y="363" text-anchor="middle" fill="#1A1A2E" font-size="11" font-weight="700">Customer Checkout</text>
  <text x="107" y="380" text-anchor="middle" fill="#555" font-size="10">Enters phone no.</text>
  <text x="107" y="394" text-anchor="middle" fill="#555" font-size="10">on your web app</text>
  <text x="107" y="412" text-anchor="middle" fill="#94A3B8" font-size="9">Tecno / Infinix / Samsung</text>

  <!-- Arrow 1→2 -->
  <line x1="190" y1="381" x2="218" y2="381" stroke="#E94560" stroke-width="2.5" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#E94560"/>
    </marker>
    <marker id="arrow2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1A1A2E"/>
    </marker>
    <marker id="arrowdown" markerWidth="8" markerHeight="8" refX="3" refY="6" orient="auto">
      <path d="M0,0 L6,0 L3,8 z" fill="#22C55E"/>
    </marker>
    <marker id="arrowdownred" markerWidth="8" markerHeight="8" refX="3" refY="6" orient="auto">
      <path d="M0,0 L6,0 L3,8 z" fill="#E94560"/>
    </marker>
  </defs>

  <!-- STEP 2 -->
  <rect x="222" y="336" width="164" height="90" fill="#FFFFFF" rx="6"/>
  <rect x="222" y="336" width="164" height="6" fill="#E94560" rx="3"/>
  <circle cx="257" cy="366" r="14" fill="#E94560"/>
  <text x="257" y="371" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="800">2</text>
  <text x="304" y="363" text-anchor="middle" fill="#1A1A2E" font-size="11" font-weight="700">Your Server Calls</text>
  <text x="304" y="380" text-anchor="middle" fill="#1A1A2E" font-size="11" font-weight="700">Daraja API</text>
  <text x="304" y="397" text-anchor="middle" fill="#555" font-size="10">POST request with</text>
  <text x="304" y="412" text-anchor="middle" fill="#555" font-size="10">amount + phone no.</text>

  <!-- Arrow 2→3 -->
  <line x1="392" y1="381" x2="420" y2="381" stroke="#E94560" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- STEP 3 -->
  <rect x="424" y="336" width="164" height="90" fill="#FFFFFF" rx="6"/>
  <rect x="424" y="336" width="164" height="6" fill="#E94560" rx="3"/>
  <circle cx="459" cy="366" r="14" fill="#E94560"/>
  <text x="459" y="371" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="800">3</text>
  <text x="506" y="363" text-anchor="middle" fill="#1A1A2E" font-size="11" font-weight="700">Safaricom Sends</text>
  <text x="506" y="379" text-anchor="middle" fill="#1A1A2E" font-size="11" font-weight="700">STK Push Prompt</text>
  <text x="506" y="397" text-anchor="middle" fill="#555" font-size="10">PIN dialog appears</text>
  <text x="506" y="412" text-anchor="middle" fill="#555" font-size="10">on customer's phone</text>

  <!-- Arrow 3→4 -->
  <line x1="594" y1="381" x2="622" y2="381" stroke="#E94560" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- STEP 4 -->
  <rect x="626" y="336" width="154" height="90" fill="#FFFFFF" rx="6"/>
  <rect x="626" y="336" width="154" height="6" fill="#E94560" rx="3"/>
  <circle cx="661" cy="366" r="14" fill="#E94560"/>
  <text x="661" y="371" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="800">4</text>
  <text x="703" y="363" text-anchor="middle" fill="#1A1A2E" font-size="11" font-weight="700">Customer Enters</text>
  <text x="703" y="379" text-anchor="middle" fill="#1A1A2E" font-size="11" font-weight="700">M-Pesa PIN</text>
  <text x="703" y="397" text-anchor="middle" fill="#555" font-size="10">On their phone</text>
  <text x="703" y="412" text-anchor="middle" fill="#555" font-size="10">Authorises payment</text>

  <!-- Row 2: Steps 5-7 (centred) -->
  <!-- down arrow from step 4 -->
  <line x1="703" y1="430" x2="703" y2="456" stroke="#22C55E" stroke-width="2.5" marker-end="url(#arrowdown)"/>

  <!-- STEP 5 -->
  <rect x="626" y="460" width="154" height="90" fill="#FFFFFF" rx="6"/>
  <rect x="626" y="460" width="154" height="6" fill="#22C55E" rx="3"/>
  <circle cx="661" cy="490" r="14" fill="#22C55E"/>
  <text x="661" y="495" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="800">5</text>
  <text x="703" y="487" text-anchor="middle" fill="#1A1A2E" font-size="11" font-weight="700">Safaricom</text>
  <text x="703" y="502" text-anchor="middle" fill="#1A1A2E" font-size="11" font-weight="700">Processes Payment</text>
  <text x="703" y="519" text-anchor="middle" fill="#555" font-size="10">Transaction verified</text>
  <text x="703" y="535" text-anchor="middle" fill="#555" font-size="10">on M-Pesa network</text>

  <!-- arrow 5→6 (right to left) -->
  <line x1="622" y1="505" x2="596" y2="505" stroke="#22C55E" stroke-width="2.5" marker-end="url(#arrowdown)"/>

  <!-- STEP 6 -->
  <rect x="424" y="460" width="164" height="90" fill="#FFFFFF" rx="6"/>
  <rect x="424" y="460" width="164" height="6" fill="#22C55E" rx="3"/>
  <circle cx="459" cy="490" r="14" fill="#22C55E"/>
  <text x="459" y="495" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="800">6</text>
  <text x="506" y="487" text-anchor="middle" fill="#1A1A2E" font-size="11" font-weight="700">Callback to Your</text>
  <text x="506" y="502" text-anchor="middle" fill="#1A1A2E" font-size="11" font-weight="700">HTTPS Endpoint</text>
  <text x="506" y="519" text-anchor="middle" fill="#E94560" font-size="10" font-weight="600">Requires live HTTPS</text>
  <text x="506" y="534" text-anchor="middle" fill="#E94560" font-size="10" font-weight="600">domain on go-live</text>

  <!-- arrow 6→7 -->
  <line x1="420" y1="505" x2="393" y2="505" stroke="#22C55E" stroke-width="2.5" marker-end="url(#arrowdown)"/>

  <!-- STEP 7 -->
  <rect x="222" y="460" width="164" height="90" fill="#FFFFFF" rx="6"/>
  <rect x="222" y="460" width="164" height="6" fill="#22C55E" rx="3"/>
  <circle cx="257" cy="490" r="14" fill="#22C55E"/>
  <text x="257" y="495" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="800">7</text>
  <text x="304" y="487" text-anchor="middle" fill="#1A1A2E" font-size="11" font-weight="700">Your App Updates</text>
  <text x="304" y="502" text-anchor="middle" fill="#1A1A2E" font-size="11" font-weight="700">Order Status</text>
  <text x="304" y="519" text-anchor="middle" fill="#555" font-size="10">Booking confirmed,</text>
  <text x="304" y="534" text-anchor="middle" fill="#555" font-size="10">order fulfilled</text>

  <!-- arrow 7→8 -->
  <line x1="218" y1="505" x2="192" y2="505" stroke="#22C55E" stroke-width="2.5" marker-end="url(#arrowdown)"/>

  <!-- STEP 8 -->
  <rect x="20" y="460" width="164" height="90" fill="#FFFFFF" rx="6"/>
  <rect x="20" y="460" width="164" height="6" fill="#22C55E" rx="3"/>
  <circle cx="55" cy="490" r="14" fill="#22C55E"/>
  <text x="55" y="495" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="800">8</text>
  <text x="107" y="487" text-anchor="middle" fill="#1A1A2E" font-size="11" font-weight="700">SMS Confirmation</text>
  <text x="107" y="502" text-anchor="middle" fill="#1A1A2E" font-size="11" font-weight="700">to Customer</text>
  <text x="107" y="519" text-anchor="middle" fill="#555" font-size="10">via Africa's Talking</text>
  <text x="107" y="534" text-anchor="middle" fill="#555" font-size="10">or WhatsApp API</text>

  <!-- ===== SECTION 3: Go-Live Requirements ===== -->
  <rect x="20" y="566" width="760" height="32" fill="#16213E" rx="4"/>
  <text x="400" y="587" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="700">GO-LIVE REQUIREMENTS — Safaricom Approval Checklist</text>

  <rect x="20" y="610" width="367" height="130" fill="#FFFFFF" rx="6"/>
  <rect x="413" y="610" width="367" height="130" fill="#FFFFFF" rx="6"/>

  <!-- Left: requirements -->
  <text x="40" y="632" fill="#E94560" font-size="11" font-weight="700">TECHNICAL REQUIREMENTS</text>
  <text x="40" y="655" fill="#1A1A2E" font-size="11">&#x2713;  Registered M-Pesa Paybill or Till number</text>
  <text x="40" y="675" fill="#1A1A2E" font-size="11">&#x2713;  Live HTTPS domain (not localhost)</text>
  <text x="40" y="695" fill="#1A1A2E" font-size="11">&#x2713;  Publicly accessible callback URL endpoint</text>
  <text x="40" y="715" fill="#1A1A2E" font-size="11">&#x2713;  Functional sandbox testing evidence</text>
  <text x="40" y="735" fill="#94A3B8" font-size="10">Sandbox: developer.safaricom.co.ke — free to test</text>

  <!-- Right: alternative gateways -->
  <text x="433" y="632" fill="#1A1A2E" font-size="11" font-weight="700">ALTERNATIVE KENYAN PAYMENT GATEWAYS</text>
  <text x="433" y="655" fill="#1A1A2E" font-size="11" font-weight="700">Pesapal</text>
  <text x="533" y="655" fill="#555" font-size="11">M-Pesa + card, international clients</text>
  <text x="433" y="675" fill="#1A1A2E" font-size="11" font-weight="700">iPay Africa</text>
  <text x="533" y="675" fill="#555" font-size="11">M-Pesa + card + bank transfer</text>
  <text x="433" y="695" fill="#1A1A2E" font-size="11" font-weight="700">Flutterwave Kenya</text>
  <text x="533" y="695" fill="#555" font-size="11">Cards + M-Pesa, international volume</text>
  <text x="433" y="715" fill="#1A1A2E" font-size="11" font-weight="700">Equity PayStar</text>
  <text x="533" y="715" fill="#555" font-size="11">Equity Bank merchant accounts</text>
  <text x="433" y="735" fill="#94A3B8" font-size="10">All integrate via REST API into custom Kenyan web apps</text>

  <!-- ===== SECTION 4: Kenya Use Cases ===== -->
  <rect x="20" y="756" width="760" height="32" fill="#16213E" rx="4"/>
  <text x="400" y="777" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="700">KENYAN BUSINESS USE CASES — M-Pesa Integration Types</text>

  <!-- Use case cards: 3 across -->
  <rect x="20" y="800" width="237" height="80" fill="#FFFFFF" rx="6"/>
  <rect x="20" y="800" width="237" height="6" fill="#E94560" rx="3"/>
  <text x="138" y="822" text-anchor="middle" fill="#E94560" font-size="11" font-weight="700">E-COMMERCE / BOOKING</text>
  <text x="138" y="841" text-anchor="middle" fill="#1A1A2E" font-size="11">STK Push at checkout</text>
  <text x="138" y="858" text-anchor="middle" fill="#555" font-size="10">Clinic appts, hotel reservations,</text>
  <text x="138" y="872" text-anchor="middle" fill="#555" font-size="10">car hire, event tickets</text>

  <rect x="281" y="800" width="238" height="80" fill="#FFFFFF" rx="6"/>
  <rect x="281" y="800" width="238" height="6" fill="#1A1A2E" rx="3"/>
  <text x="400" y="822" text-anchor="middle" fill="#1A1A2E" font-size="11" font-weight="700">SACCO / MICROFINANCE</text>
  <text x="400" y="841" text-anchor="middle" fill="#1A1A2E" font-size="11">B2C for dividend payouts</text>
  <text x="400" y="858" text-anchor="middle" fill="#555" font-size="10">C2B for loan repayments</text>
  <text x="400" y="872" text-anchor="middle" fill="#555" font-size="10">Auto-reconciliation via callbacks</text>

  <rect x="543" y="800" width="237" height="80" fill="#FFFFFF" rx="6"/>
  <rect x="543" y="800" width="237" height="6" fill="#F59E0B" rx="3"/>
  <text x="661" y="822" text-anchor="middle" fill="#92400E" font-size="11" font-weight="700">KRA eTIMS INTEGRATION</text>
  <text x="661" y="841" text-anchor="middle" fill="#1A1A2E" font-size="11">Electronic tax invoices</text>
  <text x="661" y="858" text-anchor="middle" fill="#555" font-size="10">POS + e-commerce compliance</text>
  <text x="661" y="872" text-anchor="middle" fill="#555" font-size="10">Required for VAT-registered businesses</text>

  <!-- Cost / Timeline Banner -->
  <rect x="20" y="896" width="760" height="80" fill="#1A1A2E" rx="6"/>
  <text x="400" y="918" text-anchor="middle" fill="#E94560" font-size="13" font-weight="700">Tupate Studio M-Pesa Integration — Project Scope</text>
  <!-- 3 stats -->
  <text x="160" y="944" text-anchor="middle" fill="#FFFFFF" font-size="22" font-weight="800">Ksh 80K+</text>
  <text x="160" y="963" text-anchor="middle" fill="#94A3B8" font-size="11">Starting price (booking system)</text>

  <line x1="320" y1="912" x2="320" y2="968" stroke="#2C3E60" stroke-width="1"/>

  <text x="400" y="944" text-anchor="middle" fill="#FFFFFF" font-size="22" font-weight="800">4–8 Wks</text>
  <text x="400" y="963" text-anchor="middle" fill="#94A3B8" font-size="11">Discovery to launch (standard portal)</text>

  <line x1="480" y1="912" x2="480" y2="968" stroke="#2C3E60" stroke-width="1"/>

  <text x="630" y="944" text-anchor="middle" fill="#FFFFFF" font-size="22" font-weight="800">47 Counties</text>
  <text x="630" y="963" text-anchor="middle" fill="#94A3B8" font-size="11">Remote project delivery available</text>

  <!-- Footer -->
  <text x="400" y="1052" text-anchor="middle" font-size="11" fill="#999">tupate.studio</text>
</svg>
