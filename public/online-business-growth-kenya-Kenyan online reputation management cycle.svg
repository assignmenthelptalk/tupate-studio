<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 780" width="100%" role="img" aria-labelledby="infographic-title-6" version="1.1">
  <title id="infographic-title-6">Kenyan Online Reputation Management Cycle</title>
  <defs>
    <linearGradient id="hg6" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1A1A2E" />
      <stop offset="100%" style="stop-color:#16213E" />
    </linearGradient>
  </defs>

  <rect width="800" height="780" fill="#F5F5F5" />

  <!-- Header -->
  <rect width="800" height="76" fill="url(#hg6)" />
  <text x="400" y="28" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="19" font-weight="700" fill="#FFFFFF" text-anchor="middle">Kenyan Online Reputation Management Cycle</text>
  <text x="400" y="55" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" fill="#E94560" text-anchor="middle">Social proof directly determines whether Kenyan buyers convert</text>

  <!-- Central circle -->
  <circle cx="400" cy="360" r="68" fill="#E94560" />
  <circle cx="400" cy="360" r="60" fill="#1A1A2E" />
  <text x="400" y="350" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">REPUTATION</text>
  <text x="400" y="367" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" font-weight="700" fill="#E94560" text-anchor="middle">CYCLE</text>
  <text x="400" y="384" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#999" text-anchor="middle">Kenya</text>

  <!-- Stage nodes — 5 nodes in a circle around center -->
  <!-- Node 1: Deliver Service — top (270deg) -->
  <rect x="280" y="92" width="240" height="80" rx="10" fill="#16213E" />
  <rect x="280" y="92" width="240" height="8" rx="5" fill="#E94560" />
  <text x="400" y="118" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">1. Deliver Quality Service</text>
  <text x="400" y="134" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#F5F5F5" text-anchor="middle">Foundation of all reputation signals</text>
  <text x="400" y="149" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" fill="#999" text-anchor="middle">No marketing can compensate for poor service in Kenya</text>
  <text x="400" y="163" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" fill="#999" text-anchor="middle">WhatsApp groups amplify both good and bad experiences</text>
  <!-- Spoke 1 -->
  <line x1="400" y1="172" x2="400" y2="292" stroke="#E94560" stroke-width="1.5" stroke-dasharray="5,3" />

  <!-- Node 2: Request Google Review — top right (330deg) -->
  <rect x="570" y="194" width="200" height="80" rx="10" fill="#16213E" />
  <rect x="570" y="194" width="200" height="8" rx="5" fill="#E94560" />
  <text x="670" y="220" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">2. Request Review</text>
  <text x="670" y="236" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#F5F5F5" text-anchor="middle">WhatsApp post-service message</text>
  <text x="670" y="251" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" fill="#999" text-anchor="middle">Personal + direct Google review link</text>
  <text x="670" y="265" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" fill="#999" text-anchor="middle">Acknowledge specific service received</text>
  <!-- Spoke 2 -->
  <line x1="570" y1="256" x2="453" y2="308" stroke="#E94560" stroke-width="1.5" stroke-dasharray="5,3" />

  <!-- Node 3: Respond to Reviews — bottom right -->
  <rect x="570" y="456" width="200" height="80" rx="10" fill="#16213E" />
  <rect x="570" y="456" width="200" height="8" rx="5" fill="#E94560" />
  <text x="670" y="482" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">3. Respond to Reviews</text>
  <text x="670" y="498" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#F5F5F5" text-anchor="middle">Within 24 hours · all reviews</text>
  <text x="670" y="513" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" fill="#E94560" text-anchor="middle">Negative: acknowledge + resolution path</text>
  <text x="670" y="527" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" fill="#999" text-anchor="middle">Never argue publicly — destroys trust</text>
  <!-- Spoke 3 -->
  <line x1="570" y1="456" x2="453" y2="412" stroke="#E94560" stroke-width="1.5" stroke-dasharray="5,3" />

  <!-- Node 4: Display on Website — bottom -->
  <rect x="280" y="558" width="240" height="80" rx="10" fill="#16213E" />
  <rect x="280" y="558" width="240" height="8" rx="5" fill="#E94560" />
  <text x="400" y="584" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">4. Display Reviews on Website</text>
  <text x="400" y="600" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#F5F5F5" text-anchor="middle">Google review widget integration</text>
  <text x="400" y="615" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" fill="#E94560" text-anchor="middle">18–25% conversion rate increase</text>
  <text x="400" y="629" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" fill="#999" text-anchor="middle">Tupate Studio integrates this as standard</text>
  <!-- Spoke 4 -->
  <line x1="400" y1="558" x2="400" y2="428" stroke="#E94560" stroke-width="1.5" stroke-dasharray="5,3" />

  <!-- Node 5: Monitor + Protect — bottom left -->
  <rect x="30" y="456" width="210" height="80" rx="10" fill="#16213E" />
  <rect x="30" y="456" width="210" height="8" rx="5" fill="#E94560" />
  <text x="135" y="482" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">5. Monitor + Protect</text>
  <text x="135" y="498" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#F5F5F5" text-anchor="middle">Google Alerts for business name</text>
  <text x="135" y="513" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" fill="#E94560" text-anchor="middle">Report fake reviews immediately</text>
  <text x="135" y="527" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" fill="#999" text-anchor="middle">Screenshot + document all activity</text>
  <!-- Spoke 5 -->
  <line x1="240" y1="456" x2="348" y2="412" stroke="#E94560" stroke-width="1.5" stroke-dasharray="5,3" />

  <!-- Node 6: Social Sharing — top left -->
  <rect x="30" y="194" width="210" height="80" rx="10" fill="#16213E" />
  <rect x="30" y="194" width="210" height="8" rx="5" fill="#E94560" />
  <text x="135" y="220" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">6. Share Social Proof</text>
  <text x="135" y="236" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#F5F5F5" text-anchor="middle">Post reviews on social media</text>
  <text x="135" y="251" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" fill="#999" text-anchor="middle">Feeds back into Stage 1 awareness</text>
  <text x="135" y="265" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" fill="#999" text-anchor="middle">WhatsApp status for 24h urgency</text>
  <!-- Spoke 6 -->
  <line x1="240" y1="256" x2="348" y2="308" stroke="#E94560" stroke-width="1.5" stroke-dasharray="5,3" />

  <!-- Circular arrows around center (arcs suggesting cycle) -->
  <!-- Arc top-right to right -->
  <path d="M430 294 A100 100 0 0 1 463 310" fill="none" stroke="#E94560" stroke-width="2" />
  <polygon points="460,304 468,315 472,302" fill="#E94560" />

  <!-- Arc right to bottom-right -->
  <path d="M463 410 A100 100 0 0 1 445 424" fill="none" stroke="#E94560" stroke-width="2" />
  <polygon points="442,418 450,428 455,416" fill="#E94560" />

  <!-- Arc bottom to bottom-left -->
  <path d="M370 428 A100 100 0 0 1 348 414" fill="none" stroke="#E94560" stroke-width="2" />
  <polygon points="345,420 340,408 354,408" fill="#E94560" />

  <!-- Arc left to top-left -->
  <path d="M345 310 A100 100 0 0 1 363 296" fill="none" stroke="#E94560" stroke-width="2" />
  <polygon points="366,302 358,292 370,290" fill="#E94560" />

  <!-- Stat callouts -->
  <rect x="30" y="656" width="350" height="60" rx="8" fill="#1A1A2E" />
  <text x="205" y="678" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" fill="#E94560" text-anchor="middle">50 reviews · 4.7 ★</text>
  <text x="205" y="697" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10.5" fill="#F5F5F5" text-anchor="middle">Consistently outperforms competitor with 5 reviews</text>
  <text x="205" y="712" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#999" text-anchor="middle">Rating visible before service quality is experienced</text>

  <rect x="420" y="656" width="350" height="60" rx="8" fill="#1A1A2E" />
  <text x="595" y="678" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" fill="#E94560" text-anchor="middle">18–25% higher conversion</text>
  <text x="595" y="697" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10.5" fill="#F5F5F5" text-anchor="middle">When Google reviews displayed on website</text>
  <text x="595" y="712" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#999" text-anchor="middle">For Kenyan service businesses (trust-first culture)</text>

  <!-- Footer -->
  <text x="400" y="770" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#999" text-anchor="middle">tupate.studio</text>
</svg>
