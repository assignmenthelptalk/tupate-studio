<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700" width="100%" role="img" aria-labelledby="infographic-title">
  <title id="infographic-title">How Google Ranks Kenyan Business Websites: Technical Foundation, Content Relevance, Authority Signals</title>

  <!-- Background -->
  <rect width="800" height="700" fill="#F5F5F5" rx="12"/>

  <!-- Header band -->
  <rect width="800" height="82" fill="#1A1A2E" rx="12"/>
  <rect x="0" y="70" width="800" height="12" fill="#1A1A2E"/>
  <text x="400" y="38" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#FFFFFF">How Google Ranks Kenyan Business Websites</text>
  <text x="400" y="62" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#E94560">3-Pillar Framework for Google.co.ke Rankings</text>

  <!-- === PILLAR 1: TECHNICAL FOUNDATION === -->
  <rect x="36" y="98" width="224" height="430" fill="#1A1A2E" rx="8"/>
  <!-- Pillar header -->
  <rect x="36" y="98" width="224" height="54" fill="#16213E" rx="8"/>
  <rect x="36" y="132" width="224" height="20" fill="#16213E"/>
  <text x="148" y="124" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#E94560">01</text>
  <text x="148" y="144" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">Technical Foundation</text>

  <!-- Items -->
  <rect x="50" y="162" width="196" height="50" fill="#0F3460" rx="5"/>
  <text x="68" y="181" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#E94560">Crawlability</text>
  <text x="68" y="196" font-family="Inter, Arial, sans-serif" font-size="10" fill="#CCCCCC">XML sitemap + robots.txt</text>
  <text x="68" y="208" font-family="Inter, Arial, sans-serif" font-size="10" fill="#CCCCCC">Internal link structure</text>

  <rect x="50" y="220" width="196" height="50" fill="#0F3460" rx="5"/>
  <text x="68" y="239" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#E94560">Core Web Vitals</text>
  <text x="68" y="254" font-family="Inter, Arial, sans-serif" font-size="10" fill="#CCCCCC">LCP &lt; 2.5s on Safaricom 4G</text>
  <text x="68" y="266" font-family="Inter, Arial, sans-serif" font-size="10" fill="#CCCCCC">INP + CLS pass</text>

  <rect x="50" y="278" width="196" height="50" fill="#0F3460" rx="5"/>
  <text x="68" y="297" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#E94560">Schema Markup</text>
  <text x="68" y="312" font-family="Inter, Arial, sans-serif" font-size="10" fill="#CCCCCC">LocalBusiness JSON-LD</text>
  <text x="68" y="324" font-family="Inter, Arial, sans-serif" font-size="10" fill="#CCCCCC">FAQ, Product, BreadcrumbList</text>

  <rect x="50" y="336" width="196" height="50" fill="#0F3460" rx="5"/>
  <text x="68" y="355" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#E94560">Mobile-First Indexing</text>
  <text x="68" y="370" font-family="Inter, Arial, sans-serif" font-size="10" fill="#CCCCCC">Google reads mobile version</text>
  <text x="68" y="382" font-family="Inter, Arial, sans-serif" font-size="10" fill="#CCCCCC">44px touch targets, 16px text</text>

  <rect x="50" y="394" width="196" height="50" fill="#0F3460" rx="5"/>
  <text x="68" y="413" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#E94560">HTTPS + Indexation</text>
  <text x="68" y="428" font-family="Inter, Arial, sans-serif" font-size="10" fill="#CCCCCC">SSL certificate mandatory</text>
  <text x="68" y="440" font-family="Inter, Arial, sans-serif" font-size="10" fill="#CCCCCC">No accidental noindex tags</text>

  <!-- Business outcome label -->
  <rect x="50" y="452" width="196" height="30" fill="#E94560" rx="5"/>
  <text x="148" y="466" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">Outcome: INDEXATION</text>
  <text x="148" y="478" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9" fill="#FFCCCC">Pages eligible to rank</text>

  <!-- === PILLAR 2: CONTENT RELEVANCE === -->
  <rect x="288" y="98" width="224" height="430" fill="#1A1A2E" rx="8"/>
  <!-- Pillar header — red accent (middle pillar) -->
  <rect x="288" y="98" width="224" height="54" fill="#E94560" rx="8"/>
  <rect x="288" y="132" width="224" height="20" fill="#E94560"/>
  <text x="400" y="124" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">02</text>
  <text x="400" y="144" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">Content Relevance</text>

  <!-- Items -->
  <rect x="302" y="162" width="196" height="50" fill="#0F3460" rx="5"/>
  <text x="320" y="181" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#E94560">Title Tags + Meta</text>
  <text x="320" y="196" font-family="Inter, Arial, sans-serif" font-size="10" fill="#CCCCCC">Keyword + Kenya location</text>
  <text x="320" y="208" font-family="Inter, Arial, sans-serif" font-size="10" fill="#CCCCCC">50–60 chars, CTR-optimised</text>

  <rect x="302" y="220" width="196" height="50" fill="#0F3460" rx="5"/>
  <text x="320" y="239" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#E94560">Heading Hierarchy</text>
  <text x="320" y="254" font-family="Inter, Arial, sans-serif" font-size="10" fill="#CCCCCC">H1 → H2 → H3 structure</text>
  <text x="320" y="266" font-family="Inter, Arial, sans-serif" font-size="10" fill="#CCCCCC">Each H2 = query-answer pair</text>

  <rect x="302" y="278" width="196" height="50" fill="#0F3460" rx="5"/>
  <text x="320" y="297" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#E94560">Content Depth (EAV)</text>
  <text x="320" y="312" font-family="Inter, Arial, sans-serif" font-size="10" fill="#CCCCCC">Entity + Attribute + Value</text>
  <text x="320" y="324" font-family="Inter, Arial, sans-serif" font-size="10" fill="#CCCCCC">Cover all implicit questions</text>

  <rect x="302" y="336" width="196" height="50" fill="#0F3460" rx="5"/>
  <text x="320" y="355" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#E94560">Bilingual Optimization</text>
  <text x="320" y="370" font-family="Inter, Arial, sans-serif" font-size="10" fill="#CCCCCC">English + Swahili queries</text>
  <text x="320" y="382" font-family="Inter, Arial, sans-serif" font-size="10" fill="#CCCCCC">"bei", "bora", "karibu nami"</text>

  <rect x="302" y="394" width="196" height="50" fill="#0F3460" rx="5"/>
  <text x="320" y="413" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#E94560">Image Optimization</text>
  <text x="320" y="428" font-family="Inter, Arial, sans-serif" font-size="10" fill="#CCCCCC">WebP &lt; 120KB, descriptive alt</text>
  <text x="320" y="440" font-family="Inter, Arial, sans-serif" font-size="10" fill="#CCCCCC">Kenya location context in alt</text>

  <!-- Business outcome label -->
  <rect x="302" y="452" width="196" height="30" fill="#E94560" rx="5"/>
  <text x="400" y="466" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">Outcome: RELEVANCE</text>
  <text x="400" y="478" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9" fill="#FFCCCC">Matched to right queries</text>

  <!-- === PILLAR 3: AUTHORITY SIGNALS === -->
  <rect x="540" y="98" width="224" height="430" fill="#1A1A2E" rx="8"/>
  <!-- Pillar header -->
  <rect x="540" y="98" width="224" height="54" fill="#16213E" rx="8"/>
  <rect x="540" y="132" width="224" height="20" fill="#16213E"/>
  <text x="652" y="124" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#E94560">03</text>
  <text x="652" y="144" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">Authority Signals</text>

  <!-- Items -->
  <rect x="554" y="162" width="196" height="50" fill="#0F3460" rx="5"/>
  <text x="572" y="181" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#E94560">Google Business Profile</text>
  <text x="572" y="196" font-family="Inter, Arial, sans-serif" font-size="10" fill="#CCCCCC">Verified + 10+ photos</text>
  <text x="572" y="208" font-family="Inter, Arial, sans-serif" font-size="10" fill="#CCCCCC">Category + services listed</text>

  <rect x="554" y="220" width="196" height="50" fill="#0F3460" rx="5"/>
  <text x="572" y="239" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#E94560">Google Reviews</text>
  <text x="572" y="254" font-family="Inter, Arial, sans-serif" font-size="10" fill="#CCCCCC">15+ reviews, recency matters</text>
  <text x="572" y="266" font-family="Inter, Arial, sans-serif" font-size="10" fill="#CCCCCC">4.5★+ target for 3-Pack</text>

  <rect x="554" y="278" width="196" height="50" fill="#0F3460" rx="5"/>
  <text x="572" y="297" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#E94560">NAP Citations</text>
  <text x="572" y="312" font-family="Inter, Arial, sans-serif" font-size="10" fill="#CCCCCC">Yellow Pages KE, PigiaMe</text>
  <text x="572" y="324" font-family="Inter, Arial, sans-serif" font-size="10" fill="#CCCCCC">Consistent across all listings</text>

  <rect x="554" y="336" width="196" height="50" fill="#0F3460" rx="5"/>
  <text x="572" y="355" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#E94560">Backlinks</text>
  <text x="572" y="370" font-family="Inter, Arial, sans-serif" font-size="10" fill="#CCCCCC">Kenyan media, associations</text>
  <text x="572" y="382" font-family="Inter, Arial, sans-serif" font-size="10" fill="#CCCCCC">LSK, KMA, KAM directories</text>

  <rect x="554" y="394" width="196" height="50" fill="#0F3460" rx="5"/>
  <text x="572" y="413" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#E94560">User Engagement</text>
  <text x="572" y="428" font-family="Inter, Arial, sans-serif" font-size="10" fill="#CCCCCC">Dwell time, click satisfaction</text>
  <text x="572" y="440" font-family="Inter, Arial, sans-serif" font-size="10" fill="#CCCCCC">Historical data accumulates</text>

  <!-- Business outcome label -->
  <rect x="554" y="452" width="196" height="30" fill="#E94560" rx="5"/>
  <text x="652" y="466" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">Outcome: AUTHORITY</text>
  <text x="652" y="478" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9" fill="#FFCCCC">Trusted over competitors</text>

  <!-- === FOUNDATION BAR === -->
  <rect x="36" y="535" width="728" height="8" fill="#1A1A2E" rx="3"/>

  <!-- === RESULT BLOCK === -->
  <rect x="36" y="556" width="728" height="66" fill="#1A1A2E" rx="8"/>
  <!-- Downward arrow to result -->
  <polygon points="400,550 382,562 392,562 392,547 408,547 408,562 418,562" fill="#E94560"/>
  <text x="400" y="584" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF">Page One Rankings on Google.co.ke</text>
  <text x="400" y="604" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#CCCCCC">More Kenyan customers find your business before they find your competitors</text>

  <!-- === PILLAR CONNECTORS === -->
  <!-- Under pillars, lines connecting to foundation -->
  <line x1="148" y1="528" x2="148" y2="535" stroke="#E94560" stroke-width="2"/>
  <line x1="400" y1="528" x2="400" y2="535" stroke="#E94560" stroke-width="2"/>
  <line x1="652" y1="528" x2="652" y2="535" stroke="#E94560" stroke-width="2"/>

  <!-- Footer -->
  <text x="400" y="682" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#999">tupate.studio</text>
</svg>
