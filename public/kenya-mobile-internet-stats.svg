<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" width="100%" height="auto" role="img" aria-labelledby="infographic-title-9">
  <title id="infographic-title-9">Kenya Mobile Internet: The Numbers Behind Mobile-First Design</title>

  <!-- Background -->
  <rect width="800" height="620" fill="#1A1A2E" rx="12"/>

  <!-- Header -->
  <rect width="800" height="80" fill="#0A0A1A" rx="12"/>
  <rect x="0" y="68" width="800" height="12" fill="#0A0A1A"/>
  <text x="400" y="35" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#FFFFFF">Kenya Mobile Internet</text>
  <text x="400" y="60" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#E94560">The Numbers Behind Mobile-First Web Design</text>

  <!-- 4 STAT CARDS row 1 (2 across) -->
  <!-- Stat card 1 -->
  <rect x="30" y="98" width="360" height="160" fill="#16213E" rx="10"/>
  <rect x="30" y="98" width="360" height="6" fill="#E94560" rx="10"/>
  <text x="210" y="150" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="64" font-weight="700" fill="#E94560">80%+</text>
  <text x="210" y="185" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">of Kenyan internet users</text>
  <text x="210" y="207" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#AAAAAA">are browsing on mobile phones</text>
  <text x="210" y="247" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#777777">Source: CA Kenya / Google Consumer Barometer</text>

  <!-- Stat card 2 -->
  <rect x="410" y="98" width="360" height="160" fill="#16213E" rx="10"/>
  <rect x="410" y="98" width="360" height="6" fill="#E94560" rx="10"/>
  <text x="590" y="150" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="64" font-weight="700" fill="#E94560">93%</text>
  <text x="590" y="185" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">of Kenya covered by</text>
  <text x="590" y="207" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#AAAAAA">Safaricom 4G network</text>
  <text x="590" y="247" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#777777">Source: Safaricom Annual Report</text>

  <!-- Stat card 3 -->
  <rect x="30" y="272" width="360" height="160" fill="#16213E" rx="10"/>
  <rect x="30" y="272" width="360" height="6" fill="#E94560" rx="10"/>
  <text x="210" y="324" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="64" font-weight="700" fill="#E94560">90%+</text>
  <text x="210" y="359" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">Android market share</text>
  <text x="210" y="381" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#AAAAAA">in Kenya — optimize for Android first</text>
  <text x="210" y="421" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#777777">Source: StatCounter Kenya</text>

  <!-- Stat card 4 -->
  <rect x="410" y="272" width="360" height="160" fill="#16213E" rx="10"/>
  <rect x="410" y="272" width="360" height="6" fill="#E94560" rx="10"/>
  <text x="590" y="324" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="64" font-weight="700" fill="#E94560">53%</text>
  <text x="590" y="359" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">of users abandon sites</text>
  <text x="590" y="381" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#AAAAAA">that take 3+ seconds to load</text>
  <text x="590" y="421" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#777777">Source: Google / Think with Google</text>

  <!-- Device row -->
  <rect x="30" y="446" width="740" height="120" fill="#0F3460" rx="10"/>
  <text x="400" y="472" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">Common Kenyan Devices Your Website Must Work On:</text>

  <!-- Device 1 -->
  <rect x="55" y="484" width="190" height="66" fill="#16213E" rx="6"/>
  <text x="150" y="511" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" fill="#FFFFFF">📱</text>
  <text x="150" y="532" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#E94560">Tecno Spark</text>
  <text x="150" y="548" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#AAAAAA">Budget · Most popular</text>

  <!-- Device 2 -->
  <rect x="305" y="484" width="190" height="66" fill="#16213E" rx="6"/>
  <text x="400" y="511" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" fill="#FFFFFF">📱</text>
  <text x="400" y="532" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#E94560">Infinix Hot</text>
  <text x="400" y="548" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#AAAAAA">Mid-range · Common</text>

  <!-- Device 3 -->
  <rect x="555" y="484" width="190" height="66" fill="#16213E" rx="6"/>
  <text x="650" y="511" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" fill="#FFFFFF">📱</text>
  <text x="650" y="532" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#E94560">Samsung A-Series</text>
  <text x="650" y="548" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#AAAAAA">Premium segment</text>

  <!-- Bottom bar -->
  <rect x="30" y="576" width="740" height="26" fill="#E94560" rx="5"/>
  <text x="400" y="594" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">Tupate Studio builds every site mobile-first — tested on real Kenyan devices.</text>

  <!-- Footer -->
  <text x="400" y="613" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#999999">tupate.studio</text>
</svg>
