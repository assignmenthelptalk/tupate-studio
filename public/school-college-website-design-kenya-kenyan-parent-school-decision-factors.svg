<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1040" width="100%" role="img" aria-labelledby="infographic-title" version="1.1">
  <title id="infographic-title">7 Things Kenyan Parents Check on a School Website Before Making First Contact</title>

  <!-- Background -->
  <rect width="800" height="1040" fill="#1A1A2E"/>

  <!-- Header -->
  <rect x="0" y="0" width="800" height="96" fill="#16213E"/>
  <text x="400" y="26" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#E94560" font-weight="700" text-anchor="middle" letter-spacing="2">SCHOOL AND COLLEGE WEBSITE DESIGN — KENYA</text>
  <text x="400" y="56" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="21" fill="#F5F5F5" font-weight="700" text-anchor="middle">Kenyan Parent School Decision Factors</text>
  <text x="400" y="80" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" fill="#CCCCCC" text-anchor="middle">Kenyan parents visit 4–6 school websites and assess 7 factors before contacting any admissions team</text>

  <!-- Priority banner -->
  <rect x="30" y="106" width="740" height="32" rx="4" fill="#E94560"/>
  <text x="400" y="126" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" fill="#FFFFFF" font-weight="700" text-anchor="middle">Any factor missing from your website = parent moves to the next school on their search results list</text>

  <!-- Factor 1 -->
  <rect x="30" y="150" width="740" height="106" rx="6" fill="#16213E"/>
  <rect x="30" y="150" width="8" height="106" rx="4" fill="#E94560"/>

  <rect x="50" y="166" width="52" height="52" rx="6" fill="#E94560"/>
  <text x="76" y="186" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#FFFFFF" font-weight="700" text-anchor="middle">MOST</text>
  <text x="76" y="200" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#FFFFFF" font-weight="700" text-anchor="middle">CRITICAL</text>
  <text x="76" y="214" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#FFFFFF" font-weight="700" text-anchor="middle">#1</text>

  <text x="118" y="178" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="15" fill="#E94560" font-weight="700">FEE STRUCTURE</text>
  <text x="118" y="198" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">Per-term KES fees (not annual) · Boarding vs day school distinction · What is included vs not included</text>
  <text x="118" y="216" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">School website hiding fees loses parents who would have enrolled — they move to a school showing pricing</text>
  <text x="118" y="236" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#999999">Kenyan parents comparison-shop schools by fee before any physical visit — transparency is a conversion strategy</text>

  <!-- Factor 2 -->
  <rect x="30" y="268" width="740" height="106" rx="6" fill="#16213E"/>
  <rect x="30" y="268" width="8" height="106" rx="4" fill="#E94560"/>

  <rect x="50" y="284" width="52" height="52" rx="6" fill="#2C2C2C"/>
  <text x="76" y="314" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="20" fill="#E94560" font-weight="700" text-anchor="middle">#2</text>

  <text x="118" y="296" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="15" fill="#E94560" font-weight="700">CURRICULUM</text>
  <text x="118" y="316" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">CBC (Grade 1–9 from 2019) · Legacy 8-4-4 (existing KCSE candidates) · IGCSE / A-level / IB (premium)</text>
  <text x="118" y="334" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">Must state which framework applies — "quality education" without curriculum specificity fails the clarity test</text>
  <text x="118" y="354" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#999999">Grade 7–9 Junior Secondary (JSS): if offered, state this prominently — parents of Grade 7 children search specifically for JSS</text>

  <!-- Factor 3 -->
  <rect x="30" y="386" width="740" height="106" rx="6" fill="#16213E"/>
  <rect x="30" y="386" width="8" height="106" rx="4" fill="#E94560"/>

  <rect x="50" y="402" width="52" height="52" rx="6" fill="#2C2C2C"/>
  <text x="76" y="432" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="20" fill="#E94560" font-weight="700" text-anchor="middle">#3</text>

  <text x="118" y="414" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="15" fill="#E94560" font-weight="700">ACADEMIC RESULTS</text>
  <text x="118" y="434" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">Secondary: KCSE mean grade (5-year trend preferred, not just best year) + university placement rate via KUCCPS</text>
  <text x="118" y="452" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">Primary: KCPE results · Professional colleges: job placement rate after completion</text>
  <text x="118" y="472" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#999999">Mean grade B+ vs C+ is a completely different academic offer — parents searching for competitive environments need this data</text>

  <!-- Factor 4 -->
  <rect x="30" y="504" width="355" height="106" rx="6" fill="#16213E"/>
  <rect x="30" y="504" width="8" height="106" rx="4" fill="#E94560"/>

  <rect x="50" y="520" width="52" height="52" rx="6" fill="#2C2C2C"/>
  <text x="76" y="550" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="20" fill="#E94560" font-weight="700" text-anchor="middle">#4</text>

  <text x="118" y="530" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" fill="#E94560" font-weight="700">LOCATION — GOOGLE MAPS</text>
  <text x="52" y="562" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">Parents assess commute feasibility before shortlisting</text>
  <text x="52" y="580" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">Boarding: nearest major Kenyan town for holiday logistics</text>
  <text x="52" y="600" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#999999">Google Maps embed on homepage and contact page</text>

  <rect x="415" y="504" width="355" height="106" rx="6" fill="#16213E"/>
  <rect x="415" y="504" width="8" height="106" rx="4" fill="#E94560"/>

  <rect x="435" y="520" width="52" height="52" rx="6" fill="#2C2C2C"/>
  <text x="461" y="550" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="20" fill="#E94560" font-weight="700" text-anchor="middle">#5</text>

  <text x="503" y="530" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" fill="#E94560" font-weight="700">BOARDING vs DAY SCHOOL</text>
  <text x="437" y="562" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">Clearly stated with separate per-term pricing</text>
  <text x="437" y="580" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">Presenting only one option when both exist reduces enrolments</text>
  <text x="437" y="600" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#999999">Many Kenyan families consider both options</text>

  <!-- Factor 6 -->
  <rect x="30" y="622" width="355" height="120" rx="6" fill="#16213E"/>
  <rect x="30" y="622" width="8" height="120" rx="4" fill="#E94560"/>

  <rect x="50" y="638" width="52" height="52" rx="6" fill="#2C2C2C"/>
  <text x="76" y="668" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="20" fill="#E94560" font-weight="700" text-anchor="middle">#6</text>

  <text x="118" y="648" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" fill="#E94560" font-weight="700">FACILITIES PHOTOS</text>
  <text x="52" y="680" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">Classrooms · Science labs · Computer labs</text>
  <text x="52" y="698" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">Sports facilities · Dormitories · Dining hall</text>
  <text x="52" y="716" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">No photos = parent must visit blind to assess quality</text>
  <text x="52" y="734" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#999999">Well-equipped lab = strong KCSE science signal</text>

  <!-- Factor 7 -->
  <rect x="415" y="622" width="355" height="120" rx="6" fill="#16213E"/>
  <rect x="415" y="622" width="8" height="120" rx="4" fill="#E94560"/>

  <rect x="435" y="638" width="52" height="52" rx="6" fill="#2C2C2C"/>
  <text x="461" y="668" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="20" fill="#E94560" font-weight="700" text-anchor="middle">#7</text>

  <text x="503" y="648" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" fill="#E94560" font-weight="700">EXTRACURRICULAR ACTIVITIES</text>
  <text x="437" y="680" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">Sports teams · Music · Debate · Drama</text>
  <text x="437" y="698" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">Holistic development priorities influence school choice</text>
  <text x="437" y="716" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">Achievement photos demonstrate culture and community</text>
  <text x="437" y="734" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#999999">Prize-giving · sports day · drama performances</text>

  <!-- Admissions workflow -->
  <rect x="30" y="756" width="740" height="36" rx="4" fill="#E94560"/>
  <text x="400" y="779" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" fill="#FFFFFF" font-weight="700" text-anchor="middle">ADMISSIONS CONVERSION WORKFLOW</text>

  <rect x="30" y="796" width="740" height="80" rx="4" fill="#16213E"/>

  <!-- Flow steps -->
  <rect x="50" y="808" width="130" height="50" rx="3" fill="#1A1A2E"/>
  <text x="115" y="830" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#E94560" font-weight="600" text-anchor="middle">Parent submits</text>
  <text x="115" y="846" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#F5F5F5" text-anchor="middle">online application</text>

  <text x="200" y="838" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="16" fill="#E94560" text-anchor="middle">→</text>

  <rect x="210" y="808" width="130" height="50" rx="3" fill="#1A1A2E"/>
  <text x="275" y="830" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#E94560" font-weight="600" text-anchor="middle">Auto email</text>
  <text x="275" y="846" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#F5F5F5" text-anchor="middle">confirmation sent</text>

  <text x="360" y="838" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="16" fill="#E94560" text-anchor="middle">→</text>

  <rect x="370" y="808" width="130" height="50" rx="3" fill="#1A1A2E"/>
  <text x="435" y="830" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#E94560" font-weight="600" text-anchor="middle">WhatsApp alert</text>
  <text x="435" y="846" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#F5F5F5" text-anchor="middle">to admissions team</text>

  <text x="520" y="838" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="16" fill="#E94560" text-anchor="middle">→</text>

  <rect x="530" y="808" width="230" height="50" rx="3" fill="#E94560"/>
  <text x="645" y="830" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#FFFFFF" font-weight="700" text-anchor="middle">WhatsApp follow-up</text>
  <text x="645" y="846" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#FFFFFF" text-anchor="middle">within 24 hours — 2026 standard</text>

  <!-- M-Pesa payment note -->
  <rect x="30" y="890" width="740" height="60" rx="4" fill="#16213E"/>
  <text x="52" y="910" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#CCCCCC">M-Pesa Paybill: Paybill number + account reference format (student admission number) displayed prominently on fee page</text>
  <text x="52" y="928" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#CCCCCC">Application deposit via M-Pesa integrated at point of form submission — streamlines admissions for both parents and school</text>
  <text x="52" y="946" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#999999">Kenya education calendar: Term 1 (Jan–Apr) · Term 2 (May–Aug) · Term 3 (Sep–Nov) — high inquiry volume in January before Term 1</text>

  <!-- Footer -->
  <text x="400" y="1022" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#999999" text-anchor="middle">tupate.studio</text>
</svg>
