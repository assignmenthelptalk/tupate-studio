<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 680" width="100%" height="auto" role="img" aria-labelledby="infographic-title-7">
  <title id="infographic-title-7">Custom-Built vs WordPress: The Kenya Performance Reality</title>

  <!-- Background -->
  <rect width="800" height="680" fill="#F5F5F5" rx="12"/>

  <!-- Header -->
  <rect width="800" height="80" fill="#1A1A2E" rx="12"/>
  <rect x="0" y="68" width="800" height="12" fill="#1A1A2E"/>
  <text x="400" y="36" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#FFFFFF">Custom-Built vs WordPress</text>
  <text x="400" y="60" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#E94560">The Kenya Performance Reality</text>

  <!-- Column headers -->
  <rect x="30" y="90" width="55" height="50" fill="#EEEEEE" rx="4 4 0 0"/>
  <text x="57" y="122" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#555555">Metric</text>

  <rect x="91" y="90" width="330" height="50" fill="#1A1A2E" rx="4 4 0 0"/>
  <text x="256" y="112" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF">Custom-Built Website</text>
  <text x="256" y="132" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#4CAF50">Tupate Studio — Direct Code</text>

  <rect x="430" y="90" width="340" height="50" fill="#888888" rx="4 4 0 0"/>
  <text x="600" y="112" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF">WordPress Website</text>
  <text x="600" y="132" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#FFCCCC">Plugin-heavy · Common in Kenya</text>

  <!-- Row labels and data -->
  <!-- Row 1: Page Size -->
  <rect x="30" y="146" width="55" height="60" fill="#F0F0F0"/>
  <text x="57" y="171" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#555555" font-weight="700">Page</text>
  <text x="57" y="184" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#555555" font-weight="700">Size</text>

  <rect x="91" y="146" width="330" height="60" fill="#E8F5E9"/>
  <text x="256" y="169" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#1A1A2E">200–600 KB</text>
  <text x="256" y="192" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#4CAF50">✓ Fast on Safaricom 4G</text>

  <rect x="430" y="146" width="340" height="60" fill="#FFEBEE"/>
  <text x="600" y="169" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#C62828">2–4 MB</text>
  <text x="600" y="192" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#C62828">✗ Slow on mobile data</text>

  <!-- Row 2: Mobile PageSpeed -->
  <rect x="30" y="212" width="55" height="60" fill="#EEEEEE"/>
  <text x="57" y="237" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#555555" font-weight="700">Mobile</text>
  <text x="57" y="250" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#555555" font-weight="700">PageSpeed</text>

  <rect x="91" y="212" width="330" height="60" fill="#E8F5E9"/>
  <text x="256" y="235" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#1A1A2E">88–98 / 100</text>
  <text x="256" y="258" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#4CAF50">✓ Google "Good" score</text>

  <rect x="430" y="212" width="340" height="60" fill="#FFEBEE"/>
  <text x="600" y="235" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#C62828">35–55 / 100</text>
  <text x="600" y="258" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#C62828">✗ Google "Needs Improvement"</text>

  <!-- Row 3: LCP -->
  <rect x="30" y="278" width="55" height="60" fill="#F0F0F0"/>
  <text x="57" y="303" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#555555" font-weight="700">LCP</text>
  <text x="57" y="316" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#555555" font-weight="700">Score</text>

  <rect x="91" y="278" width="330" height="60" fill="#E8F5E9"/>
  <text x="256" y="301" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#1A1A2E">1.4s</text>
  <text x="256" y="324" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#4CAF50">✓ PASS — Google Core Web Vitals</text>

  <rect x="430" y="278" width="340" height="60" fill="#FFEBEE"/>
  <text x="600" y="301" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#C62828">4.8s</text>
  <text x="600" y="324" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#C62828">✗ FAIL — Penalised by Google</text>

  <!-- Row 4: Security -->
  <rect x="30" y="344" width="55" height="60" fill="#EEEEEE"/>
  <text x="57" y="369" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#555555" font-weight="700">Security</text>
  <text x="57" y="382" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#555555" font-weight="700">Risk</text>

  <rect x="91" y="344" width="330" height="60" fill="#E8F5E9"/>
  <text x="256" y="367" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#1A1A2E">Low</text>
  <text x="256" y="390" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#4CAF50">✓ No plugin attack surface</text>

  <rect x="430" y="344" width="340" height="60" fill="#FFEBEE"/>
  <text x="600" y="367" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#C62828">High</text>
  <text x="600" y="390" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#C62828">✗ Common hack target in Kenya</text>

  <!-- Row 5: 3-Year Cost -->
  <rect x="30" y="410" width="55" height="60" fill="#F0F0F0"/>
  <text x="57" y="435" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#555555" font-weight="700">3-Year</text>
  <text x="57" y="448" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#555555" font-weight="700">Cost</text>

  <rect x="91" y="410" width="330" height="60" fill="#E8F5E9"/>
  <text x="256" y="433" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#1A1A2E">Ksh 25,000 base</text>
  <text x="256" y="456" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#4CAF50">✓ Hosting + no monthly fees</text>

  <rect x="430" y="410" width="340" height="60" fill="#FFEBEE"/>
  <text x="600" y="433" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#C62828">Ksh 120K–255K total</text>
  <text x="600" y="456" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#C62828">✗ Themes + plugins + dev fixes</text>

  <!-- Row 6: M-Pesa Integration -->
  <rect x="30" y="476" width="55" height="60" fill="#EEEEEE"/>
  <text x="57" y="501" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#555555" font-weight="700">M-Pesa</text>
  <text x="57" y="514" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#555555" font-weight="700">Integration</text>

  <rect x="91" y="476" width="330" height="60" fill="#E8F5E9"/>
  <text x="256" y="499" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#1A1A2E">Direct Daraja API</text>
  <text x="256" y="522" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#4CAF50">✓ Native STK Push — no middleware</text>

  <rect x="430" y="476" width="340" height="60" fill="#FFEBEE"/>
  <text x="600" y="499" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#C62828">Third-party plugin</text>
  <text x="600" y="522" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#C62828">✗ Breaks on WP updates</text>

  <!-- Winner banner -->
  <rect x="30" y="548" width="760" height="68" fill="#1A1A2E" rx="6"/>
  <rect x="30" y="548" width="380" height="68" fill="#4CAF50" rx="6"/>
  <rect x="30" y="575" width="380" height="41" fill="#4CAF50"/>
  <text x="220" y="576" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">✓ Custom Wins on Every Metric</text>
  <text x="220" y="598" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#FFFFFF">Purpose-built for Kenyan performance</text>
  <text x="600" y="576" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#FFAAAA">✗ WordPress Costs More Long-Term</text>
  <text x="600" y="598" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#AAAAAA">Maintenance, plugins, and hacks add up</text>

  <!-- Footer -->
  <text x="400" y="650" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#999999">tupate.studio</text>
</svg>
