<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1080" width="100%" role="img" aria-labelledby="infographic-title" version="1.1">
  <title id="infographic-title">6-Step Digital Adoption Roadmap for Kenyan SMEs</title>

  <!-- Background -->
  <rect width="800" height="1080" fill="#1A1A2E"/>

  <!-- Header -->
  <rect x="0" y="0" width="800" height="90" fill="#16213E"/>
  <text x="400" y="38" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="22" font-weight="700" fill="#FFFFFF" text-anchor="middle">6-Step Digital Adoption Roadmap</text>
  <text x="400" y="65" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" fill="#E94560" text-anchor="middle">For Kenyan SMEs — From Zero to Consistent Online Revenue</text>

  <!-- Timeline line -->
  <line x1="80" y1="140" x2="80" y2="960" stroke="#E94560" stroke-width="3" opacity="0.4"/>

  <!-- ====== STEP 1 ====== -->
  <!-- Step badge -->
  <circle cx="80" cy="170" r="24" fill="#E94560"/>
  <text x="80" y="175" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text>

  <rect x="120" y="140" width="620" height="120" rx="8" fill="#16213E"/>
  <rect x="120" y="140" width="620" height="5" rx="3" fill="#E94560"/>

  <text x="142" y="168" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">Google Business Profile</text>
  <rect x="580" y="148" width="140" height="22" rx="11" fill="#E94560" opacity="0.2"/>
  <text x="650" y="163" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#E94560" text-anchor="middle">FREE — Week 1</text>
  <text x="142" y="192" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">Create at business.google.com — verify listing — appear in Google Maps searches</text>
  <text x="142" y="212" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#999">Complete: hours, category, phone, photos, respond to reviews</text>
  <text x="142" y="232" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#999">Local search visibility within days. Zero cost. Fastest digital entry point.</text>

  <!-- ====== STEP 2 ====== -->
  <circle cx="80" cy="300" r="24" fill="#E94560"/>
  <text x="80" y="305" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">2</text>

  <rect x="120" y="270" width="620" height="120" rx="8" fill="#16213E"/>
  <rect x="120" y="270" width="620" height="5" rx="3" fill="#E94560"/>

  <text x="142" y="298" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">Professional Business Website</text>
  <rect x="540" y="278" width="180" height="22" rx="11" fill="#E94560" opacity="0.2"/>
  <text x="630" y="293" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#E94560" text-anchor="middle">From Ksh 25,000 — Month 1</text>
  <text x="142" y="322" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">Custom-coded by Tupate Studio — not WordPress — owned permanently by the business</text>
  <text x="142" y="342" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#999">Faster load times on Safaricom 4G | Cleaner code for Google crawlers</text>
  <text x="142" y="362" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#999">Google-indexable branded presence. No algorithm risk. No account suspension.</text>

  <!-- ====== STEP 3 ====== -->
  <circle cx="80" cy="430" r="24" fill="#E94560"/>
  <text x="80" y="435" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">3</text>

  <rect x="120" y="400" width="620" height="120" rx="8" fill="#16213E"/>
  <rect x="120" y="400" width="620" height="5" rx="3" fill="#E94560"/>

  <text x="142" y="428" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">M-Pesa Integration</text>
  <rect x="580" y="408" width="140" height="22" rx="11" fill="#E94560" opacity="0.2"/>
  <text x="650" y="423" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#E94560" text-anchor="middle">Month 1 — Critical</text>
  <text x="142" y="452" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">Paybill prominently displayed at minimum — Daraja API STK Push for e-commerce</text>
  <text x="142" y="472" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#999">30M+ M-Pesa users transact without cards — no integration = lost sales</text>
  <text x="142" y="492" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#999">C2B STK Push: customer pays from Safaricom phone, PIN confirms in seconds</text>

  <!-- ====== STEP 4 ====== -->
  <circle cx="80" cy="560" r="24" fill="#E94560"/>
  <text x="80" y="565" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">4</text>

  <rect x="120" y="530" width="620" height="120" rx="8" fill="#16213E"/>
  <rect x="120" y="530" width="620" height="5" rx="3" fill="#E94560"/>

  <text x="142" y="558" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">SEO — On-Page Optimisation</text>
  <rect x="530" y="538" width="190" height="22" rx="11" fill="#E94560" opacity="0.2"/>
  <text x="625" y="553" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#E94560" text-anchor="middle">Ksh 8,000/month — Month 1+</text>
  <text x="142" y="582" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">Title tags, meta descriptions, headings, Kenya-specific keyword targeting</text>
  <text x="142" y="602" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#999">Builds over 3–12 months — then produces free recurring traffic indefinitely</text>
  <text x="142" y="622" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#999">GSC + GA4 conversion tracking included — measure every Kenyan lead</text>

  <!-- ====== STEP 5 ====== -->
  <circle cx="80" cy="690" r="24" fill="#E94560"/>
  <text x="80" y="695" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">5</text>

  <rect x="120" y="660" width="620" height="120" rx="8" fill="#16213E"/>
  <rect x="120" y="660" width="620" height="5" rx="3" fill="#E94560"/>

  <text x="142" y="688" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">Content — Topical Authority Building</text>
  <rect x="530" y="668" width="190" height="22" rx="11" fill="#E94560" opacity="0.2"/>
  <text x="625" y="683" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#E94560" text-anchor="middle">2 articles/month — Month 2+</text>
  <text x="142" y="712" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">Publish educational guides answering questions Kenyan customers type into Google</text>
  <text x="142" y="732" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#999">Example: plumbing co. publishes borehole, pipe standards, water pressure articles</text>
  <text x="142" y="752" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#999">Content compounds: 2025 article generates leads in 2027</text>

  <!-- ====== STEP 6 ====== -->
  <circle cx="80" cy="820" r="24" fill="#E94560"/>
  <text x="80" y="825" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">6</text>

  <rect x="120" y="790" width="620" height="140" rx="8" fill="#16213E"/>
  <rect x="120" y="790" width="620" height="5" rx="3" fill="#E94560"/>

  <text x="142" y="818" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">Paid Advertising — Google Ads</text>
  <rect x="500" y="798" width="220" height="22" rx="11" fill="#E94560" opacity="0.2"/>
  <text x="610" y="813" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#E94560" text-anchor="middle">Ksh 15K–25K/month — Month 3+</text>
  <text x="142" y="842" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">Google Ads accelerates customer acquisition once website is converting</text>
  <text x="142" y="862" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#999">Managed at 15% agency fee by Tupate Studio</text>
  <text x="142" y="882" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#999">Paid follows, never replaces, organic foundation</text>
  <text x="142" y="902" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#999">Cost per lead: Marketing Ksh ÷ WhatsApp conversion events = Ksh per lead</text>

  <!-- ====== TIMELINE ====== -->
  <rect x="40" y="950" width="720" height="80" rx="8" fill="#16213E"/>
  <text x="400" y="972" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" font-weight="700" fill="#E94560" text-anchor="middle">EXPECTED TIMELINE TO RESULTS</text>

  <!-- Timeline markers -->
  <line x1="80" y1="992" x2="720" y2="992" stroke="#2C2C2C" stroke-width="2"/>

  <circle cx="80" cy="992" r="5" fill="#E94560"/>
  <text x="80" y="1010" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#999" text-anchor="middle">Day 1</text>
  <text x="80" y="1022" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9" fill="#999" text-anchor="middle">GBP live</text>

  <circle cx="240" cy="992" r="5" fill="#E94560"/>
  <text x="240" y="1010" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#999" text-anchor="middle">Month 1–3</text>
  <text x="240" y="1022" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9" fill="#999" text-anchor="middle">First online leads</text>

  <circle cx="400" cy="992" r="5" fill="#E94560"/>
  <text x="400" y="1010" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#999" text-anchor="middle">Month 3–6</text>
  <text x="400" y="1022" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9" fill="#999" text-anchor="middle">SEO rankings building</text>

  <circle cx="560" cy="992" r="5" fill="#E94560"/>
  <text x="560" y="1010" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#F5F5F5" text-anchor="middle">Month 6–12</text>
  <text x="560" y="1022" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9" fill="#F5F5F5" text-anchor="middle">Consistent online revenue</text>

  <circle cx="720" cy="992" r="5" fill="#E94560"/>
  <text x="720" y="1010" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#E94560" text-anchor="middle">Year 2+</text>
  <text x="720" y="1022" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9" fill="#E94560" text-anchor="middle">Compounding advantage</text>

  <!-- Footer -->
  <text x="400" y="1072" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#999" text-anchor="middle">tupate.studio</text>
</svg>
