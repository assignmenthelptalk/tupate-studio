<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700" width="100%" role="img" aria-labelledby="infographic-title-2" version="1.1">
  <title id="infographic-title-2">WooCommerce M-Pesa Plugin Comparison for Kenyan Businesses</title>
  <defs>
    <linearGradient id="hg2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1A1A2E" />
      <stop offset="100%" style="stop-color:#16213E" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="700" fill="#F5F5F5" />

  <!-- Header -->
  <rect width="800" height="76" fill="url(#hg2)" />
  <text x="400" y="28" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="19" font-weight="700" fill="#FFFFFF" text-anchor="middle">WooCommerce M-Pesa Plugin Comparison</text>
  <text x="400" y="55" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" fill="#E94560" text-anchor="middle">For Kenyan E-Commerce Businesses</text>

  <!-- Table header row -->
  <rect x="30" y="88" width="740" height="36" rx="4" fill="#16213E" />
  <text x="140" y="111" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#E94560" text-anchor="middle">Plugin</text>
  <text x="290" y="111" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#E94560" text-anchor="middle">Cost</text>
  <text x="415" y="111" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#E94560" text-anchor="middle">Payment Methods</text>
  <text x="565" y="111" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#E94560" text-anchor="middle">Best For</text>
  <text x="710" y="111" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#E94560" text-anchor="middle">Risk</text>

  <!-- Column dividers in header -->
  <line x1="218" y1="88" x2="218" y2="124" stroke="#2C2C2C" stroke-width="0.5" />
  <line x1="352" y1="88" x2="352" y2="124" stroke="#2C2C2C" stroke-width="0.5" />
  <line x1="490" y1="88" x2="490" y2="124" stroke="#2C2C2C" stroke-width="0.5" />
  <line x1="638" y1="88" x2="638" y2="124" stroke="#2C2C2C" stroke-width="0.5" />

  <!-- Row 1 — Osen Concepts (highlight: recommended) -->
  <rect x="30" y="124" width="740" height="70" rx="0" fill="#FFFFFF" />
  <rect x="30" y="124" width="6" height="70" fill="#E94560" />
  <text x="145" y="148" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#1A1A2E" text-anchor="middle">WooCommerce M-Pesa</text>
  <text x="145" y="163" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#2C2C2C" text-anchor="middle">by Osen Concepts</text>
  <rect x="80" y="176" width="120" height="12" rx="6" fill="#E94560" opacity="0.15" />
  <text x="140" y="186" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9" fill="#E94560" text-anchor="middle">Most Widely Used</text>
  <text x="290" y="155" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" font-weight="700" fill="#1A1A2E" text-anchor="middle">Free</text>
  <text x="290" y="172" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#2C2C2C" text-anchor="middle">WordPress repo</text>
  <text x="415" y="155" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#1A1A2E" text-anchor="middle">STK Push</text>
  <text x="415" y="170" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#2C2C2C" text-anchor="middle">Daraja API (M-Pesa only)</text>
  <text x="565" y="152" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#1A1A2E" text-anchor="middle">Standard Kenyan</text>
  <text x="565" y="165" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#1A1A2E" text-anchor="middle">WooCommerce store</text>
  <text x="565" y="178" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#1A1A2E" text-anchor="middle">with local customers</text>
  <text x="710" y="158" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#E94560" text-anchor="middle">Third-party</text>
  <text x="710" y="171" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#E94560" text-anchor="middle">dependency</text>

  <!-- Row divider -->
  <line x1="30" y1="194" x2="770" y2="194" stroke="#F5F5F5" stroke-width="2" />

  <!-- Row 2 — Safaricom Official -->
  <rect x="30" y="194" width="740" height="70" rx="0" fill="#FFFFFF" opacity="0.6" />
  <rect x="30" y="194" width="6" height="70" fill="#16213E" />
  <text x="145" y="218" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#1A1A2E" text-anchor="middle">Safaricom Official</text>
  <text x="145" y="233" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#2C2C2C" text-anchor="middle">WooCommerce Plugin</text>
  <rect x="80" y="246" width="120" height="12" rx="6" fill="#16213E" opacity="0.1" />
  <text x="140" y="256" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9" fill="#16213E" text-anchor="middle">Vendor-Supported</text>
  <text x="290" y="225" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" font-weight="700" fill="#1A1A2E" text-anchor="middle">Free</text>
  <text x="290" y="242" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#2C2C2C" text-anchor="middle">Official Safaricom</text>
  <text x="415" y="225" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#1A1A2E" text-anchor="middle">STK Push</text>
  <text x="415" y="240" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#2C2C2C" text-anchor="middle">Direct Daraja integration</text>
  <text x="565" y="222" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#1A1A2E" text-anchor="middle">Businesses wanting</text>
  <text x="565" y="235" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#1A1A2E" text-anchor="middle">no third-party plugin</text>
  <text x="565" y="248" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#1A1A2E" text-anchor="middle">dependency</text>
  <text x="710" y="228" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#4CAF50" text-anchor="middle">Lowest risk</text>
  <text x="710" y="241" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#4CAF50" text-anchor="middle">(vendor support)</text>

  <line x1="30" y1="264" x2="770" y2="264" stroke="#F5F5F5" stroke-width="2" />

  <!-- Row 3 — Pesapal -->
  <rect x="30" y="264" width="740" height="70" fill="#FFFFFF" opacity="0.6" />
  <rect x="30" y="264" width="6" height="70" fill="#E94560" opacity="0.6" />
  <text x="145" y="288" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#1A1A2E" text-anchor="middle">Pesapal WooCommerce</text>
  <text x="145" y="303" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#2C2C2C" text-anchor="middle">Gateway</text>
  <rect x="80" y="316" width="120" height="12" rx="6" fill="#E94560" opacity="0.1" />
  <text x="140" y="326" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9" fill="#E94560" text-anchor="middle">Multi-Channel Payments</text>
  <text x="290" y="290" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#1A1A2E" text-anchor="middle">2–3.5% per txn</text>
  <text x="290" y="307" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#2C2C2C" text-anchor="middle">volume tiers apply</text>
  <text x="415" y="288" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#1A1A2E" text-anchor="middle">M-Pesa + Visa/MC</text>
  <text x="415" y="303" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#2C2C2C" text-anchor="middle">Single plugin, 2 methods</text>
  <text x="565" y="288" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#1A1A2E" text-anchor="middle">Mixed domestic +</text>
  <text x="565" y="301" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#1A1A2E" text-anchor="middle">international customers</text>
  <text x="710" y="295" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#E94560" text-anchor="middle">Per-txn fee</text>
  <text x="710" y="308" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#E94560" text-anchor="middle">adds up at scale</text>

  <line x1="30" y1="334" x2="770" y2="334" stroke="#F5F5F5" stroke-width="2" />

  <!-- Row 4 — iPay Africa -->
  <rect x="30" y="334" width="740" height="70" fill="#FFFFFF" opacity="0.6" />
  <rect x="30" y="334" width="6" height="70" fill="#2C2C2C" />
  <text x="145" y="358" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#1A1A2E" text-anchor="middle">iPay Africa</text>
  <text x="145" y="373" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#2C2C2C" text-anchor="middle">WooCommerce Gateway</text>
  <rect x="80" y="386" width="120" height="12" rx="6" fill="#2C2C2C" opacity="0.08" />
  <text x="140" y="396" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9" fill="#2C2C2C" text-anchor="middle">Kenya-Regulated</text>
  <text x="290" y="360" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#1A1A2E" text-anchor="middle">Per-txn fees</text>
  <text x="290" y="377" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#2C2C2C" text-anchor="middle">see iPay rate card</text>
  <text x="415" y="358" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#1A1A2E" text-anchor="middle">M-Pesa + Card</text>
  <text x="415" y="373" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#2C2C2C" text-anchor="middle">+ Bank transfer</text>
  <text x="565" y="358" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#1A1A2E" text-anchor="middle">Kenya-regulated</text>
  <text x="565" y="371" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#1A1A2E" text-anchor="middle">multi-method needs</text>
  <text x="710" y="365" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#E94560" text-anchor="middle">Per-txn fee</text>
  <text x="710" y="378" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#E94560" text-anchor="middle">+ dependency</text>

  <!-- Column dividers (full table) -->
  <line x1="218" y1="124" x2="218" y2="404" stroke="#F5F5F5" stroke-width="1.5" />
  <line x1="352" y1="124" x2="352" y2="404" stroke="#F5F5F5" stroke-width="1.5" />
  <line x1="490" y1="124" x2="490" y2="404" stroke="#F5F5F5" stroke-width="1.5" />
  <line x1="638" y1="124" x2="638" y2="404" stroke="#F5F5F5" stroke-width="1.5" />

  <!-- Table border -->
  <rect x="30" y="124" width="740" height="280" rx="0" fill="none" stroke="#2C2C2C" stroke-width="1" />

  <!-- Warning box -->
  <rect x="30" y="420" width="740" height="80" rx="8" fill="#1A1A2E" />
  <rect x="30" y="420" width="8" height="80" rx="4" fill="#E94560" />
  <text x="52" y="443" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" font-weight="700" fill="#E94560">Critical Limitation: Third-Party Plugin Dependency</text>
  <text x="52" y="462" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10.5" fill="#F5F5F5">If a plugin is abandoned or becomes incompatible with a WordPress / WooCommerce update, payment processing breaks</text>
  <text x="52" y="479" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10.5" fill="#F5F5F5">until fixed. Revenue-critical Kenyan operations require direct Daraja API integration — no plugin, no middleman, no fees.</text>
  <text x="52" y="494" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#999">Tupate Studio builds direct Daraja API integrations for non-WordPress Kenyan websites.</text>

  <!-- Comparison bars: Transaction Limits -->
  <text x="400" y="528" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" fill="#1A1A2E" text-anchor="middle">STK Push Transaction Limits</text>

  <rect x="30" y="540" width="740" height="64" rx="8" fill="#FFFFFF" />
  <text x="50" y="562" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#2C2C2C">Minimum</text>
  <rect x="130" y="548" width="40" height="22" rx="4" fill="#E94560" />
  <text x="150" y="563" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">Ksh 10</text>

  <text x="50" y="590" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#2C2C2C">Maximum</text>
  <rect x="130" y="577" width="500" height="22" rx="4" fill="#16213E" />
  <text x="380" y="593" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">Ksh 150,000 per single transaction</text>

  <!-- Go-live note -->
  <rect x="30" y="622" width="740" height="44" rx="8" fill="#16213E" />
  <text x="400" y="640" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">Go-Live Requirement: Daraja account at developer.safaricom.co.ke</text>
  <text x="400" y="657" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#999" text-anchor="middle">All plugins require a registered Lipa Na M-Pesa shortcode + KRA PIN + business registration</text>

  <!-- Footer -->
  <text x="400" y="690" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#999" text-anchor="middle">tupate.studio</text>
</svg>
