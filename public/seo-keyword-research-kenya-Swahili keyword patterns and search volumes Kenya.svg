<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 980" width="100%" role="img" aria-labelledby="infographic-title" font-family="'Inter','Segoe UI',Arial,sans-serif">
  <title id="infographic-title">Swahili Keyword Patterns and Search Volumes — Kenya SEO — Tupate Studio</title>

