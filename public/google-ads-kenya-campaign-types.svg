<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 740" width="100%" role="img" aria-labelledby="infographic-title" version="1.1">
  <title id="infographic-title">Google Ads Campaign Types Matched to Kenyan Business Models</title>
  <defs>
    <linearGradient id="bgGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#16213E"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="740" fill="url(#bgGrad2)" rx="12"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="78" fill="#E94560" rx="12"/>
  <rect x="0" y="66" width="800" height="12" fill="#E94560"/>
  <text x="400" y="32" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="20" font-weight="700" fill="#FFFFFF" text-anchor="middle">Google Ads Kenya: CPC Benchmarks by Industry</text>
  <text x="400" y="58" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" fill="#ffd0d8" text-anchor="middle">2024–2025 Cost Per Click Ranges in Kenyan Shillings (Ksh)</text>

  <!-- Quality Score diagram header -->
  <rect x="40" y="92" width="720" height="28" fill="#2C2C2C" rx="6"/>
  <text x="400" y="111" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5" text-anchor="middle">Ad Rank = Bid × Quality Score × Context Factors — A higher Quality Score beats a bigger budget every time</text>

  <!-- Quality Score Breakdown -->
  <text x="50" y="148" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#E94560">Quality Score Breakdown (1–10)</text>

  <!-- Three pillars of Quality Score -->
  <rect x="50" y="158" width="214" height="80" fill="#2C2C2C" rx="8"/>
  <rect x="50" y="158" width="214" height="6" fill="#E94560" rx="4"/>
  <text x="157" y="185" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="28" font-weight="800" fill="#E94560" text-anchor="middle">33%</text>
  <text x="157" y="205" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" font-weight="600" fill="#F5F5F5" text-anchor="middle">Ad Relevance</text>
  <text x="157" y="221" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#aaa" text-anchor="middle">Keyword-to-ad match</text>
  <text x="157" y="233" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#aaa" text-anchor="middle">for Kenyan intent</text>

  <rect x="293" y="158" width="214" height="80" fill="#2C2C2C" rx="8"/>
  <rect x="293" y="158" width="214" height="6" fill="#2980b9" rx="4"/>
  <text x="400" y="185" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="28" font-weight="800" fill="#2980b9" text-anchor="middle">33%</text>
  <text x="400" y="205" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" font-weight="600" fill="#F5F5F5" text-anchor="middle">Expected CTR</text>
  <text x="400" y="221" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#aaa" text-anchor="middle">Historical click rate</text>
  <text x="400" y="233" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#aaa" text-anchor="middle">vs Kenya competitors</text>

  <rect x="536" y="158" width="214" height="80" fill="#2C2C2C" rx="8"/>
  <rect x="536" y="158" width="214" height="6" fill="#27ae60" rx="4"/>
  <text x="643" y="185" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="28" font-weight="800" fill="#27ae60" text-anchor="middle">33%</text>
  <text x="643" y="205" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" font-weight="600" fill="#F5F5F5" text-anchor="middle">Landing Page</text>
  <text x="643" y="221" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#aaa" text-anchor="middle">UX + page speed +</text>
  <text x="643" y="233" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#aaa" text-anchor="middle">Kenya-intent match</text>

  <!-- CPC Chart title -->
  <text x="50" y="272" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#E94560">Kenya Google Ads CPC Benchmarks (Ksh) — 2024–2025</text>
  <text x="50" y="288" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#999">Industry  ·  Cost Per Click range  ·  Example high-value keyword</text>

  <!-- Chart scale note -->
  <!-- Bar chart: x=240 start, max width=480px for 600 Ksh -->

  <!-- Row headers -->
  <rect x="40" y="296" width="720" height="30" fill="#16213E" rx="4"/>
  <text x="50" y="316" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#aaa">INDUSTRY</text>
  <text x="240" y="316" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#aaa">CPC RANGE (Ksh)</text>
  <text x="540" y="316" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#aaa">EXAMPLE QUERY</text>

  <!-- Legal services: 200–600 Ksh -->
  <rect x="40" y="330" width="720" height="48" fill="#2C2C2C" rx="4"/>
  <text x="50" y="352" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" font-weight="600" fill="#FFFFFF">Legal Services</text>
  <text x="50" y="368" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#aaa">Highest CPCs in Kenya market</text>
  <!-- Bar: 200ms=160px min; 600ms=480px max -->
  <rect x="240" y="337" width="480" height="16" fill="#16213E" rx="3"/>
  <rect x="240" y="337" width="160" height="16" fill="#c0392b" rx="3" opacity="0.4"/>
  <rect x="240" y="337" width="480" height="16" fill="url(#legalGrad)" rx="3" opacity="0.8"/>
  <defs>
    <linearGradient id="legalGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E94560" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#E94560" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <text x="728" y="350" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#E94560">Ksh 200–600</text>
  <text x="540" y="352" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#aaa">"divorce lawyer Nairobi"</text>

  <!-- Real Estate: 150–400 Ksh -->
  <rect x="40" y="382" width="720" height="48" fill="#1e1e38" rx="4"/>
  <text x="50" y="404" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" font-weight="600" fill="#FFFFFF">Real Estate Nairobi</text>
  <text x="50" y="420" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#aaa">High buyer intent; large transaction values</text>
  <rect x="240" y="389" width="480" height="16" fill="#16213E" rx="3"/>
  <rect x="240" y="389" width="320" height="16" fill="#e67e22" rx="3" opacity="0.7"/>
  <text x="728" y="402" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#e67e22">Ksh 150–400</text>
  <text x="540" y="404" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#aaa">"apartments for sale Nairobi"</text>

  <!-- Medical: 100–300 Ksh -->
  <rect x="40" y="434" width="720" height="48" fill="#2C2C2C" rx="4"/>
  <text x="50" y="456" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" font-weight="600" fill="#FFFFFF">Medical &amp; Dental</text>
  <text x="50" y="472" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#aaa">Nairobi private clinics — competitive category</text>
  <rect x="240" y="441" width="480" height="16" fill="#16213E" rx="3"/>
  <rect x="240" y="441" width="240" height="16" fill="#8e44ad" rx="3" opacity="0.7"/>
  <text x="728" y="454" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#8e44ad">Ksh 100–300</text>
  <text x="540" y="456" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#aaa">"dental implants Nairobi price"</text>

  <!-- Web design: 80–200 Ksh -->
  <rect x="40" y="486" width="720" height="48" fill="#1e1e38" rx="4"/>
  <text x="50" y="508" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" font-weight="600" fill="#FFFFFF">Web Design &amp; Digital</text>
  <text x="50" y="524" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#aaa">Moderate competition; high-intent comparison buyers</text>
  <rect x="240" y="493" width="480" height="16" fill="#16213E" rx="3"/>
  <rect x="240" y="493" width="160" height="16" fill="#2980b9" rx="3" opacity="0.7"/>
  <text x="728" y="506" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#2980b9">Ksh 80–200</text>
  <text x="540" y="508" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#aaa">"website design company Nairobi"</text>

  <!-- E-commerce: 40–150 Ksh -->
  <rect x="40" y="538" width="720" height="48" fill="#2C2C2C" rx="4"/>
  <text x="50" y="560" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" font-weight="600" fill="#FFFFFF">E-Commerce (Apparel / Electronics)</text>
  <text x="50" y="576" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#aaa">Shopping campaigns typically lower than Search</text>
  <rect x="240" y="545" width="480" height="16" fill="#16213E" rx="3"/>
  <rect x="240" y="545" width="120" height="16" fill="#27ae60" rx="3" opacity="0.7"/>
  <text x="728" y="558" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#27ae60">Ksh 40–150</text>
  <text x="540" y="560" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#aaa">"buy sneakers Nairobi online"</text>

  <!-- Restaurant / Hospitality: 30–80 Ksh -->
  <rect x="40" y="590" width="720" height="48" fill="#1e1e38" rx="4"/>
  <text x="50" y="612" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" font-weight="600" fill="#FFFFFF">Restaurant &amp; Hospitality</text>
  <text x="50" y="628" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#aaa">Lower CPCs reflect lower per-conversion value</text>
  <rect x="240" y="597" width="480" height="16" fill="#16213E" rx="3"/>
  <rect x="240" y="597" width="64" height="16" fill="#f39c12" rx="3" opacity="0.7"/>
  <text x="728" y="610" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#f39c12">Ksh 30–80</text>
  <text x="540" y="612" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#aaa">"restaurant Westlands Nairobi"</text>

  <!-- Mgmt fee note -->
  <rect x="40" y="648" width="720" height="52" fill="#E94560" rx="8" opacity="0.15"/>
  <rect x="40" y="648" width="4" height="52" fill="#E94560" rx="2"/>
  <text x="56" y="668" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" font-weight="700" fill="#E94560">Tupate Studio Google Ads Management</text>
  <text x="56" y="686" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#F5F5F5">15% of monthly ad spend · Minimum Ksh 3,000/month · Ksh 50,000 spend = Ksh 7,500 management fee</text>
  <text x="56" y="700" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#aaa">Includes: setup, keyword research, ad copy, bid management, conversion tracking, monthly KES report</text>

  <!-- Footer -->
  <text x="400" y="730" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#999" text-anchor="middle">tupate.studio</text>
</svg>
