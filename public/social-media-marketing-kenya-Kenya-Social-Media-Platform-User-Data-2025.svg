<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 0 800 580" width="100%"
     role="img" aria-labelledby="infographic-title-3">
  <title id="infographic-title-3">Kenya Social Media Platform User Data 2025 — Active Users by Platform</title>
  <defs>
    <linearGradient id="hdrGrad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1A1A2E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213E;stop-opacity:1" />
    </linearGradient>
    <!-- Bar gradients -->
    <linearGradient id="barYT" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c73652;stop-opacity:0.85" />
    </linearGradient>
    <linearGradient id="barFB" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E94560;stop-opacity:0.92" />
      <stop offset="100%" style="stop-color:#c73652;stop-opacity:0.75" />
    </linearGradient>
    <linearGradient id="barIG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E94560;stop-opacity:0.80" />
      <stop offset="100%" style="stop-color:#c73652;stop-opacity:0.65" />
    </linearGradient>
    <linearGradient id="barTT" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E94560;stop-opacity:0.72" />
      <stop offset="100%" style="stop-color:#c73652;stop-opacity:0.58" />
    </linearGradient>
    <linearGradient id="barLI" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E94560;stop-opacity:0.60" />
      <stop offset="100%" style="stop-color:#c73652;stop-opacity:0.46" />
    </linearGradient>
    <linearGradient id="barTW" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E94560;stop-opacity:0.50" />
      <stop offset="100%" style="stop-color:#c73652;stop-opacity:0.38" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="580" fill="#F5F5F5"/>

  <!-- Header -->
  <rect width="800" height="90" fill="url(#hdrGrad3)"/>
  <rect y="88" width="800" height="4" fill="#E94560"/>
  <text x="400" y="36" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="21" font-weight="700"
        fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5">KENYA SOCIAL MEDIA PLATFORM USER DATA 2025</text>
  <text x="400" y="62" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" font-weight="400"
        fill="#E94560" text-anchor="middle">Active Users / Reach by Platform — Kenyan Market</text>

  <!-- ── Chart layout ──
       Chart area: x=200 to x=740 (540px wide)
       Max value: 20M (YouTube) → 540px = 20M → scale: 27px per 1M
       Bars y-start positions: row height 58px, first bar y=118
  -->

  <!-- Y-axis label column background -->
  <rect x="0" y="100" width="800" height="440" fill="#F5F5F5"/>

  <!-- Gridlines (vertical) at 5M, 10M, 15M, 20M -->
  <!-- 5M = 200 + 5*27 = 335 -->
  <line x1="335" y1="108" x2="335" y2="488" stroke="#DDDDDD" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- 10M = 200 + 10*27 = 470 -->
  <line x1="470" y1="108" x2="470" y2="488" stroke="#DDDDDD" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- 15M = 200 + 15*27 = 605 -->
  <line x1="605" y1="108" x2="605" y2="488" stroke="#DDDDDD" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- 20M = 200 + 20*27 = 740 -->
  <line x1="740" y1="108" x2="740" y2="488" stroke="#DDDDDD" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Grid labels -->
  <text x="335" y="500" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#888" text-anchor="middle">5M</text>
  <text x="470" y="500" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#888" text-anchor="middle">10M</text>
  <text x="605" y="500" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#888" text-anchor="middle">15M</text>
  <text x="740" y="500" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#888" text-anchor="middle">20M</text>
  <text x="200" y="500" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#888" text-anchor="middle">0</text>

  <!-- ── ROW 1: YouTube 20M+ → 540px ── -->
  <text x="190" y="138" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" font-weight="700"
        fill="#1A1A2E" text-anchor="end">YouTube</text>
  <rect x="200" y="118" width="540" height="36" rx="4" fill="url(#barYT)"/>
  <!-- Badge -->
  <rect x="748" y="127" width="42" height="20" rx="3" fill="#E94560"/>
  <text x="769" y="140" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" font-weight="700"
        fill="#FFFFFF" text-anchor="middle">20M+</text>
  <text x="210" y="141" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="600"
        fill="#FFFFFF">20M+ monthly viewers · Kenya's largest video platform</text>

  <!-- ── ROW 2: Facebook 14M → 378px ── -->
  <text x="190" y="196" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" font-weight="700"
        fill="#1A1A2E" text-anchor="end">Facebook</text>
  <rect x="200" y="176" width="378" height="36" rx="4" fill="url(#barFB)"/>
  <rect x="586" y="185" width="38" height="20" rx="3" fill="#E94560"/>
  <text x="605" y="198" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" font-weight="700"
        fill="#FFFFFF" text-anchor="middle">14M</text>
  <text x="210" y="199" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="600"
        fill="#FFFFFF">14M users · Strongest reach age 25–50</text>

  <!-- ── ROW 3: Instagram 7M → 189px ── -->
  <text x="190" y="254" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" font-weight="700"
        fill="#1A1A2E" text-anchor="end">Instagram</text>
  <rect x="200" y="234" width="189" height="36" rx="4" fill="url(#barIG)"/>
  <rect x="397" y="243" width="32" height="20" rx="3" fill="#E94560"/>
  <text x="413" y="256" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" font-weight="700"
        fill="#FFFFFF" text-anchor="middle">7M</text>
  <text x="210" y="257" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="600"
        fill="#FFFFFF">5–7M · Urban 18–35 · Visual brands</text>

  <!-- ── ROW 4: TikTok 6M → 162px ── -->
  <text x="190" y="312" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" font-weight="700"
        fill="#1A1A2E" text-anchor="end">TikTok</text>
  <rect x="200" y="292" width="162" height="36" rx="4" fill="url(#barTT)"/>
  <rect x="370" y="301" width="32" height="20" rx="3" fill="#E94560"/>
  <text x="386" y="314" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" font-weight="700"
        fill="#FFFFFF" text-anchor="middle">6M</text>
  <text x="210" y="315" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="600"
        fill="#1A1A2E">4–6M · Fastest growing · Age 16–30</text>

  <!-- ── ROW 5: LinkedIn 3M → 81px ── -->
  <text x="190" y="370" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" font-weight="700"
        fill="#1A1A2E" text-anchor="end">LinkedIn</text>
  <rect x="200" y="350" width="81" height="36" rx="4" fill="url(#barLI)"/>
  <rect x="289" y="359" width="32" height="20" rx="3" fill="#E94560"/>
  <text x="305" y="372" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" font-weight="700"
        fill="#FFFFFF" text-anchor="middle">3M</text>
  <text x="330" y="373" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#444">2–3M · B2B professionals · Decision-makers</text>

  <!-- ── ROW 6: Twitter/X 2.5M → 67px ── -->
  <text x="190" y="428" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" font-weight="700"
        fill="#1A1A2E" text-anchor="end">Twitter/X</text>
  <rect x="200" y="408" width="67" height="36" rx="4" fill="url(#barTW)"/>
  <rect x="275" y="417" width="38" height="20" rx="3" fill="#E94560"/>
  <text x="294" y="430" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" font-weight="700"
        fill="#FFFFFF" text-anchor="middle">2.5M</text>
  <text x="322" y="431" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#444">2–2.5M · Professional &amp; media circles</text>

  <!-- ── WhatsApp special row ── -->
  <rect x="30" y="458" width="740" height="52" rx="6" fill="#1A1A2E"/>
  <rect x="30" y="458" width="4" height="52" rx="2" fill="#E94560"/>
  <!-- WhatsApp label -->
  <text x="46" y="478" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" font-weight="700"
        fill="#E94560">WhatsApp</text>
  <!-- Special bar — full width represents 95%+ smartphone owners -->
  <rect x="130" y="462" width="580" height="28" rx="4" fill="#E94560" opacity="0.85"/>
  <text x="140" y="481" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" font-weight="700"
        fill="#FFFFFF">95%+ of Kenyan smartphone owners · Infrastructure of Kenyan business communication</text>
  <text x="46" y="500" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#aaaacc">
    Not a public platform — dominant private channel. Highest-ROI channel for most Kenyan businesses.</text>

  <!-- Source note -->
  <text x="30" y="530" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#888">
    Source: 2024–2025 estimates. Platform figures represent active Kenyan users / monthly viewers.</text>

  <!-- Footer -->
  <text x="400" y="570" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11"
        fill="#999" text-anchor="middle">tupate.studio</text>
</svg>
