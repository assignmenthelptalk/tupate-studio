  <text x="685" y="653" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9" fill="#CCCCCC">Fast mobile load (&lt;3s 4G)</text>
  <text x="685" y="680" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">Impact: MEDIUM-HIGH</text>

