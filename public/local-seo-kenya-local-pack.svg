<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 760" width="100%" role="img" aria-labelledby="infographic-title">
  <title id="infographic-title">Google Local Pack: How Kenyan Businesses Appear in Google's Top 3 Local Results</title>

  <!-- Background -->
