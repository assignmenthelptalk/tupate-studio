  <text x="120" y="373" font-family="Inter, Arial, sans-serif" font-size="10" fill="#777777">★★★☆☆ 3.8 (9) · Website Design</text>
  <text x="120" y="386" font-family="Inter, Arial, sans-serif" font-size="9" fill="#555555">Karen · Open · 0733 000 000</text>

