  <text x="108" y="426" font-family="Inter, Arial, sans-serif" font-size="11" fill="#1A0DAB">organicresult1.co.ke › web-design-nairobi</text>
  <text x="108" y="440" font-family="Inter, Arial, sans-serif" font-size="9" fill="#666666">Professional web design services in Nairobi — affordable custom…</text>
