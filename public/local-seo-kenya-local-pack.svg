  <line x1="200" y1="706" x2="200" y2="734" stroke="#333" stroke-width="1"/>
  <text x="240" y="716" font-family="Inter, Arial, sans-serif" font-size="9" fill="#AAAAAA">Nairobi suburban:</text>
  <text x="240" y="730" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="700" fill="#F5C518">2–3 months</text>
  <line x1="360" y1="706" x2="360" y2="734" stroke="#333" stroke-width="1"/>
  <text x="400" y="716" font-family="Inter, Arial, sans-serif" font-size="9" fill="#AAAAAA">Nairobi CBD competitive:</text>
  <text x="400" y="730" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="700" fill="#E94560">3–5 months</text>
