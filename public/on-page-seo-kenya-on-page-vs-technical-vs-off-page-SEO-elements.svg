  <text x="142" y="122" text-anchor="middle" font-size="15" font-weight="800" fill="#FFFFFF">ON-PAGE SEO</text>
  <text x="142" y="140" text-anchor="middle" font-size="11" fill="#FFFFFF" opacity="0.9">What exists WITHIN the page</text>

