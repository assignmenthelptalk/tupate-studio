  <text x="400" y="122" text-anchor="middle" font-size="15" font-weight="800" fill="#FFFFFF">TECHNICAL SEO</text>
  <text x="400" y="140" text-anchor="middle" font-size="11" fill="#aaaacc">Server-side &amp; crawl factors</text>

  <!-- OFF-PAGE column -->
