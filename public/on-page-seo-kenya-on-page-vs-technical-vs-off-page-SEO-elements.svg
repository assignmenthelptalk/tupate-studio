  <text x="36" y="280" font-size="13" font-weight="600" fill="#E94560">Body Content &amp; Depth</text>
  <text x="276" y="280" font-size="12" fill="#2C2C2C">HTTPS / SSL certificate</text>
  <text x="534" y="280" font-size="12" fill="#2C2C2C">Social signals &amp; mentions</text>

