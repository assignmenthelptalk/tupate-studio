  <text x="400" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#FFFFFF">The Three Pillars of SEO for Kenyan Business Websites</text>
  <text x="400" y="53" text-anchor="middle" font-size="13" fill="#E94560" font-weight="600">On-Page · Technical · Off-Page — each pillar has a distinct role</text>
  <text x="400" y="70" text-anchor="middle" font-size="11" fill="#aaaacc">Tupate Studio addresses all three for Kenyan businesses at Ksh 8,000/month</text>

