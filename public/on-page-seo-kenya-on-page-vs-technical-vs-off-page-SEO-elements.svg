  <rect x="22" y="164" width="756" height="32" rx="0" fill="#FFFFFF" opacity="0.7"/>
  <rect x="22" y="196" width="756" height="32" rx="0" fill="#FFFFFF" opacity="0.4"/>
  <rect x="22" y="228" width="756" height="32" rx="0" fill="#FFFFFF" opacity="0.7"/>
  <rect x="22" y="260" width="756" height="32" rx="0" fill="#FFFFFF" opacity="0.4"/>
  <rect x="22" y="292" width="756" height="32" rx="0" fill="#FFFFFF" opacity="0.7"/>
  <rect x="22" y="324" width="756" height="32" rx="0" fill="#FFFFFF" opacity="0.4"/>
  <rect x="22" y="356" width="756" height="32" rx="0" fill="#FFFFFF" opacity="0.7"/>
  <rect x="22" y="388" width="756" height="32" rx="0" fill="#FFFFFF" opacity="0.4"/>

