  <text x="658" y="122" text-anchor="middle" font-size="15" font-weight="800" fill="#FFFFFF">OFF-PAGE SEO</text>
  <text x="658" y="140" text-anchor="middle" font-size="11" fill="#aaaacc">External signals &amp; authority</text>

