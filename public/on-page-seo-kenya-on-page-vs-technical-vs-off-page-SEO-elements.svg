  <line x1="262" y1="164" x2="262" y2="428" stroke="#d0d0d0" stroke-width="1"/>
  <line x1="520" y1="164" x2="520" y2="428" stroke="#d0d0d0" stroke-width="1"/>

  <!-- ROW LABELS (left column header) -->
  <!-- Item 1 -->
  <text x="36" y="184" font-size="13" font-weight="600" fill="#E94560">Title Tag</text>
  <text x="280" y="184" font-size="12" fill="#2C2C2C" x="276">Page speed (TTFB, hosting)</text>
  <text x="276" y="184" font-size="12" fill="#2C2C2C">Page speed (TTFB, hosting)</text>
  <text x="534" y="184" font-size="12" fill="#2C2C2C">Backlinks from other sites</text>

  <!-- Item 2 -->
  <text x="36" y="216" font-size="13" font-weight="600" fill="#E94560">Meta Description</text>
  <text x="276" y="216" font-size="12" fill="#2C2C2C">Crawlability (robots.txt)</text>
  <text x="534" y="216" font-size="12" fill="#2C2C2C">Local citations (NAP)</text>

