<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" width="100%" role="img" aria-labelledby="infographic-title-p11a" font-family="'Inter','Segoe UI',Arial,sans-serif">
  <title id="infographic-title-p11a">On-Page vs Technical vs Off-Page SEO: What Each Covers for Kenyan Business Websites</title>
  <defs>
    <linearGradient id="hdr11a" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1A1A2E"/>
      <stop offset="100%" style="stop-color:#16213E"/>
    </linearGradient>
  </defs>

  <!-- Background -->
