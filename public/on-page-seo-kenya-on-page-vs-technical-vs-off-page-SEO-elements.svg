  <text x="142" y="462" text-anchor="middle" font-size="11" font-weight="700" fill="#E94560">ON-PAGE KEY INSIGHT</text>
  <text x="32" y="480" font-size="10.5" fill="#2C2C2C">Directly controlled by you. Correct on-page</text>
  <text x="32" y="496" font-size="10.5" fill="#2C2C2C">signals are the fastest route to ranking</text>
  <text x="32" y="512" font-size="10.5" fill="#2C2C2C">improvements for Kenyan business keywords.</text>
  <text x="32" y="528" font-size="10.5" fill="#2C2C2C">Every page needs its own unique optimization.</text>
  <text x="32" y="540" font-size="10" font-weight="600" fill="#E94560">Tupate Studio optimises every page individually.</text>

  <rect x="280" y="444" width="240" height="105" rx="8" fill="#1A1A2E" opacity="0.08" stroke="#1A1A2E" stroke-width="1.5"/>
  <text x="400" y="462" text-anchor="middle" font-size="11" font-weight="700" fill="#1A1A2E">TECHNICAL KEY INSIGHT</text>
  <text x="290" y="480" font-size="10.5" fill="#2C2C2C">Server-side issues are invisible to you but</text>
  <text x="290" y="496" font-size="10.5" fill="#2C2C2C">immediately visible to Google. A noindex tag</text>
  <text x="290" y="512" font-size="10.5" fill="#2C2C2C">or broken sitemap can block all rankings</text>
  <text x="290" y="528" font-size="10.5" fill="#2C2C2C">regardless of how good the content is.</text>
  <text x="290" y="540" font-size="10" font-weight="600" fill="#1A1A2E">Diagnosed in a Tupate Studio technical audit.</text>

  <rect x="538" y="444" width="240" height="105" rx="8" fill="#16213E" opacity="0.08" stroke="#16213E" stroke-width="1.5"/>
  <text x="658" y="462" text-anchor="middle" font-size="11" font-weight="700" fill="#16213E">OFF-PAGE KEY INSIGHT</text>
  <text x="548" y="480" font-size="10.5" fill="#2C2C2C">Cannot be directly controlled — earned</text>
  <text x="548" y="496" font-size="10.5" fill="#2C2C2C">through quality content, local citations,</text>
  <text x="548" y="512" font-size="10.5" fill="#2C2C2C">and Google Business Profile signals.</text>
  <text x="548" y="528" font-size="10.5" fill="#2C2C2C">Most Kenyan SMEs underinvest here.</text>
  <text x="548" y="540" font-size="10" font-weight="600" fill="#16213E">Covered in Tupate Studio Local SEO.</text>

  <!-- Footer -->
  <text x="400" y="572" text-anchor="middle" font-size="10" fill="#999999">tupate.studio</text>
