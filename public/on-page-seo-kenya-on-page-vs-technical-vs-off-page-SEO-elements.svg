  <text x="36" y="312" font-size="13" font-weight="600" fill="#E94560">Image Alt Text &amp; Format</text>
  <text x="276" y="312" font-size="12" fill="#2C2C2C">Core Web Vitals (LCP/INP/CLS)</text>
  <text x="534" y="312" font-size="12" fill="#2C2C2C">Brand searches &amp; co-citations</text>

  <!-- Item 6 -->
  <text x="36" y="344" font-size="13" font-weight="600" fill="#E94560">Internal Links</text>
  <text x="276" y="344" font-size="12" fill="#2C2C2C">Mobile usability (viewport)</text>
  <text x="534" y="344" font-size="12" fill="#2C2C2C">Press coverage &amp; PR</text>

  <!-- Item 7 -->
  <text x="36" y="376" font-size="13" font-weight="600" fill="#E94560">URL Structure</text>
  <text x="276" y="376" font-size="12" fill="#2C2C2C">Structured data / Schema</text>
  <text x="534" y="376" font-size="12" fill="#2C2C2C">Directory listings (Yellow Pages KE)</text>

  <!-- Item 8 -->
  <text x="36" y="408" font-size="13" font-weight="600" fill="#E94560">Schema Markup</text>
  <text x="276" y="408" font-size="12" fill="#2C2C2C">Server location / CDN</text>
  <text x="534" y="408" font-size="12" fill="#2C2C2C">Influencer &amp; community links</text>

