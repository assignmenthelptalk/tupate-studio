<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="auto" role="img" aria-labelledby="infographic-title-8">
  <title id="infographic-title-8">Daraja API: How M-Pesa Connects to Your Custom E-commerce Store</title>

  <!-- Background -->
  <rect width="800" height="600" fill="#1A1A2E" rx="12"/>

  <!-- Header -->
  <rect width="800" height="78" fill="#0A0A1A" rx="12"/>
  <rect x="0" y="66" width="800" height="12" fill="#0A0A1A"/>
  <text x="400" y="34" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">Daraja API Architecture</text>
  <text x="400" y="58" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#00A550">How M-Pesa Connects to Your Custom E-commerce Store</text>

  <!-- Main flow architecture -->
  <!-- Node 1: Customer Phone -->
  <rect x="30" y="110" width="120" height="100" fill="#16213E" rx="8" stroke="#00A550" stroke-width="2"/>
  <text x="90" y="148" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" fill="#FFFFFF">📱</text>
  <text x="90" y="170" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">Customer</text>
  <text x="90" y="185" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#AAAAAA">Phone</text>
  <text x="90" y="198" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#00A550">Tecno · Infinix · Samsung</text>

  <!-- Arrow 1→2 -->
  <line x1="150" y1="160" x2="188" y2="160" stroke="#E94560" stroke-width="2"/>
  <polygon points="186,153 200,160 186,167" fill="#E94560"/>
  <text x="170" y="153" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#E94560">pays</text>

  <!-- Node 2: STK Push Request -->
  <rect x="200" y="110" width="120" height="100" fill="#16213E" rx="8" stroke="#E94560" stroke-width="2"/>
  <rect x="210" y="120" width="100" height="22" fill="#E94560" rx="3"/>
  <text x="260" y="136" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">STK Push</text>
  <text x="260" y="158" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" fill="#FFFFFF">⬆</text>
  <text x="260" y="178" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">Request</text>
  <text x="260" y="195" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#AAAAAA">Phone prompts sent</text>

  <!-- Arrow 2→3 -->
  <line x1="320" y1="160" x2="358" y2="160" stroke="#E94560" stroke-width="2"/>
  <polygon points="356,153 370,160 356,167" fill="#E94560"/>
  <text x="338" y="153" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#E94560">routes to</text>

  <!-- Node 3: Safaricom Daraja API (center, prominent) -->
  <rect x="370" y="90" width="160" height="140" fill="#005C2E" rx="8" stroke="#00A550" stroke-width="3"/>
  <rect x="380" y="100" width="140" height="28" fill="#00A550" rx="4"/>
  <text x="450" y="119" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">M-PESA</text>
  <text x="450" y="150" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#AAFFAA">Safaricom</text>
  <text x="450" y="167" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#AAFFAA">Daraja API</text>
  <text x="450" y="187" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#77DD77">OAuth 2.0 Auth</text>
  <text x="450" y="202" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#77DD77">HTTPS REST API</text>
  <text x="450" y="218" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#55CC55">api.safaricom.co.ke</text>

  <!-- Arrow 3→4 -->
  <line x1="530" y1="160" x2="568" y2="160" stroke="#E94560" stroke-width="2"/>
  <polygon points="566,153 580,160 566,167" fill="#E94560"/>
  <text x="549" y="153" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#E94560">callback</text>

  <!-- Node 4: Webhook Callback -->
  <rect x="580" y="110" width="120" height="100" fill="#16213E" rx="8" stroke="#4A90D9" stroke-width="2"/>
  <rect x="590" y="120" width="100" height="22" fill="#4A90D9" rx="3"/>
  <text x="640" y="136" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">Webhook</text>
  <text x="640" y="158" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" fill="#FFFFFF">⚡</text>
  <text x="640" y="178" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">Callback</text>
  <text x="640" y="195" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#AAAAAA">5–10 seconds</text>

  <!-- Node 5: Custom Store Server — below with arrows down from Daraja and Webhook -->
  <rect x="300" y="280" width="200" height="100" fill="#0F3460" rx="8" stroke="#4A90D9" stroke-width="2"/>
  <rect x="310" y="290" width="180" height="24" fill="#16213E" rx="4"/>
  <text x="400" y="307" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">Custom Store Server</text>
  <text x="400" y="333" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#CCCCCC">Verifies payment reference</text>
  <text x="400" y="350" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#CCCCCC">Updates order status</text>
  <text x="400" y="367" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#4A90D9">Direct Daraja — no plugin needed</text>

  <!-- Arrow from Webhook down to Server -->
  <line x1="640" y1="210" x2="640" y2="255" stroke="#4A90D9" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="640" y1="255" x2="500" y2="280" stroke="#4A90D9" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="498,271 502,285 510,276" fill="#4A90D9"/>

  <!-- Arrow from Daraja API down to Server -->
  <line x1="450" y1="230" x2="400" y2="278" stroke="#00A550" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="394,270 402,282 410,271" fill="#00A550"/>

  <!-- Node 6: Order Confirmed (right) -->
  <rect x="560" y="280" width="200" height="100" fill="#16213E" rx="8" stroke="#00A550" stroke-width="2"/>
  <text x="660" y="324" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" fill="#00A550">✓</text>
  <text x="660" y="348" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">Order Confirmed</text>
  <text x="660" y="366" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#AAAAAA">Email + SMS to customer</text>

  <!-- Arrow Server → Order Confirmed -->
  <line x1="500" y1="330" x2="558" y2="330" stroke="#00A550" stroke-width="2"/>
  <polygon points="556,323 570,330 556,337" fill="#00A550"/>

  <!-- Additional API types section -->
  <rect x="30" y="405" width="740" height="130" fill="#0F3460" rx="8"/>
  <text x="400" y="428" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">Daraja API Integration Types — All Supported by Tupate Studio</text>

  <!-- C2B -->
  <rect x="50" y="440" width="210" height="82" fill="#16213E" rx="6"/>
  <rect x="50" y="440" width="210" height="26" fill="#005C2E" rx="6"/>
  <rect x="50" y="456" width="210" height="10" fill="#005C2E"/>
  <text x="155" y="458" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">C2B — Paybill</text>
  <text x="155" y="480" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#AAFFAA">Customer to Business</text>
  <text x="155" y="497" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#CCCCCC">Manual paybill fallback</text>
  <text x="155" y="514" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#AAAAAA">for offline reconciliation</text>

  <!-- STK Push -->
  <rect x="295" y="440" width="210" height="82" fill="#16213E" rx="6"/>
  <rect x="295" y="440" width="210" height="26" fill="#007A3D" rx="6"/>
  <rect x="295" y="456" width="210" height="10" fill="#007A3D"/>
  <text x="400" y="458" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">STK Push — Primary Flow</text>
  <text x="400" y="480" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#AAFFAA">Seamless checkout — 5–10s</text>
  <text x="400" y="497" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#CCCCCC">No redirect — stays on store</text>
  <text x="400" y="514" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#AAAAAA">Automatic reconciliation</text>

  <!-- B2C -->
  <rect x="540" y="440" width="210" height="82" fill="#16213E" rx="6"/>
  <rect x="540" y="440" width="210" height="26" fill="#005C2E" rx="6"/>
  <rect x="540" y="456" width="210" height="10" fill="#005C2E"/>
  <text x="645" y="458" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">B2C — Refunds</text>
  <text x="645" y="480" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#AAFFAA">Business to Customer</text>
  <text x="645" y="497" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#CCCCCC">Automated refund processing</text>
  <text x="645" y="514" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#AAAAAA">Builds customer trust</text>

  <!-- Footer -->
  <text x="400" y="587" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#999999">tupate.studio</text>
</svg>
