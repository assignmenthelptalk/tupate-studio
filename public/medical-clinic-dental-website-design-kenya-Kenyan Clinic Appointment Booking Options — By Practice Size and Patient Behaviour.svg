<svg viewBox="0 0 800 980" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="infographic-title" font-family="'Inter', 'Segoe UI', Arial, sans-serif">
  <title id="infographic-title">Kenyan Clinic Appointment Booking Options — By Practice Size and Patient Behaviour</title>
  <defs>
    <linearGradient id="hG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1A1A2E"/>
      <stop offset="100%" style="stop-color:#16213E"/>
    </linearGradient>
    <linearGradient id="aG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E94560"/>
      <stop offset="100%" style="stop-color:#c73652"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="980" fill="#F5F5F5"/>

  <!-- Header -->
  <rect width="800" height="68" fill="url(#hG)"/>
  <text x="400" y="28" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="700" letter-spacing="0.5">KENYAN CLINIC APPOINTMENT BOOKING OPTIONS</text>
  <text x="400" y="50" text-anchor="middle" fill="#E94560" font-size="11" font-weight="600">By Practice Size and Patient Behaviour — Optimised for Nairobi and Mombasa Clinics</text>

  <!-- TIER 1: Small clinic -->
  <rect x="30" y="78" width="740" height="192" rx="6" fill="#FFFFFF" stroke="#1A1A2E" stroke-width="1.5"/>
  <rect x="30" y="78" width="8" height="192" fill="#1A1A2E" rx="4"/>

  <!-- Tier badge -->
  <rect x="46" y="88" width="160" height="28" rx="4" fill="#1A1A2E"/>
  <text x="126" y="107" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="700">SMALL CLINIC — 1 to 3 Doctors</text>

  <!-- Primary method badge -->
  <rect x="46" y="122" width="340" height="56" rx="5" fill="#25D366"/>
  <text x="216" y="142" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="700">PRIMARY: WhatsApp CTA Button</text>
  <text x="216" y="158" text-anchor="middle" fill="#FFFFFF" font-size="9">Pre-filled message: "I would like to book an appointment"</text>
  <text x="216" y="171" text-anchor="middle" fill="#FFFFFF" font-size="9">Single tap initiates conversation · No form required</text>

  <!-- Secondary method -->
  <rect x="396" y="122" width="368" height="56" rx="5" fill="#F5F5F5" stroke="#1A1A2E" stroke-width="1"/>
  <text x="580" y="142" text-anchor="middle" fill="#1A1A2E" font-size="10" font-weight="700">BACKUP: Simple Form (3 fields max)</text>
  <text x="580" y="158" text-anchor="middle" fill="#888" font-size="9">Name · WhatsApp Number · Preferred Date</text>
  <text x="580" y="171" text-anchor="middle" fill="#888" font-size="9">For patients outside WhatsApp or preferring forms</text>

  <!-- Why WhatsApp note -->
  <rect x="46" y="185" width="718" height="30" rx="4" fill="#F5F5F5"/>
  <text x="46" y="198" fill="#2C2C2C" font-size="9">  Why WhatsApp-first for Kenyan clinics:  </text>
  <text x="46" y="210" fill="#888" font-size="8.5">  WhatsApp provides privacy (patients inquire from workplace without calling) + documentation (serves as record of what was discussed). WhatsApp = immediate and human. Forms = formal and slow.</text>

  <!-- Recommended indicator -->
  <rect x="46" y="220" width="80" height="18" rx="9" fill="#1A1A2E"/>
  <text x="86" y="232" text-anchor="middle" fill="#E94560" font-size="7.5" font-weight="700">RECOMMENDED</text>
  <text x="160" y="232" fill="#888" font-size="8">Starting cost: Ksh 25,000 clinic website (includes WhatsApp integration)</text>

  <!-- TIER 2: Mid-size clinic -->
  <rect x="30" y="282" width="740" height="200" rx="6" fill="#FFFFFF" stroke="#E94560" stroke-width="1.5"/>
  <rect x="30" y="282" width="8" height="200" fill="#E94560" rx="4"/>

  <rect x="46" y="292" width="185" height="28" rx="4" fill="#E94560"/>
  <text x="138" y="311" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="700">MID-SIZE CLINIC — 4 to 10 Doctors</text>

  <!-- Form fields detail -->
  <text x="46" y="338" fill="#1A1A2E" font-size="10" font-weight="700">Booking Form Fields (Maximum 6 — more reduces mobile completion on Tecno/Infinix devices):</text>

  <!-- 6 fields grid -->
  <rect x="46" y="347" width="104" height="26" rx="4" fill="#F5F5F5" stroke="#1A1A2E" stroke-width="0.8"/>
  <text x="98" y="357" text-anchor="middle" fill="#1A1A2E" font-size="8" font-weight="600">Patient Name</text>
  <text x="98" y="368" text-anchor="middle" fill="#888" font-size="7">required</text>

  <rect x="160" y="347" width="130" height="26" rx="4" fill="#F5F5F5" stroke="#1A1A2E" stroke-width="0.8"/>
  <text x="225" y="357" text-anchor="middle" fill="#1A1A2E" font-size="8" font-weight="600">WhatsApp Number</text>
  <text x="225" y="368" text-anchor="middle" fill="#E94560" font-size="7">preferred contact</text>

  <rect x="300" y="347" width="130" height="26" rx="4" fill="#F5F5F5" stroke="#1A1A2E" stroke-width="0.8"/>
  <text x="365" y="357" text-anchor="middle" fill="#1A1A2E" font-size="8" font-weight="600">Preferred Doctor</text>
  <text x="365" y="368" text-anchor="middle" fill="#888" font-size="7">dropdown</text>

  <rect x="440" y="347" width="130" height="26" rx="4" fill="#F5F5F5" stroke="#1A1A2E" stroke-width="0.8"/>
  <text x="505" y="357" text-anchor="middle" fill="#1A1A2E" font-size="8" font-weight="600">Service Type</text>
  <text x="505" y="368" text-anchor="middle" fill="#888" font-size="7">dropdown</text>

  <rect x="580" y="347" width="130" height="26" rx="4" fill="#F5F5F5" stroke="#1A1A2E" stroke-width="0.8"/>
  <text x="645" y="357" text-anchor="middle" fill="#1A1A2E" font-size="8" font-weight="600">Preferred Date</text>
  <text x="645" y="368" text-anchor="middle" fill="#888" font-size="7">date picker</text>

  <rect x="720" y="347" width="44" height="26" rx="4" fill="#F5F5F5" stroke="#ddd" stroke-width="0.8"/>
  <text x="742" y="357" text-anchor="middle" fill="#888" font-size="7">Note</text>
  <text x="742" y="368" text-anchor="middle" fill="#888" font-size="7">optional</text>

  <!-- Still shows WhatsApp -->
  <rect x="46" y="382" width="718" height="22" rx="4" fill="#25D366" fill-opacity="0.15" stroke="#25D366" stroke-width="0.8"/>
  <text x="400" y="397" text-anchor="middle" fill="#2C2C2C" font-size="8.5">WhatsApp button remains visible alongside form as an alternative channel — do not hide it when you add a form</text>

  <!-- SMS confirmation -->
  <rect x="46" y="411" width="718" height="30" rx="4" fill="#F5F5F5" stroke="#1A1A2E" stroke-width="0.5"/>
  <text x="64" y="423" fill="#1A1A2E" font-size="8.5" font-weight="700">SMS Confirmation (all booking types):</text>
  <text x="64" y="436" fill="#888" font-size="8">Sent via Africa's Talking SMS gateway · Includes: clinic name, doctor, date/time, address, WhatsApp for changes</text>
  <text x="480" y="423" fill="#1A1A2E" font-size="8.5" font-weight="700">SMS Reminder (24hrs before):</text>
  <text x="480" y="436" fill="#E94560" font-size="8">Reduces no-shows by 20–35% · Includes reschedule WhatsApp link</text>

  <rect x="46" y="450" width="80" height="18" rx="9" fill="#E94560"/>
  <text x="86" y="462" text-anchor="middle" fill="#FFFFFF" font-size="7.5" font-weight="700">FOR GROWTH</text>

  <!-- TIER 3: Large/Specialty -->
  <rect x="30" y="494" width="740" height="150" rx="6" fill="#1A1A2E"/>
  <rect x="30" y="494" width="8" height="150" fill="#E94560" rx="4"/>

  <rect x="46" y="504" width="250" height="28" rx="4" fill="#E94560"/>
  <text x="171" y="523" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="700">LARGE / SPECIALTY / MULTI-BRANCH CLINIC</text>

  <text x="46" y="552" fill="#FFFFFF" font-size="10" font-weight="700">Full Online Appointment System:</text>
  <text x="46" y="568" fill="#aaaacc" font-size="9">Real-time calendar availability by doctor and service type</text>
  <text x="46" y="582" fill="#aaaacc" font-size="9">Online consultation deposit payment via M-Pesa STK Push (Safaricom Daraja API)</text>
  <text x="46" y="596" fill="#aaaacc" font-size="9">Optional integration: Daktari / HealthIT Kenya clinic management platform</text>

  <rect x="450" y="504" width="310" height="130" rx="4" fill="#16213E"/>
  <text x="605" y="524" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="700">KENYAN TELEMEDICINE OPTIONS</text>
  <text x="605" y="540" text-anchor="middle" fill="#aaaacc" font-size="8.5">For follow-up, prescription renewals, mental health,</text>
  <text x="605" y="553" text-anchor="middle" fill="#aaaacc" font-size="8.5">specialist second opinions, chronic disease monitoring</text>
  <rect x="462" y="561" width="130" height="22" rx="4" fill="#E94560"/>
  <text x="527" y="576" text-anchor="middle" fill="#FFFFFF" font-size="8.5" font-weight="700">Tibu Health (Kenya-built)</text>
  <rect x="602" y="561" width="148" height="22" rx="4" fill="#E94560"/>
  <text x="676" y="576" text-anchor="middle" fill="#FFFFFF" font-size="8.5" font-weight="700">MyDawa Platform</text>
  <text x="605" y="601" text-anchor="middle" fill="#aaaacc" font-size="8">M-Pesa STK Push payment before video session</text>
  <text x="605" y="614" text-anchor="middle" fill="#aaaacc" font-size="8">Calendar link sent to patient WhatsApp + email</text>
  <text x="605" y="627" text-anchor="middle" fill="#E94560" font-size="8" font-weight="600">Custom dev from Ksh 60,000</text>

  <!-- NHIF + SHA Pre-auth row -->
  <rect x="30" y="656" width="740" height="68" rx="6" fill="#FFFFFF" stroke="#1A1A2E" stroke-width="1"/>
  <text x="400" y="674" text-anchor="middle" fill="#1A1A2E" font-size="11" font-weight="700">NHIF / SHA DISPLAY — Highest-Conversion Trust Element on Kenyan Clinic Websites</text>

  <rect x="46" y="681" width="220" height="30" rx="4" fill="#1A1A2E"/>
  <text x="156" y="694" text-anchor="middle" fill="#FFFFFF" font-size="8.5" font-weight="700">NHIF Logo + Accreditation No.</text>
  <text x="156" y="706" text-anchor="middle" fill="#aaaacc" font-size="7.5">On homepage hero + every service page</text>

  <rect x="276" y="681" width="220" height="30" rx="4" fill="#E94560"/>
  <text x="386" y="694" text-anchor="middle" fill="#FFFFFF" font-size="8.5" font-weight="700">SHA Transition Messaging</text>
  <text x="386" y="706" text-anchor="middle" fill="#FFFFFF" font-size="7.5">From Oct 2024 — SHA benefit packages</text>

  <rect x="506" y="681" width="258" height="30" rx="4" fill="#16213E"/>
  <text x="635" y="694" text-anchor="middle" fill="#FFFFFF" font-size="8.5" font-weight="700">Private Insurance Panels</text>
  <text x="635" y="706" text-anchor="middle" fill="#aaaacc" font-size="7.5">Jubilee · AAR · UAP · Resolution · Britam · APA</text>

  <!-- 7 PATIENT TRUST CRITERIA -->
  <rect x="30" y="735" width="740" height="20" rx="4" fill="#1A1A2E"/>
  <text x="400" y="750" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="700">7 CRITERIA KENYAN PATIENTS CHECK BEFORE BOOKING (Failing any one sends them to a competitor)</text>

  <rect x="30" y="760" width="740" height="100" rx="6" fill="#FFFFFF" stroke="#ddd" stroke-width="1"/>

  <!-- 7 criteria as horizontal chips -->
  <rect x="46" y="770" width="146" height="30" rx="4" fill="#F5F5F5" stroke="#1A1A2E" stroke-width="0.8"/>
  <text x="119" y="782" text-anchor="middle" fill="#1A1A2E" font-size="8" font-weight="700">1. KMPDC Registration No.</text>
  <text x="119" y="793" text-anchor="middle" fill="#888" font-size="7">Displayed on homepage + profiles</text>

  <rect x="202" y="770" width="130" height="30" rx="4" fill="#F5F5F5" stroke="#1A1A2E" stroke-width="0.8"/>
  <text x="267" y="782" text-anchor="middle" fill="#1A1A2E" font-size="8" font-weight="700">2. NHIF/SHA Acceptance</text>
  <text x="267" y="793" text-anchor="middle" fill="#888" font-size="7">Prominently on homepage</text>

  <rect x="342" y="770" width="120" height="30" rx="4" fill="#F5F5F5" stroke="#1A1A2E" stroke-width="0.8"/>
  <text x="402" y="782" text-anchor="middle" fill="#1A1A2E" font-size="8" font-weight="700">3. Ksh Pricing Visible</text>
  <text x="402" y="793" text-anchor="middle" fill="#888" font-size="7">Reduces phone call barrier</text>

  <rect x="472" y="770" width="130" height="30" rx="4" fill="#F5F5F5" stroke="#1A1A2E" stroke-width="0.8"/>
  <text x="537" y="782" text-anchor="middle" fill="#1A1A2E" font-size="8" font-weight="700">4. Location + Matatu Route</text>
  <text x="537" y="793" text-anchor="middle" fill="#888" font-size="7">Route no. + stage name</text>

  <rect x="612" y="770" width="152" height="30" rx="4" fill="#F5F5F5" stroke="#1A1A2E" stroke-width="0.8"/>
  <text x="688" y="782" text-anchor="middle" fill="#1A1A2E" font-size="8" font-weight="700">5. Opening Hours (incl. Sat)</text>
  <text x="688" y="793" text-anchor="middle" fill="#888" font-size="7">Saturday = key for employed patients</text>

  <rect x="46" y="810" width="130" height="30" rx="4" fill="#E94560"/>
  <text x="111" y="822" text-anchor="middle" fill="#FFFFFF" font-size="8" font-weight="700">6. WhatsApp Contact</text>
  <text x="111" y="833" text-anchor="middle" fill="#FFFFFF" font-size="7">Primary contact method — privacy + documentation</text>

  <rect x="186" y="810" width="155" height="30" rx="4" fill="#E94560"/>
  <text x="263" y="822" text-anchor="middle" fill="#FFFFFF" font-size="8" font-weight="700">7. Google Reviews Displayed</text>
  <text x="263" y="833" text-anchor="middle" fill="#FFFFFF" font-size="7">4–5 stars, verified names, dates visible</text>

  <rect x="351" y="810" width="413" height="30" rx="4" fill="#F5F5F5" stroke="#ddd" stroke-width="0.8"/>
  <text x="557" y="822" text-anchor="middle" fill="#2C2C2C" font-size="8">Review acquisition: WhatsApp post-visit (2–4 hrs after appointment)</text>
  <text x="557" y="833" text-anchor="middle" fill="#888" font-size="7">"If you had a good experience, we'd appreciate a Google review: [short link]"</text>

  <!-- Dental pricing callout -->
  <rect x="30" y="870" width="360" height="72" rx="6" fill="#1A1A2E"/>
  <text x="210" y="888" text-anchor="middle" fill="#E94560" font-size="10" font-weight="700">DENTAL PRICE TRANSPARENCY (Converts)</text>
  <text x="210" y="904" text-anchor="middle" fill="#FFFFFF" font-size="9">Teeth cleaning from Ksh 2,500</text>
  <text x="210" y="918" text-anchor="middle" fill="#FFFFFF" font-size="9">Metal braces from Ksh 60,000 complete treatment</text>
  <text x="210" y="932" text-anchor="middle" fill="#FFFFFF" font-size="9">Dental implant from Ksh 85,000 per tooth</text>

  <!-- Clinic cost -->
  <rect x="410" y="870" width="360" height="72" rx="6" fill="#E94560"/>
  <text x="590" y="888" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="700">CLINIC WEBSITE INVESTMENT</text>
  <text x="590" y="904" text-anchor="middle" fill="#FFFFFF" font-size="9">Standard (WhatsApp + NHIF + profiles): Ksh 25,000</text>
  <text x="590" y="918" text-anchor="middle" fill="#FFFFFF" font-size="9">Online booking + M-Pesa + multi-doctor: from Ksh 60,000</text>
  <text x="590" y="932" text-anchor="middle" fill="#FFFFFF" font-size="9">Custom telemedicine integration: quoted separately</text>

  <!-- Footer -->
  <text x="400" y="968" text-anchor="middle" fill="#999" font-size="11">tupate.studio</text>
</svg>
