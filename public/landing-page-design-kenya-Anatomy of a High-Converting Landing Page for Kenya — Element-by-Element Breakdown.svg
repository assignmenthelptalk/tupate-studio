  <rect x="141" y="552" width="46" height="28" rx="3" fill="#FFFFFF" stroke="#1A1A2E" stroke-width="0.8"/>
  <text x="164" y="562" text-anchor="middle" fill="#1A1A2E" font-size="5.5" font-weight="700">KRA PIN</text>
  <text x="164" y="572" text-anchor="middle" fill="#E94560" font-size="5">Verified</text>
  <rect x="197" y="552" width="46" height="28" rx="3" fill="#FFFFFF" stroke="#1A1A2E" stroke-width="0.8"/>
  <text x="220" y="562" text-anchor="middle" fill="#1A1A2E" font-size="5.5" font-weight="700">Physical</text>
  <text x="220" y="572" text-anchor="middle" fill="#E94560" font-size="5">Address</text>
  <rect x="253" y="552" width="46" height="28" rx="3" fill="#FFFFFF" stroke="#1A1A2E" stroke-width="0.8"/>
  <text x="276" y="562" text-anchor="middle" fill="#1A1A2E" font-size="5.5" font-weight="700">WhatsApp</text>
  <text x="276" y="572" text-anchor="middle" fill="#E94560" font-size="5">Visible</text>
  <!-- Google reviews -->
  <rect x="85" y="588" width="214" height="22" rx="3" fill="#FFFFFF" stroke="#ddd" stroke-width="0.5"/>
  <text x="192" y="601" text-anchor="middle" fill="#2C2C2C" font-size="6.5">★★★★★ Google Reviews (verified screenshots)</text>
  <!-- Urgency -->
  <rect x="85" y="618" width="214" height="14" rx="3" fill="#E94560" fill-opacity="0.1" stroke="#E94560" stroke-width="0.5"/>
  <text x="192" y="628" text-anchor="middle" fill="#E94560" font-size="6" font-weight="600">Only 2 website build slots available this month</text>

  <!-- SECTION 6: CTA Repeat #3 -->
  <rect x="72" y="637" width="236" height="28" fill="#E94560"/>
  <text x="190" y="655" text-anchor="middle" fill="#FFFFFF" font-size="7.5" font-weight="700">Start Your Website — WhatsApp Us</text>
  <text x="190" y="669" text-anchor="middle" fill="#888" font-size="6">CTA #3 of 4</text>

  <!-- SECTION 7: Footer CTA -->
  <rect x="72" y="670" width="236" height="60" fill="#1A1A2E" rx="0"/>
  <text x="190" y="688" text-anchor="middle" fill="#aaaacc" font-size="7">Privacy Policy (KDPA required)</text>
  <text x="190" y="702" text-anchor="middle" fill="#FFFFFF" font-size="7">Nairobi Industrial Area, Block C, 3rd Floor</text>
  <text x="190" y="715" text-anchor="middle" fill="#FFFFFF" font-size="7">+254 700 000 000</text>
  <rect x="130" y="720" width="120" height="0" rx="4" fill="transparent"/>

  <!-- CTA #4 -->
