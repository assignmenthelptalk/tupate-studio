  <text x="190" y="405" text-anchor="middle" fill="#1A1A2E" font-size="8" font-weight="700">FEATURES &amp; BENEFITS</text>
  <circle cx="92" cy="420" r="5" fill="#E94560"/>
  <text x="102" y="424" fill="#2C2C2C" font-size="7">Ranks on Google.co.ke within 90 days</text>
  <circle cx="92" cy="437" r="5" fill="#E94560"/>
  <text x="102" y="441" fill="#2C2C2C" font-size="7">M-Pesa STK Push integrated</text>
  <circle cx="92" cy="454" r="5" fill="#E94560"/>
  <text x="102" y="458" fill="#2C2C2C" font-size="7">Works on Tecno &amp; Samsung A-series</text>
  <circle cx="92" cy="471" r="5" fill="#E94560"/>
  <text x="102" y="475" fill="#2C2C2C" font-size="7">Loads under 2.5s on Safaricom 4G</text>
  <!-- CTA #2 -->
  <rect x="130" y="480" width="120" height="0" rx="4" fill="transparent"/>

