  <text x="190" y="510" text-anchor="middle" fill="#FFFFFF" font-size="7.5" font-weight="600">Get Your Free Quote Today  ▶</text>
  <text x="190" y="524" text-anchor="middle" fill="#888" font-size="6">CTA #2 of 4</text>

