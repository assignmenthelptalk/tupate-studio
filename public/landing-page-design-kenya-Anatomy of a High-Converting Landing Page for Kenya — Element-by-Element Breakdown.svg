  <text x="140" y="319" text-anchor="middle" fill="#2C2C2C" font-size="6.5" font-style="italic">"Website converted our</text>
  <text x="140" y="329" text-anchor="middle" fill="#2C2C2C" font-size="6.5" font-style="italic">leads by 3x!"</text>
  <text x="140" y="340" text-anchor="middle" fill="#888" font-size="5.5">Otieno W., Westlands, Nairobi</text>
