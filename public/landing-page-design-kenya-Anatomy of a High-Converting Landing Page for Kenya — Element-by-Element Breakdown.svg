  <line x1="308" y1="185" x2="400" y2="185" stroke="#E94560" stroke-width="1.5" stroke-dasharray="4,2"/>
  <circle cx="308" cy="185" r="3" fill="#E94560"/>

  <!-- Social Proof -->
  <line x1="308" y1="325" x2="400" y2="325" stroke="#16213E" stroke-width="1.5" stroke-dasharray="4,2"/>
  <circle cx="308" cy="325" r="3" fill="#16213E"/>

  <!-- Features -->
  <line x1="308" y1="440" x2="400" y2="440" stroke="#E94560" stroke-width="1.5" stroke-dasharray="4,2"/>
  <circle cx="308" cy="440" r="3" fill="#E94560"/>

  <!-- Trust Signals -->
  <line x1="308" y1="580" x2="400" y2="580" stroke="#16213E" stroke-width="1.5" stroke-dasharray="4,2"/>
  <circle cx="308" cy="580" r="3" fill="#16213E"/>

  <!-- Element 1: Hero Section -->
  <rect x="400" y="130" width="370" height="100" rx="6" fill="#1A1A2E"/>
  <rect x="400" y="130" width="5" height="100" rx="0" fill="#E94560"/>
  <text x="416" y="150" fill="#E94560" font-size="10" font-weight="700">1  HERO SECTION (ABOVE THE FOLD)</text>
  <text x="416" y="167" fill="#FFFFFF" font-size="9">Headline: Specific, measurable benefit</text>
  <text x="416" y="181" fill="#FFFFFF" font-size="9">Sub-headline: Kenya specifics + Ksh price</text>
  <text x="416" y="195" fill="#FFFFFF" font-size="9">CTA: "WhatsApp Us Now" without scrolling</text>
  <text x="416" y="209" fill="#aaaacc" font-size="8">Hero image: business outcome on Tecno/Samsung screen</text>
  <text x="416" y="223" fill="#aaaacc" font-size="8">NOT: generic handshake stock photos</text>

  <!-- Element 2: Social Proof -->
  <rect x="400" y="240" width="370" height="100" rx="6" fill="#FFFFFF" stroke="#1A1A2E" stroke-width="1"/>
  <rect x="400" y="240" width="5" height="100" fill="#16213E"/>
  <text x="416" y="260" fill="#1A1A2E" font-size="10" font-weight="700">2  SOCIAL PROOF SECTION</text>
  <text x="416" y="277" fill="#2C2C2C" font-size="9">Testimonials: Full name + business + Nairobi estate</text>
  <text x="416" y="291" fill="#2C2C2C" font-size="9">Client logos: 4–6 recognisable Kenyan businesses</text>
  <text x="416" y="305" fill="#2C2C2C" font-size="9">Quantified: "47 Kenyan businesses served"</text>
  <text x="416" y="319" fill="#888" font-size="8">Include month + year — undated testimonials convert poorly</text>
  <text x="416" y="333" fill="#888" font-size="8">Google review screenshots (third-party validated)</text>

  <!-- Element 3: Features -->
  <rect x="400" y="350" width="370" height="100" rx="6" fill="#1A1A2E"/>
  <rect x="400" y="350" width="5" height="100" fill="#E94560"/>
  <text x="416" y="370" fill="#E94560" font-size="10" font-weight="700">3  FEATURES &amp; BENEFITS</text>
  <text x="416" y="387" fill="#FFFFFF" font-size="9">3–5 bullet points, benefit-first framing</text>
  <text x="416" y="401" fill="#FFFFFF" font-size="9">"Ranks on Google.co.ke" vs "SEO-structured HTML"</text>
  <text x="416" y="415" fill="#FFFFFF" font-size="9">"Kenyan customers find you on mobile" wins over</text>
  <text x="416" y="429" fill="#aaaacc" font-size="9">"responsive design" — outcome language converts</text>
  <text x="416" y="443" fill="#aaaacc" font-size="8">Icons improve scannability on mobile screens</text>

  <!-- Element 4: CTA Repetition -->
  <rect x="400" y="460" width="370" height="100" rx="6" fill="#FFFFFF" stroke="#1A1A2E" stroke-width="1"/>
  <rect x="400" y="460" width="5" height="100" fill="#E94560"/>
  <text x="416" y="480" fill="#1A1A2E" font-size="10" font-weight="700">4  CTA REPETITION — MINIMUM 4×</text>
  <text x="416" y="497" fill="#2C2C2C" font-size="9">CTA 1: Hero section (primary)</text>
  <text x="416" y="511" fill="#2C2C2C" font-size="9">CTA 2: After social proof section</text>
  <text x="416" y="525" fill="#2C2C2C" font-size="9">CTA 3: After features section</text>
  <text x="416" y="539" fill="#2C2C2C" font-size="9">CTA 4: Bottom / footer</text>
  <text x="416" y="553" fill="#888" font-size="8">Vary phrasing: "WhatsApp Now" / "Get Free Quote" / "Start Today"</text>

  <!-- Element 5: Trust Signals -->
  <rect x="400" y="570" width="370" height="100" rx="6" fill="#1A1A2E"/>
  <rect x="400" y="570" width="5" height="100" fill="#E94560"/>
  <text x="416" y="590" fill="#E94560" font-size="10" font-weight="700">5  KENYAN TRUST SIGNALS</text>
  <text x="416" y="607" fill="#FFFFFF" font-size="9">Physical address (building, estate, Nairobi/Mombasa)</text>
  <text x="416" y="621" fill="#FFFFFF" font-size="9">Clickable phone number (tel: link) in header</text>
  <text x="416" y="635" fill="#FFFFFF" font-size="9">Floating WhatsApp button (primary contact)</text>
  <text x="416" y="649" fill="#aaaacc" font-size="9">M-Pesa Paybill / Till / STK Push badge</text>
  <text x="416" y="663" fill="#aaaacc" font-size="8">KRA PIN (B2B) + Privacy Policy (KDPA required)</text>

  <!-- Mobile Optimisation Box -->
  <rect x="400" y="685" width="370" height="85" rx="6" fill="#F5F5F5" stroke="#E94560" stroke-width="1.5"/>
  <text x="416" y="705" fill="#E94560" font-size="10" font-weight="700">MOBILE OPTIMISATION (80%+ traffic)</text>
  <text x="416" y="721" fill="#2C2C2C" font-size="9">Headline + CTA visible above fold on Tecno Spark</text>
  <text x="416" y="735" fill="#2C2C2C" font-size="9">Max 3 form fields • Tap targets ≥44px</text>
  <text x="416" y="749" fill="#2C2C2C" font-size="9">Page weight &lt;500KB • Loads &lt;2.5s on Safaricom 4G</text>
  <text x="416" y="763" fill="#888" font-size="8">No pop-ups • WhatsApp pre-filled message button</text>

  <!-- Quality Score callout -->
  <rect x="400" y="783" width="370" height="75" rx="6" fill="#16213E"/>
  <text x="585" y="803" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="700">GOOGLE ADS QUALITY SCORE IMPACT</text>
  <text x="585" y="820" text-anchor="middle" fill="#aaaacc" font-size="9">Homepage traffic → Quality Score 3–5</text>
  <text x="585" y="836" text-anchor="middle" fill="#aaaacc" font-size="9">Dedicated landing page → Quality Score 6–9</text>
  <text x="585" y="850" text-anchor="middle" fill="#E94560" font-size="9" font-weight="600">Score difference = up to 50% lower CPC on Ksh budgets</text>

  <!-- Conversion types bar -->
  <text x="400" y="880" fill="#1A1A2E" font-size="10" font-weight="700">LANDING PAGE PURPOSE TYPES FOR KENYAN BUSINESSES</text>
  <!-- Bar pills -->
  <rect x="400" y="888" width="68" height="20" rx="10" fill="#1A1A2E"/>
  <text x="434" y="902" text-anchor="middle" fill="#FFFFFF" font-size="7" font-weight="600">Lead Gen</text>
  <rect x="475" y="888" width="72" height="20" rx="10" fill="#E94560"/>
  <text x="511" y="902" text-anchor="middle" fill="#FFFFFF" font-size="7" font-weight="600">Direct Sales</text>
  <rect x="554" y="888" width="82" height="20" rx="10" fill="#16213E"/>
  <text x="595" y="902" text-anchor="middle" fill="#FFFFFF" font-size="7" font-weight="600">Appointment</text>
  <rect x="643" y="888" width="60" height="20" rx="10" fill="#1A1A2E"/>
  <text x="673" y="902" text-anchor="middle" fill="#FFFFFF" font-size="7" font-weight="600">Event Reg</text>
  <rect x="710" y="888" width="60" height="20" rx="10" fill="#E94560"/>
  <text x="740" y="902" text-anchor="middle" fill="#FFFFFF" font-size="7" font-weight="600">Lead Magnet</text>

  <!-- Price strip -->
  <rect x="400" y="918" width="370" height="32" rx="6" fill="#E94560"/>
  <text x="585" y="936" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="700">Standalone Landing Page: Ksh 8,000 – Ksh 15,000</text>
  <text x="585" y="949" text-anchor="middle" fill="#FFFFFF" font-size="9">Included free within full website build from Ksh 25,000</text>

  <!-- Message match callout -->
  <rect x="400" y="960" width="370" height="50" rx="6" fill="#FFFFFF" stroke="#1A1A2E" stroke-width="1"/>
  <text x="416" y="978" fill="#1A1A2E" font-size="9" font-weight="700">MESSAGE MATCH (Most missed element)</text>
  <text x="416" y="993" fill="#2C2C2C" font-size="9">Ad: "Website Design for Nairobi Businesses"</text>
  <text x="416" y="1007" fill="#E94560" font-size="9">Landing Page headline must echo this exact promise</text>

  <!-- A/B Testing box -->
  <rect x="400" y="1020" width="370" height="50" rx="6" fill="#F5F5F5" stroke="#16213E" stroke-width="1"/>
  <text x="416" y="1038" fill="#1A1A2E" font-size="9" font-weight="700">A/B TESTING — HIGHEST IMPACT ELEMENTS</text>
  <text x="416" y="1053" fill="#2C2C2C" font-size="8">Headline • CTA text • Hero image • Form length • Social proof type</text>
  <text x="416" y="1066" fill="#888" font-size="8">Min 2–4 weeks per test on Kenyan traffic volumes</text>

  <!-- Footer -->
  <text x="400" y="1092" text-anchor="middle" fill="#999" font-size="11">tupate.studio</text>
</svg>
