  <text x="248" y="319" text-anchor="middle" fill="#2C2C2C" font-size="6.5" font-style="italic">"Rank 1 on Google</text>
  <text x="248" y="329" text-anchor="middle" fill="#2C2C2C" font-size="6.5" font-style="italic">within 90 days"</text>
  <text x="248" y="340" text-anchor="middle" fill="#888" font-size="5.5">Wanja K., Karen, Nairobi</text>
  <text x="190" y="375" text-anchor="middle" fill="#888" font-size="6">47 Kenyan businesses served</text>

