  <text x="400" y="54" text-anchor="middle" fill="#E94560" font-size="12" font-weight="600">FOR KENYAN BUSINESSES — ELEMENT-BY-ELEMENT BREAKDOWN</text>

  <!-- Phone frame mockup -->
  <rect x="60" y="88" width="260" height="980" rx="16" fill="#1A1A2E" stroke="#16213E" stroke-width="3"/>
  <rect x="72" y="102" width="236" height="954" rx="8" fill="#FFFFFF"/>
  <!-- Phone notch -->
  <rect x="155" y="95" width="70" height="10" rx="5" fill="#0d0d1a"/>

  <!-- SECTION 1: Hero -->
  <rect x="72" y="102" width="236" height="165" rx="8" fill="#1A1A2E"/>
  <text x="190" y="132" text-anchor="middle" fill="#E94560" font-size="8" font-weight="700">NO NAVIGATION MENU</text>
  <text x="190" y="146" text-anchor="middle" fill="#FFFFFF" font-size="7">Logo + Phone only in header</text>
  <line x1="100" y1="155" x2="280" y2="155" stroke="#E94560" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="190" y="170" text-anchor="middle" fill="#FFFFFF" font-size="9" font-weight="700">Get a Professional Website</text>
  <text x="190" y="182" text-anchor="middle" fill="#FFFFFF" font-size="9" font-weight="700">in 10 Working Days</text>
  <text x="190" y="196" text-anchor="middle" fill="#aaaacc" font-size="7">Custom-coded, M-Pesa ready — Ksh 25,000</text>
  <!-- CTA Button -->
  <rect x="130" y="203" width="120" height="22" rx="4" fill="url(#accentGrad)"/>
  <text x="190" y="218" text-anchor="middle" fill="#FFFFFF" font-size="8" font-weight="700">WhatsApp Us Now</text>
  <text x="190" y="257" text-anchor="middle" fill="#aaaacc" font-size="7">CTA #1 of 4</text>

  <!-- SECTION 2: Social Proof -->
