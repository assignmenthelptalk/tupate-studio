<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 860" width="100%" role="img" aria-labelledby="infographic-title" font-family="'Inter','Segoe UI',Arial,sans-serif">
  <title id="infographic-title">Website Maintenance Scope — 6 Dimensions for Kenyan Business Websites — Tupate Studio</title>

  <!-- Background -->
  <rect width="800" height="860" fill="#F5F5F5"/>

  <!-- Header -->
  <rect x="0" y="0" width="800" height="86" fill="#1A1A2E"/>
  <text x="400" y="32" text-anchor="middle" fill="#FFFFFF" font-size="18" font-weight="700">WEBSITE MAINTENANCE</text>
  <text x="400" y="56" text-anchor="middle" fill="#E94560" font-size="13" font-weight="600">6 Active Dimensions for Kenyan Business Websites</text>
  <text x="400" y="76" text-anchor="middle" fill="#94A3B8" font-size="11">A maintained website is an asset. An unmaintained website becomes a liability within 6–18 months.</text>

  <!-- Central hub label -->
  <rect x="20" y="102" width="760" height="32" fill="#16213E" rx="4"/>
  <text x="400" y="123" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="700">FULL MAINTENANCE SCOPE — What Each Dimension Covers</text>

  <!-- ===== 6 DIMENSION CARDS in 2 columns x 3 rows ===== -->

  <!-- CARD 1: Security Monitoring -->
  <rect x="20" y="148" width="368" height="166" fill="#FFFFFF" rx="8" filter="drop-shadow(0 2px 6px rgba(0,0,0,0.08))"/>
  <rect x="20" y="148" width="368" height="8" fill="#E94560" rx="8 8 0 0"/>
  <!-- Icon circle -->
  <circle cx="58" cy="188" r="22" fill="#FFE4E6"/>
  <text x="58" y="195" text-anchor="middle" fill="#E94560" font-size="20">&#x1F6E1;</text>
  <text x="102" y="178" fill="#E94560" font-size="11" font-weight="800">1. SECURITY MONITORING</text>
  <text x="40" y="208" fill="#2C2C2C" font-size="10.5">&#x2022; Weekly automated malware scans (Wordfence / Sucuri)</text>
  <text x="40" y="224" fill="#2C2C2C" font-size="10.5">&#x2022; Web Application Firewall (WAF) via Cloudflare</text>
  <text x="40" y="240" fill="#2C2C2C" font-size="10.5">&#x2022; Brute-force login protection + 2FA + /wp-admin rename</text>
  <text x="40" y="256" fill="#2C2C2C" font-size="10.5">&#x2022; SSL certificate monitoring + annual renewal</text>
  <text x="40" y="272" fill="#2C2C2C" font-size="10.5">&#x2022; Admin user audit — remove dormant developer accounts</text>
  <rect x="264" y="264" width="116" height="22" fill="#FFE4E6" rx="3"/>
  <text x="322" y="279" text-anchor="middle" fill="#E94560" font-size="9.5" font-weight="700">Highest risk: healthcare + legal</text>

  <!-- CARD 2: Software Updates -->
  <rect x="412" y="148" width="368" height="166" fill="#FFFFFF" rx="8" filter="drop-shadow(0 2px 6px rgba(0,0,0,0.08))"/>
  <rect x="412" y="148" width="368" height="8" fill="#1A1A2E" rx="8 8 0 0"/>
  <circle cx="450" cy="188" r="22" fill="#E0E7FF"/>
  <text x="450" y="196" text-anchor="middle" fill="#1A1A2E" font-size="19">&#x1F504;</text>
  <text x="494" y="178" fill="#1A1A2E" font-size="11" font-weight="800">2. SOFTWARE UPDATES</text>
  <text x="432" y="208" fill="#2C2C2C" font-size="10.5">&#x2022; WordPress core security patches — applied immediately</text>
  <text x="432" y="224" fill="#2C2C2C" font-size="10.5">&#x2022; Plugin security releases — within 7 days</text>
  <text x="432" y="240" fill="#2C2C2C" font-size="10.5">&#x2022; Theme updates — tested &amp; deployed within 14 days</text>
  <text x="432" y="256" fill="#2C2C2C" font-size="10.5">&#x2022; All updates tested on staging before live deployment</text>
  <text x="432" y="272" fill="#2C2C2C" font-size="10.5">&#x2022; Feature updates batched monthly after staging verification</text>
  <rect x="582" y="264" width="190" height="22" fill="#DBEAFE" rx="3"/>
  <text x="677" y="279" text-anchor="middle" fill="#1e40af" font-size="9.5" font-weight="700">No.1 hack cause: outdated plugins</text>

  <!-- CARD 3: Daily Backups -->
  <rect x="20" y="328" width="368" height="166" fill="#FFFFFF" rx="8" filter="drop-shadow(0 2px 6px rgba(0,0,0,0.08))"/>
  <rect x="20" y="328" width="368" height="8" fill="#22C55E" rx="8 8 0 0"/>
  <circle cx="58" cy="368" r="22" fill="#DCFCE7"/>
  <text x="58" y="376" text-anchor="middle" fill="#166534" font-size="20">&#x1F4BE;</text>
  <text x="102" y="358" fill="#166534" font-size="11" font-weight="800">3. DAILY OFF-SITE BACKUPS</text>
  <text x="40" y="388" fill="#2C2C2C" font-size="10.5">&#x2022; Daily automated backups — database + all files</text>
  <text x="40" y="404" fill="#2C2C2C" font-size="10.5">&#x2022; Off-site storage: AWS S3 / Google Drive / Dropbox</text>
  <text x="40" y="420" fill="#2C2C2C" font-size="10.5">&#x2022; 30-day retention — recover to any point in last month</text>
  <text x="40" y="436" fill="#2C2C2C" font-size="10.5">&#x2022; Monthly restoration test on staging environment</text>
  <text x="40" y="452" fill="#2C2C2C" font-size="10.5">&#x2022; Recovery time: 1–2 hrs (vs. Ksh 15K–50K rebuild cost)</text>
  <rect x="200" y="444" width="180" height="22" fill="#DCFCE7" rx="3"/>
  <text x="290" y="459" text-anchor="middle" fill="#166534" font-size="9.5" font-weight="700">WooCommerce: backup every 6 hrs</text>

  <!-- CARD 4: Uptime Monitoring -->
  <rect x="412" y="328" width="368" height="166" fill="#FFFFFF" rx="8" filter="drop-shadow(0 2px 6px rgba(0,0,0,0.08))"/>
  <rect x="412" y="328" width="368" height="8" fill="#F59E0B" rx="8 8 0 0"/>
  <circle cx="450" cy="368" r="22" fill="#FEF3C7"/>
  <text x="450" y="376" text-anchor="middle" fill="#92400E" font-size="20">&#x26A1;</text>
  <text x="494" y="358" fill="#92400E" font-size="11" font-weight="800">4. UPTIME MONITORING</text>
  <text x="432" y="388" fill="#2C2C2C" font-size="10.5">&#x2022; Site checked every 5 minutes — 24/7/365</text>
  <text x="432" y="404" fill="#2C2C2C" font-size="10.5">&#x2022; Instant SMS + email alert when site goes offline</text>
  <text x="432" y="420" fill="#2C2C2C" font-size="10.5">&#x2022; Kenyan ISP downtime: 3–6 hrs unnoticed without monitoring</text>
  <text x="432" y="436" fill="#2C2C2C" font-size="10.5">&#x2022; Uptime % reported monthly in performance report</text>
  <text x="432" y="452" fill="#2C2C2C" font-size="10.5">&#x2022; Tool: Uptime Robot (alerts via phone, email, Slack)</text>
  <rect x="570" y="444" width="202" height="22" fill="#FEF3C7" rx="3"/>
  <text x="671" y="459" text-anchor="middle" fill="#92400E" font-size="9.5" font-weight="700">Downtime = lost leads + SEO damage</text>

  <!-- CARD 5: Performance Monitoring -->
  <rect x="20" y="508" width="368" height="166" fill="#FFFFFF" rx="8" filter="drop-shadow(0 2px 6px rgba(0,0,0,0.08))"/>
  <rect x="20" y="508" width="368" height="8" fill="#8B5CF6" rx="8 8 0 0"/>
  <circle cx="58" cy="548" r="22" fill="#EDE9FE"/>
  <text x="58" y="556" text-anchor="middle" fill="#5B21B6" font-size="20">&#x1F4CA;</text>
  <text x="102" y="538" fill="#5B21B6" font-size="11" font-weight="800">5. PERFORMANCE MONITORING</text>
  <text x="40" y="568" fill="#2C2C2C" font-size="10.5">&#x2022; Monthly Core Web Vitals check (LCP, INP, CLS)</text>
  <text x="40" y="584" fill="#2C2C2C" font-size="10.5">&#x2022; Google PageSpeed Insights score tracked over time</text>
  <text x="40" y="600" fill="#2C2C2C" font-size="10.5">&#x2022; Google Search Console error review monthly</text>
  <text x="40" y="616" fill="#2C2C2C" font-size="10.5">&#x2022; 404 errors, crawl issues, broken link monitoring</text>
  <text x="40" y="632" fill="#2C2C2C" font-size="10.5">&#x2022; Performance deterioration flagged before rankings drop</text>
  <rect x="184" y="624" width="196" height="22" fill="#EDE9FE" rx="3"/>
  <text x="282" y="639" text-anchor="middle" fill="#5B21B6" font-size="9.5" font-weight="700">CWV are confirmed Google ranking signals</text>

  <!-- CARD 6: Content Updates -->
  <rect x="412" y="508" width="368" height="166" fill="#FFFFFF" rx="8" filter="drop-shadow(0 2px 6px rgba(0,0,0,0.08))"/>
  <rect x="412" y="508" width="368" height="8" fill="#0EA5E9" rx="8 8 0 0"/>
  <circle cx="450" cy="548" r="22" fill="#E0F2FE"/>
  <text x="450" y="556" text-anchor="middle" fill="#0369A1" font-size="20">&#x270F;&#xFE0F;</text>
  <text x="494" y="538" fill="#0369A1" font-size="11" font-weight="800">6. CONTENT UPDATES</text>
  <text x="432" y="568" fill="#2C2C2C" font-size="10.5">&#x2022; Up to 1 hour/month of text changes included</text>
  <text x="432" y="584" fill="#2C2C2C" font-size="10.5">&#x2022; New service additions + photo swaps</text>
  <text x="432" y="600" fill="#2C2C2C" font-size="10.5">&#x2022; Ksh price updates + team profile changes</text>
  <text x="432" y="616" fill="#2C2C2C" font-size="10.5">&#x2022; Accurate content = better engagement signals</text>
  <text x="432" y="632" fill="#2C2C2C" font-size="10.5">&#x2022; Not included: new pages, new features, SEO strategy</text>
  <rect x="570" y="624" width="202" height="22" fill="#E0F2FE" rx="3"/>
  <text x="671" y="639" text-anchor="middle" fill="#0369A1" font-size="9.5" font-weight="700">Accuracy builds trust with Kenyan customers</text>

  <!-- What is NOT included notice -->
  <rect x="20" y="688" width="760" height="60" fill="#FFF1F2" rx="6" stroke="#E94560" stroke-width="1"/>
  <text x="400" y="710" text-anchor="middle" fill="#E94560" font-size="12" font-weight="700">WHAT MAINTENANCE DOES NOT INCLUDE</text>
  <text x="400" y="730" text-anchor="middle" fill="#2C2C2C" font-size="11">Rebuilding the website  |  Designing new pages  |  Developing new features  |  Writing new content</text>
  <text x="400" y="748" text-anchor="middle" fill="#555" font-size="10">These are separate development projects — billed accordingly. Contact Tupate Studio for a scoped quote.</text>

  <!-- ROI Banner -->
  <rect x="20" y="762" width="760" height="68" fill="#1A1A2E" rx="6"/>
  <text x="400" y="782" text-anchor="middle" fill="#E94560" font-size="12" font-weight="700">Cost of Inaction vs. Cost of Maintenance</text>
  <text x="200" y="806" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="800">Ksh 60K / year</text>
  <text x="200" y="822" text-anchor="middle" fill="#94A3B8" font-size="10">Full annual maintenance plan</text>
  <line x1="380" y1="774" x2="380" y2="826" stroke="#2C3E60" stroke-width="1"/>
  <text x="400" y="806" text-anchor="middle" fill="#F59E0B" font-size="14" font-weight="800">vs.</text>
  <line x1="420" y1="774" x2="420" y2="826" stroke="#2C3E60" stroke-width="1"/>
  <text x="600" y="806" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="800">Ksh 20K–80K</text>
  <text x="600" y="822" text-anchor="middle" fill="#94A3B8" font-size="10">Single hack recovery cost</text>

  <!-- Footer -->
  <text x="400" y="852" text-anchor="middle" font-size="11" fill="#999">tupate.studio</text>
