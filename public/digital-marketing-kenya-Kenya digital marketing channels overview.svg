  <text x="647" y="215" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#F5F5F5" text-anchor="middle">Immediate paid traffic</text>
  <text x="647" y="229" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#E94560" text-anchor="middle">Ksh 30–600 per click</text>
  <text x="647" y="243" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9" fill="#999" text-anchor="middle">Target by county or radius</text>

