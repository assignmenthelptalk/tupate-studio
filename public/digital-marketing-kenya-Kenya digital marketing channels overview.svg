<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 860" width="100%" role="img" aria-labelledby="infographic-title-3" version="1.1">
  <title id="infographic-title-3">Kenya Digital Marketing Channels Overview — 8 Acquisition Paths</title>
  <defs>
    <linearGradient id="hg3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1A1A2E" />
      <stop offset="100%" style="stop-color:#16213E" />
    </linearGradient>
  </defs>

  <rect width="800" height="860" fill="#F5F5F5" />

  <!-- Header -->
  <rect width="800" height="76" fill="url(#hg3)" />
  <text x="400" y="28" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="19" font-weight="700" fill="#FFFFFF" text-anchor="middle">Digital Marketing Channels in Kenya</text>
  <text x="400" y="55" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" fill="#E94560" text-anchor="middle">8 Distinct Customer Acquisition Paths</text>

  <!-- Hub: Website -->
  <circle cx="400" cy="420" r="62" fill="#E94560" />
  <circle cx="400" cy="420" r="56" fill="#1A1A2E" />
  <text x="400" y="413" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">YOUR</text>
  <text x="400" y="430" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" fill="#E94560" text-anchor="middle">WEBSITE</text>
  <text x="400" y="447" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#F5F5F5" text-anchor="middle">Conversion Hub</text>

  <!-- Spokes and Channel Nodes -->
  <!-- 1. Organic SEO — top -->
  <line x1="400" y1="358" x2="400" y2="228" stroke="#E94560" stroke-width="1.5" stroke-dasharray="5,3" />
  <rect x="306" y="150" width="188" height="76" rx="10" fill="#16213E" />
  <rect x="306" y="150" width="188" height="8" rx="5" fill="#E94560" />
  <text x="400" y="178" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">Organic SEO</text>
  <text x="400" y="196" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#F5F5F5" text-anchor="middle">Google.co.ke rankings</text>
  <text x="400" y="210" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#E94560" text-anchor="middle">Ksh 0 per click · compounds over time</text>
  <text x="400" y="222" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9" fill="#999" text-anchor="middle">Best ROI at 12+ months</text>

  <!-- 2. Google Ads — top right -->
  <line x1="444" y1="370" x2="564" y2="254" stroke="#E94560" stroke-width="1.5" stroke-dasharray="5,3" />
  <rect x="548" y="170" width="198" height="80" rx="10" fill="#16213E" />
