  <text x="400" y="762" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" fill="#1A1A2E" text-anchor="middle">Long-Term ROI Ranking for Kenyan SMEs</text>

  <rect x="30" y="772" width="680" height="18" rx="4" fill="#2C2C2C" opacity="0.1" />
  <rect x="30" y="772" width="680" height="18" rx="4" fill="none" stroke="#2C2C2C" stroke-width="0.5" />

