  <rect x="30" y="824" width="280" height="18" rx="4" fill="#2C2C2C" opacity="0.5" />
  <text x="176" y="837" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle">Social Media — Awareness / Brand</text>

  <!-- Footer -->
  <text x="400" y="850" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#999" text-anchor="middle">tupate.studio</text>
