  <text x="130" y="574" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#F5F5F5" text-anchor="middle">15–25% open rate Kenya</text>
  <text x="130" y="588" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#E94560" text-anchor="middle">Newsletters + automation</text>
  <text x="130" y="600" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9" fill="#999" text-anchor="middle">Best for repeat-purchase cycles</text>

