<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="100%" role="img" aria-labelledby="infographic-title" version="1.1">
  <title id="infographic-title">Kenyan Real Estate Photography Requirements: Standards for Property Listing Images That Convert</title>

  <!-- Background -->
  <rect width="800" height="1000" fill="#1A1A2E"/>

  <!-- Header -->
  <rect x="0" y="0" width="800" height="90" fill="#16213E"/>
  <text x="400" y="26" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#E94560" font-weight="700" text-anchor="middle" letter-spacing="2">KENYAN REAL ESTATE WEBSITE — PHOTOGRAPHY STANDARDS</text>
  <text x="400" y="56" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="21" fill="#F5F5F5" font-weight="700" text-anchor="middle">Real Estate Photography Requirements</text>
  <text x="400" y="78" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" fill="#CCCCCC" text-anchor="middle">Technical and content standards for Kenyan property listing photography that drives inquiries</text>

  <!-- Photo count requirements by tier -->
  <rect x="30" y="104" width="740" height="36" rx="4" fill="#E94560"/>
  <text x="400" y="127" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" fill="#FFFFFF" font-weight="700" text-anchor="middle">PHOTO COUNT BY PROPERTY TIER</text>

  <rect x="30" y="144" width="226" height="120" rx="4" fill="#16213E"/>
  <text x="143" y="168" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" fill="#E94560" font-weight="700" text-anchor="middle">STANDARD RESIDENTIAL</text>
  <text x="143" y="190" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="36" fill="#F5F5F5" font-weight="700" text-anchor="middle">8</text>
  <text x="143" y="214" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" fill="#CCCCCC" text-anchor="middle">minimum photos</text>
  <text x="143" y="234" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#999999" text-anchor="middle">Kilimani · Westlands</text>
  <text x="143" y="250" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#999999" text-anchor="middle">Ruaka · Syokimau</text>

  <rect x="287" y="144" width="226" height="120" rx="4" fill="#16213E"/>
  <text x="400" y="168" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" fill="#E94560" font-weight="700" text-anchor="middle">PREMIUM RESIDENTIAL</text>
  <text x="400" y="190" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="36" fill="#F5F5F5" font-weight="700" text-anchor="middle">12+</text>
  <text x="400" y="214" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" fill="#CCCCCC" text-anchor="middle">professional photos required</text>
  <text x="400" y="234" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#999999" text-anchor="middle">Karen · Runda · Muthaiga</text>
  <text x="400" y="250" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#999999" text-anchor="middle">Ksh 30M–200M decisions</text>

  <rect x="544" y="144" width="226" height="120" rx="4" fill="#16213E"/>
  <text x="657" y="168" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" fill="#E94560" font-weight="700" text-anchor="middle">OFF-PLAN PROJECT</text>
  <text x="657" y="190" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="36" fill="#F5F5F5" font-weight="700" text-anchor="middle">Monthly</text>
  <text x="657" y="214" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" fill="#CCCCCC" text-anchor="middle">progress gallery updates</text>
  <text x="657" y="234" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#999999" text-anchor="middle">Foundation → structure</text>
  <text x="657" y="250" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#999999" text-anchor="middle">→ fit-out phases</text>

  <!-- Required photo categories -->
