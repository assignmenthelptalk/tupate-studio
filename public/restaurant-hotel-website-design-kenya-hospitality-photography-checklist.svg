<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1040" width="100%" role="img" aria-labelledby="infographic-title" version="1.1">
  <title id="infographic-title">Kenyan Hospitality Photography Checklist: Hotel and Restaurant Photo Standards for Maximum Booking Conversion</title>

  <!-- Background -->
  <rect width="800" height="1040" fill="#1A1A2E"/>

  <!-- Header -->
  <rect x="0" y="0" width="800" height="96" fill="#16213E"/>
  <text x="400" y="26" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#E94560" font-weight="700" text-anchor="middle" letter-spacing="2">KENYAN HOSPITALITY WEBSITE — PHOTOGRAPHY CHECKLIST</text>
  <text x="400" y="56" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="21" fill="#F5F5F5" font-weight="700" text-anchor="middle">Hospitality Photography Checklist</text>
  <text x="400" y="80" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" fill="#CCCCCC" text-anchor="middle">Standards for Kenyan restaurant and hotel photography that converts searches into bookings</text>

  <!-- Column headers -->
  <rect x="30" y="108" width="355" height="32" rx="4" fill="#E94560"/>
  <text x="207" y="128" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" fill="#FFFFFF" font-weight="700" text-anchor="middle">HOTEL AND LODGE PHOTOGRAPHY</text>

  <rect x="415" y="108" width="355" height="32" rx="4" fill="#2C2C2C"/>
  <text x="592" y="128" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" fill="#E94560" font-weight="700" text-anchor="middle">RESTAURANT PHOTOGRAPHY</text>

  <!-- Hotel category 1 -->
  <rect x="30" y="144" width="355" height="130" rx="4" fill="#16213E"/>
  <text x="52" y="166" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" fill="#E94560" font-weight="700">ROOM TYPES</text>
  <text x="52" y="184" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">☑ Sleeping area from multiple angles</text>
  <text x="52" y="202" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">☑ Bathroom — full view + shower/bath</text>
  <text x="52" y="220" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">☑ Desk or seating area</text>
  <text x="52" y="238" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">☑ View from the window</text>
  <text x="52" y="256" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#999999">Each room type shot separately — not one photo per category</text>

  <!-- Restaurant category 1 -->
  <rect x="415" y="144" width="355" height="130" rx="4" fill="#16213E"/>
  <text x="437" y="166" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" fill="#E94560" font-weight="700">FOOD AND MENU</text>
  <text x="437" y="184" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">☑ Each signature dish photographed at plating</text>
  <text x="437" y="202" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">☑ Breakfast spread / brunch setup</text>
  <text x="437" y="220" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">☑ Bar setup and cocktail presentation</text>
  <text x="437" y="238" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">☑ Special menu items highlighted separately</text>
  <text x="437" y="256" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#999999">Displayed alongside the menu item name and price in KES</text>

  <!-- Hotel category 2 -->
  <rect x="30" y="278" width="355" height="130" rx="4" fill="#16213E"/>
  <text x="52" y="300" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" fill="#E94560" font-weight="700">COMMON AREAS</text>
  <text x="52" y="318" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">☑ Lobby / reception area</text>
  <text x="52" y="336" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">☑ Pool — daytime and evening lighting</text>
  <text x="52" y="354" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">☑ Gym and spa facilities</text>
  <text x="52" y="372" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">☑ On-site restaurant — dining setup</text>
  <text x="52" y="390" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#999999">Conference facilities if offered — separate business travel market</text>

  <!-- Restaurant category 2 -->
  <rect x="415" y="278" width="355" height="130" rx="4" fill="#16213E"/>
  <text x="437" y="300" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" fill="#E94560" font-weight="700">DINING ENVIRONMENT</text>
  <text x="437" y="318" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">☑ Interior dining room — full and intimate angles</text>
  <text x="437" y="336" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">☑ Outdoor terrace or garden seating</text>
  <text x="437" y="354" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">☑ Bar area and lounge setup</text>
  <text x="437" y="372" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">☑ Evening and weekend ambience lighting</text>
  <text x="437" y="390" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#999999">Ambience photos drive social sharing and event/group bookings</text>

  <!-- Hotel category 3 -->
  <rect x="30" y="412" width="355" height="130" rx="4" fill="#16213E"/>
  <text x="52" y="434" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" fill="#E94560" font-weight="700">ACTIVITIES AND ENVIRONMENT</text>
  <text x="52" y="452" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">☑ Game drive vehicles and wildlife sightings</text>
  <text x="52" y="470" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">☑ Water sports, cultural experiences</text>
  <text x="52" y="488" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">☑ Exterior facade — best angle and time of day</text>
  <text x="52" y="506" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">☑ Drone aerial — landscape and property position</text>
  <text x="52" y="524" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#999999">Mara savannah / Mt Kenya backdrop / Indian Ocean view — key selling context</text>

  <!-- Restaurant category 3 -->
  <rect x="415" y="412" width="355" height="130" rx="4" fill="#16213E"/>
  <text x="437" y="434" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" fill="#E94560" font-weight="700">DIETARY LABELLING IN PHOTOS</text>
  <text x="437" y="452" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">☑ Halal dishes — halal cert body logo displayed</text>
  <text x="437" y="470" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">☑ Vegetarian options clearly labelled per dish</text>
  <text x="437" y="488" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">☑ Vegan and gluten-free where applicable</text>
  <text x="437" y="506" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">☑ Sunday roast / seasonal game menu — featured</text>
  <text x="437" y="524" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#999999">Labels on individual dishes — not a general statement on the menu page</text>

  <!-- Technical specs unified section -->
  <rect x="30" y="556" width="740" height="36" rx="4" fill="#E94560"/>
  <text x="400" y="579" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" fill="#FFFFFF" font-weight="700" text-anchor="middle">TECHNICAL SPECIFICATIONS — ALL KENYAN HOSPITALITY PHOTOGRAPHY</text>

  <rect x="30" y="596" width="740" height="220" rx="4" fill="#16213E"/>

  <!-- Spec items in grid -->
  <rect x="50" y="612" width="330" height="54" rx="3" fill="#1A1A2E"/>
  <text x="70" y="632" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" fill="#E94560" font-weight="600">Camera Resolution</text>
  <text x="70" y="652" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">Minimum 24MP · Professional interior lighting — not flash</text>

  <rect x="410" y="612" width="340" height="54" rx="3" fill="#1A1A2E"/>
  <text x="430" y="632" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" fill="#E94560" font-weight="600">Image Format and Size</text>
  <text x="430" y="652" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">WebP format · Max 80KB per image for Safaricom/Airtel 4G</text>

  <rect x="50" y="678" width="330" height="54" rx="3" fill="#1A1A2E"/>
  <text x="70" y="698" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" fill="#E94560" font-weight="600">Loading Implementation</text>
  <text x="70" y="718" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">Lazy loading — photos load as user scrolls, not all on page load</text>

  <rect x="410" y="678" width="340" height="54" rx="3" fill="#1A1A2E"/>
  <text x="430" y="698" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" fill="#E94560" font-weight="600">Staging Requirement</text>
  <text x="430" y="718" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">Beds made · surfaces cleared · complementary props in place</text>

  <rect x="50" y="744" width="700" height="54" rx="3" fill="#1A1A2E"/>
  <text x="70" y="764" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" fill="#E94560" font-weight="600">Mobile Network Context</text>
  <text x="70" y="784" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">Kenyan guests are on Safaricom, Airtel, or Telkom mobile data — 3 second abandonment threshold. Optimisation is not optional.</text>

  <!-- Impact statement -->
  <rect x="30" y="830" width="740" height="80" rx="6" fill="#E94560"/>
  <text x="400" y="858" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="15" fill="#FFFFFF" font-weight="700" text-anchor="middle">Professional Photography Impact</text>
  <text x="400" y="880" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" fill="#FFFFFF" text-anchor="middle">The gap in inquiry rate between professionally photographed properties</text>
  <text x="400" y="898" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" fill="#FFFFFF" text-anchor="middle">and phone-photo properties is not marginal — it determines whether the website generates bookings.</text>

  <!-- Drone note -->
  <rect x="30" y="924" width="740" height="44" rx="4" fill="#16213E"/>
  <text x="52" y="944" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#CCCCCC">Drone aerial photography (upcountry lodges): shows property position within natural environment — Mara savannah,</text>
  <text x="52" y="962" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#CCCCCC">Amboseli plains, Diani beachfront, Mt Kenya slopes. Growing standard for premium properties targeting eco-tourist market.</text>

  <!-- Footer -->
  <text x="400" y="1022" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#999999" text-anchor="middle">tupate.studio</text>
</svg>
