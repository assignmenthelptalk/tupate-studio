<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1100" width="100%" role="img" aria-labelledby="infographic-title" version="1.1">
  <title id="infographic-title">Kenyan Education Curriculum Pathways: CBC, 8-4-4, IGCSE, TVETA and Professional Accreditations Explained</title>

  <!-- Background -->
  <rect width="800" height="1100" fill="#1A1A2E"/>

  <!-- Header -->
  <rect x="0" y="0" width="800" height="96" fill="#16213E"/>
  <text x="400" y="26" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#E94560" font-weight="700" text-anchor="middle" letter-spacing="2">SCHOOL AND COLLEGE WEBSITE DESIGN — KENYA</text>
  <text x="400" y="56" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="21" fill="#F5F5F5" font-weight="700" text-anchor="middle">Kenyan Education Curriculum Pathways</text>
  <text x="400" y="80" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" fill="#CCCCCC" text-anchor="middle">Every school website must specify which framework applies — Kenya's system is in structural transition in 2025–2026</text>

  <!-- Framework 1: CBC -->
  <rect x="30" y="108" width="740" height="36" rx="4" fill="#E94560"/>
  <text x="400" y="131" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" fill="#FFFFFF" font-weight="700" text-anchor="middle">COMPETENCY-BASED CURRICULUM (CBC) — Grade 1 to 9, rolled out from 2019</text>

  <rect x="30" y="148" width="740" height="230" rx="4" fill="#16213E"/>

  <!-- CBC grade bands -->
  <rect x="50" y="162" width="200" height="60" rx="3" fill="#1A1A2E"/>
  <text x="150" y="184" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#E94560" font-weight="700" text-anchor="middle">LOWER PRIMARY</text>
  <text x="150" y="202" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5" text-anchor="middle">Grade 1 – 3</text>
  <text x="150" y="216" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#CCCCCC" text-anchor="middle">Ages 6–8</text>

  <rect x="270" y="162" width="200" height="60" rx="3" fill="#1A1A2E"/>
  <text x="370" y="184" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#E94560" font-weight="700" text-anchor="middle">UPPER PRIMARY</text>
  <text x="370" y="202" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5" text-anchor="middle">Grade 4 – 6</text>
  <text x="370" y="216" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#CCCCCC" text-anchor="middle">Ages 9–11</text>

  <rect x="490" y="162" width="260" height="60" rx="3" fill="#E94560"/>
  <text x="620" y="184" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#FFFFFF" font-weight="700" text-anchor="middle">JUNIOR SECONDARY (JSS)</text>
  <text x="620" y="202" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#FFFFFF" text-anchor="middle">Grade 7 – 9</text>
  <text x="620" y="216" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#FFFFFF" text-anchor="middle">State JSS provision prominently on website</text>

  <!-- CBC learning areas -->
  <text x="52" y="248" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" fill="#E94560" font-weight="600">Grade 1–9 Learning Areas:</text>
  <text x="52" y="266" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">Languages (English · Kiswahili · Indigenous Language) · Mathematics · Integrated Science · Social Studies</text>
  <text x="52" y="284" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">Creative Arts and Sports · Pre-Technical Studies · Religious Education · Life Skills</text>
  <text x="52" y="312" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" fill="#E94560" font-weight="600">CBC Grade 10–12 Senior Secondary Pathways (where implemented):</text>
  <text x="52" y="330" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">
    <tspan>Science, Technology, Engineering and Mathematics (STEM)</tspan>
  </text>
  <text x="52" y="348" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">Social Sciences and Arts · Applied Technical and Technology</text>
  <text x="52" y="366" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#999999">Not all schools completed JSS transition by 2024–2025 — parents of Grade 7 children specifically search for schools offering JSS</text>

  <!-- Framework 2: 8-4-4 / KCSE -->
  <rect x="30" y="392" width="740" height="36" rx="4" fill="#2C2C2C"/>
  <text x="400" y="415" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" fill="#E94560" font-weight="700" text-anchor="middle">8-4-4 SYSTEM — Existing KCSE Candidates (Secondary Schools)</text>

  <rect x="30" y="432" width="740" height="210" rx="4" fill="#16213E"/>

  <!-- KCSE subjects grid -->
  <rect x="50" y="446" width="210" height="90" rx="3" fill="#1A1A2E"/>
  <text x="155" y="468" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#E94560" font-weight="700" text-anchor="middle">SCIENCES STREAM</text>
  <text x="155" y="486" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#F5F5F5" text-anchor="middle">Biology · Chemistry · Physics</text>
  <text x="155" y="502" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#F5F5F5" text-anchor="middle">Mathematics</text>
  <text x="155" y="520" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#999999" text-anchor="middle">Highest university entry demand</text>
  <text x="155" y="534" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#999999" text-anchor="middle">in Kenya</text>

  <rect x="280" y="446" width="210" height="90" rx="3" fill="#1A1A2E"/>
  <text x="385" y="468" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#E94560" font-weight="700" text-anchor="middle">COMMERCIAL STREAM</text>
  <text x="385" y="486" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#F5F5F5" text-anchor="middle">Business Studies · Economics</text>
  <text x="385" y="502" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#F5F5F5" text-anchor="middle">Accounting</text>
  <text x="385" y="520" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#999999" text-anchor="middle">Strong demand from Kenyan</text>
  <text x="385" y="534" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#999999" text-anchor="middle">SME-facing careers</text>

  <rect x="510" y="446" width="240" height="90" rx="3" fill="#1A1A2E"/>
  <text x="630" y="468" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#E94560" font-weight="700" text-anchor="middle">ARTS STREAM</text>
  <text x="630" y="486" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#F5F5F5" text-anchor="middle">History · Geography · Literature</text>
  <text x="630" y="502" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#F5F5F5" text-anchor="middle">Languages</text>
  <text x="630" y="520" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#999999" text-anchor="middle">Law, journalism, education,</text>
  <text x="630" y="534" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#999999" text-anchor="middle">government pathways</text>

  <text x="52" y="562" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#CCCCCC">KCSE Results Display: 5-year mean grade trend · University placement rate (KUCCPS public + private + international)</text>
  <text x="52" y="580" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#CCCCCC">Present results professionally — mean grade trends and top performer counts, not individual student scores (KDPA 2019)</text>
  <text x="52" y="600" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#999999">KCSE results released in November — publish results page that week to capture peak search traffic for school comparisons</text>
  <text x="52" y="618" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#999999">KCPE results released in March — same strategy for primary schools</text>

  <!-- Framework 3: International and Professional -->
  <rect x="30" y="658" width="740" height="36" rx="4" fill="#2C2C2C"/>
  <text x="400" y="681" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" fill="#E94560" font-weight="700" text-anchor="middle">INTERNATIONAL AND PROFESSIONAL CURRICULA</text>

  <rect x="30" y="698" width="355" height="140" rx="4" fill="#16213E"/>
  <text x="207" y="720" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" fill="#E94560" font-weight="700" text-anchor="middle">INTERNATIONAL CURRICULA</text>
  <text x="52" y="742" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">IGCSE: Cambridge International · premium Nairobi schools</text>
  <text x="52" y="760" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">A-level: post-IGCSE university preparation</text>
  <text x="52" y="778" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">IB: International Baccalaureate · elite tier</text>
  <text x="52" y="796" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">Target: expat community + Kenyan families seeking international university</text>
  <text x="52" y="814" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#999999">State accreditation body on website: Cambridge, IBO</text>

  <rect x="415" y="698" width="355" height="140" rx="4" fill="#16213E"/>
  <text x="592" y="720" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" fill="#E94560" font-weight="700" text-anchor="middle">PROFESSIONAL / TECHNICAL COLLEGES</text>
  <text x="437" y="742" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">TVETA registration number (Tech and Vocational)</text>
  <text x="437" y="760" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">KNEC examination registration</text>
  <text x="437" y="778" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">ICPAK (accounting) · NCA Kenya (construction)</text>
  <text x="437" y="796" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">Professional Nursing Council (healthcare)</text>
  <text x="437" y="814" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#999999">Display accreditation on relevant programme pages</text>

  <!-- Professional college content requirements -->
  <rect x="30" y="852" width="740" height="100" rx="4" fill="#16213E"/>
  <text x="52" y="874" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" fill="#E94560" font-weight="600">Required on every professional programme page:</text>
  <text x="52" y="893" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">Course duration · Intake / start dates · Examination schedule · Job placement rate after completion</text>
  <text x="52" y="911" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">Entry requirements (KCSE minimum grade) · Fee structure per term in KES · M-Pesa Paybill number</text>
  <text x="52" y="929" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">Accreditation registration number displayed prominently</text>
  <text x="52" y="947" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#999999">Adult learners evaluating professional training need this information before committing to a programme — generic descriptions lose enrollments</text>

  <!-- Footer note -->
  <rect x="30" y="966" width="740" height="44" rx="4" fill="#E94560" opacity="0.15"/>
  <rect x="30" y="966" width="6" height="44" rx="3" fill="#E94560"/>
  <text x="52" y="986" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">Kenya's education system is in structural transition. A school website that specifies its curriculum framework precisely</text>
  <text x="52" y="1004" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" fill="#F5F5F5">passes the Kenyan parent clarity test. A website that says "quality education" without framework specificity fails it.</text>

  <!-- Footer -->
  <text x="400" y="1082" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" fill="#999999" text-anchor="middle">tupate.studio</text>
</svg>
