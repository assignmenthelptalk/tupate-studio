<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 760" width="100%" role="img" aria-labelledby="infographic-title" font-family="'Inter', 'Segoe UI', Arial, sans-serif">
  <title id="infographic-title">Custom-Built Website vs WordPress Kenya — Speed, Security and Cost Comparison — Tupate Studio</title>

  <!-- Background -->
  <rect width="800" height="760" fill="#1A1A2E"/>

  <!-- Header -->
  <rect x="0" y="0" width="800" height="88" fill="#16213E"/>
  <rect x="0" y="85" width="800" height="3" fill="#E94560"/>
  <text x="400" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#FFFFFF">Custom-Built Website vs WordPress in Kenya</text>
  <text x="400" y="63" text-anchor="middle" font-size="13" fill="#E94560" font-weight="600" letter-spacing="1">SPEED · SECURITY · 3-YEAR COST — TUPATE STUDIO</text>

  <!-- ====== SECTION 1: Core Web Vitals ====== -->
  <text x="400" y="110" text-anchor="middle" font-size="15" font-weight="700" fill="#F5F5F5">Core Web Vitals — Real-World Kenyan Websites</text>

  <!-- Column labels -->
  <rect x="310" y="118" width="190" height="30" rx="5" fill="#16213E" stroke="#A0A0B0" stroke-width="1"/>
  <text x="405" y="137" text-anchor="middle" font-size="13" font-weight="700" fill="#A0A0B0">WordPress</text>
  <rect x="510" y="118" width="200" height="30" rx="5" fill="#E94560"/>
  <text x="610" y="137" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">Custom-Built</text>
  <text x="730" y="137" text-anchor="middle" font-size="11" fill="#A0A0B0">Threshold</text>

  <!-- LCP Row -->
  <rect x="30" y="155" width="740" height="50" rx="0" fill="#16213E"/>
  <text x="155" y="182" text-anchor="middle" font-size="12" font-weight="600" fill="#A0A0B0">LCP (Largest Contentful Paint)</text>
  <!-- WordPress bar -->
  <rect x="315" y="165" width="180" height="22" rx="4" fill="#E94560" opacity="0.25"/>
  <text x="405" y="181" text-anchor="middle" font-size="13" font-weight="700" fill="#E94560">4.8 s — FAIL</text>
  <!-- Custom bar -->
  <rect x="515" y="165" width="100" height="22" rx="4" fill="#E94560" opacity="0.15"/>
  <text x="610" y="181" text-anchor="middle" font-size="13" font-weight="700" fill="#4CAF50">1.4 s — PASS</text>
  <text x="730" y="181" text-anchor="middle" font-size="11" fill="#A0A0B0">&lt; 2.5 s</text>

  <line x1="30" y1="205" x2="770" y2="205" stroke="#2C2C4E" stroke-width="1.2"/>

  <!-- CLS Row -->
  <rect x="30" y="205" width="740" height="50" fill="#1A1A2E"/>
  <text x="155" y="232" text-anchor="middle" font-size="12" font-weight="600" fill="#A0A0B0">CLS (Cumulative Layout Shift)</text>
  <rect x="315" y="215" width="180" height="22" rx="4" fill="#E94560" opacity="0.25"/>
  <text x="405" y="231" text-anchor="middle" font-size="13" font-weight="700" fill="#E94560">0.25 — FAIL</text>
  <rect x="515" y="215" width="100" height="22" rx="4" fill="#4CAF50" opacity="0.15"/>
  <text x="610" y="231" text-anchor="middle" font-size="13" font-weight="700" fill="#4CAF50">0.02 — PASS</text>
  <text x="730" y="231" text-anchor="middle" font-size="11" fill="#A0A0B0">&lt; 0.1</text>

  <line x1="30" y1="255" x2="770" y2="255" stroke="#2C2C4E" stroke-width="1.2"/>

  <!-- INP Row -->
  <rect x="30" y="255" width="740" height="50" fill="#16213E"/>
  <text x="155" y="282" text-anchor="middle" font-size="12" font-weight="600" fill="#A0A0B0">INP (Interaction to Next Paint)</text>
  <rect x="315" y="265" width="180" height="22" rx="4" fill="#E94560" opacity="0.25"/>
  <text x="405" y="281" text-anchor="middle" font-size="13" font-weight="700" fill="#E94560">380 ms — FAIL</text>
  <rect x="515" y="265" width="100" height="22" rx="4" fill="#4CAF50" opacity="0.15"/>
  <text x="610" y="281" text-anchor="middle" font-size="13" font-weight="700" fill="#4CAF50">80 ms — PASS</text>
  <text x="730" y="281" text-anchor="middle" font-size="11" fill="#A0A0B0">&lt; 200 ms</text>

  <line x1="30" y1="305" x2="770" y2="305" stroke="#2C2C4E" stroke-width="1.2"/>

  <!-- PageSpeed Row -->
  <rect x="30" y="305" width="740" height="50" fill="#1A1A2E"/>
  <text x="155" y="332" text-anchor="middle" font-size="12" font-weight="600" fill="#A0A0B0">Google PageSpeed (Mobile)</text>
  <rect x="315" y="315" width="90" height="22" rx="4" fill="#E94560" opacity="0.3"/>
  <text x="405" y="331" text-anchor="middle" font-size="13" font-weight="700" fill="#E94560">35 – 55</text>
  <rect x="515" y="315" width="190" height="22" rx="4" fill="#4CAF50" opacity="0.2"/>
  <text x="610" y="331" text-anchor="middle" font-size="13" font-weight="700" fill="#4CAF50">88 – 98</text>
  <text x="730" y="331" text-anchor="middle" font-size="11" fill="#A0A0B0">90+ = Good</text>

  <!-- Table outline -->
  <rect x="30" y="155" width="740" height="200" fill="none" stroke="#2C2C4E" stroke-width="1.5"/>
  <line x1="310" y1="155" x2="310" y2="355" stroke="#2C2C4E" stroke-width="1.2"/>
  <line x1="500" y1="155" x2="500" y2="355" stroke="#2C2C4E" stroke-width="1.2"/>
  <line x1="710" y1="155" x2="710" y2="355" stroke="#2C2C4E" stroke-width="1.2"/>

  <!-- ====== SECTION 2: Page Weight Visual ====== -->
  <text x="400" y="382" text-anchor="middle" font-size="15" font-weight="700" fill="#F5F5F5">Page Weight: What Your Visitors' Phones Must Download</text>

  <!-- WordPress weight bar -->
  <text x="155" y="410" text-anchor="middle" font-size="12" font-weight="600" fill="#A0A0B0">WordPress</text>
  <rect x="310" y="397" width="370" height="26" rx="5" fill="#E94560" opacity="0.7"/>
  <text x="496" y="415" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">2 MB – 4 MB average page weight</text>

  <!-- Custom weight bar -->
  <text x="155" y="445" text-anchor="middle" font-size="12" font-weight="600" fill="#A0A0B0">Custom-Built</text>
  <rect x="310" y="432" width="90" height="26" rx="5" fill="#4CAF50" opacity="0.7"/>
  <text x="355" y="450" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">200 – 600 KB</text>

  <!-- Ratio callout -->
  <rect x="620" y="395" width="145" height="70" rx="8" fill="#E94560"/>
  <text x="692" y="420" text-anchor="middle" font-size="24" font-weight="700" fill="#FFFFFF">5–20×</text>
  <text x="692" y="440" text-anchor="middle" font-size="11" fill="#FFFFFF">heavier page</text>
  <text x="692" y="455" text-anchor="middle" font-size="11" fill="#FFFFFF">on WordPress</text>

  <!-- Kenya mobile footnote -->
  <text x="400" y="482" text-anchor="middle" font-size="11.5" fill="#A0A0B0">On 4Mbps upcountry 3G: WordPress = 6 s before render · Custom = under 1 s · 53% abandon at 3+ s</text>

  <!-- ====== SECTION 3: 3-Year Cost Comparison ====== -->
  <text x="400" y="512" text-anchor="middle" font-size="15" font-weight="700" fill="#F5F5F5">3-Year Total Cost of Ownership (Kenyan Shillings)</text>

  <!-- WordPress cost breakdown -->
  <rect x="30" y="522" width="355" height="180" rx="8" fill="#16213E" stroke="#E94560" stroke-width="1"/>
  <rect x="30" y="522" width="355" height="32" rx="8" fill="#E94560" opacity="0.2"/>
  <text x="207" y="543" text-anchor="middle" font-size="13" font-weight="700" fill="#E94560">WordPress (3-Year Typical)</text>

  <text x="50" y="572" font-size="11.5" fill="#A0A0B0">Initial build</text>
  <text x="375" y="572" text-anchor="end" font-size="11.5" fill="#F5F5F5">Ksh 5,000 – 15,000</text>
  <text x="50" y="592" font-size="11.5" fill="#A0A0B0">Theme renewals × 3 yrs</text>
  <text x="375" y="592" text-anchor="end" font-size="11.5" fill="#F5F5F5">Ksh 36,000 – 45,000</text>
  <text x="50" y="612" font-size="11.5" fill="#A0A0B0">Plugin licences × 3 yrs</text>
  <text x="375" y="612" text-anchor="end" font-size="11.5" fill="#F5F5F5">Ksh 45,000 – 120,000</text>
  <text x="50" y="632" font-size="11.5" fill="#A0A0B0">Developer fixes (3–6×/yr)</text>
  <text x="375" y="632" text-anchor="end" font-size="11.5" fill="#F5F5F5">Ksh 27,000 – 90,000</text>
  <text x="50" y="652" font-size="11.5" fill="#A0A0B0">Hack recovery (30% risk/yr)</text>
  <text x="375" y="652" text-anchor="end" font-size="11.5" fill="#F5F5F5">Ksh 0 – 45,000</text>
  <line x1="50" y1="662" x2="375" y2="662" stroke="#E94560" stroke-width="1"/>
  <text x="50" y="682" font-size="13" font-weight="700" fill="#E94560">3-Year Total</text>
  <text x="375" y="682" text-anchor="end" font-size="14" font-weight="700" fill="#E94560">~Ksh 191,000</text>

  <!-- Custom cost breakdown -->
  <rect x="415" y="522" width="355" height="180" rx="8" fill="#16213E" stroke="#4CAF50" stroke-width="1.5"/>
  <rect x="415" y="522" width="355" height="32" rx="8" fill="#4CAF50" opacity="0.15"/>
  <text x="592" y="543" text-anchor="middle" font-size="13" font-weight="700" fill="#4CAF50">Custom-Built / Tupate Studio (3-Year)</text>

  <text x="435" y="572" font-size="11.5" fill="#A0A0B0">Build cost (complete)</text>
  <text x="760" y="572" text-anchor="end" font-size="11.5" fill="#F5F5F5">Ksh 25,000 (one-time)</text>
  <text x="435" y="592" font-size="11.5" fill="#A0A0B0">Theme / plugin renewals</text>
  <text x="760" y="592" text-anchor="end" font-size="11.5" fill="#4CAF50">None</text>
  <text x="435" y="612" font-size="11.5" fill="#A0A0B0">Security incidents</text>
  <text x="760" y="612" text-anchor="end" font-size="11.5" fill="#4CAF50">Rare — no CVEs, no wp-admin</text>
  <text x="435" y="632" font-size="11.5" fill="#A0A0B0">Optional maintenance retainer</text>
  <text x="760" y="632" text-anchor="end" font-size="11.5" fill="#F5F5F5">Ksh 5,000/mo (optional)</text>
  <text x="435" y="652" font-size="11.5" fill="#A0A0B0">PageSpeed mobile score</text>
  <text x="760" y="652" text-anchor="end" font-size="11.5" fill="#4CAF50">88 – 98 (PASS)</text>
  <line x1="435" y1="662" x2="760" y2="662" stroke="#4CAF50" stroke-width="1"/>
  <text x="435" y="682" font-size="13" font-weight="700" fill="#4CAF50">3-Year Total (no retainer)</text>
  <text x="760" y="682" text-anchor="end" font-size="14" font-weight="700" fill="#4CAF50">Ksh 25,000</text>

  <!-- Footer -->
  <text x="400" y="748" text-anchor="middle" font-size="11" fill="#999">tupate.studio</text>
</svg>
