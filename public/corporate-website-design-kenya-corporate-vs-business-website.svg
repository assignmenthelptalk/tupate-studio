<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 680" width="100%" role="img" aria-labelledby="infographic-title" font-family="'Inter', 'Segoe UI', Arial, sans-serif">
  <title id="infographic-title">Corporate Website vs Business Website Comparison — Tupate Studio Kenya</title>

  <!-- Background -->
  <rect width="800" height="680" fill="#1A1A2E"/>

  <!-- Header -->
  <rect x="0" y="0" width="800" height="88" fill="#16213E"/>
  <rect x="0" y="85" width="800" height="3" fill="#E94560"/>
  <text x="400" y="38" text-anchor="middle" font-size="23" font-weight="700" fill="#FFFFFF">Corporate Website vs Business Website in Kenya</text>
  <text x="400" y="65" text-anchor="middle" font-size="13" fill="#E94560" font-weight="600" letter-spacing="1">WHAT'S THE DIFFERENCE? — TUPATE STUDIO</text>

  <!-- Column headers -->
  <rect x="200" y="100" width="240" height="44" rx="6" fill="#16213E" stroke="#A0A0B0" stroke-width="1"/>
  <text x="320" y="127" text-anchor="middle" font-size="15" font-weight="700" fill="#F5F5F5">Business Website</text>

  <rect x="460" y="100" width="240" height="44" rx="6" fill="#E94560"/>
  <text x="580" y="127" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">Corporate Website</text>

  <!-- Attribute column label -->
  <text x="95" y="127" text-anchor="middle" font-size="13" font-weight="600" fill="#A0A0B0">ATTRIBUTE</text>

  <!-- Row definitions: [y, attr, biz, corp] -->
  <!-- Row separator lines and rows -->

  <!-- Row 1: Primary Audience -->
  <rect x="30" y="156" width="740" height="58" rx="0" fill="#16213E"/>
  <rect x="30" y="156" width="740" height="1" fill="#2C2C4E"/>
  <text x="95" y="184" text-anchor="middle" font-size="12" font-weight="600" fill="#A0A0B0">Primary</text>
  <text x="95" y="200" text-anchor="middle" font-size="12" font-weight="600" fill="#A0A0B0">Audience</text>
  <rect x="200" y="160" width="240" height="50" rx="0" fill="none"/>
  <text x="320" y="183" text-anchor="middle" font-size="12" fill="#F5F5F5">End customers only</text>
  <rect x="460" y="160" width="240" height="50" rx="0" fill="none"/>
  <text x="580" y="176" text-anchor="middle" font-size="11.5" fill="#FFFFFF">Investors · Clients · Talent</text>
  <text x="580" y="192" text-anchor="middle" font-size="11.5" fill="#FFFFFF">Media · Partners · Regulators</text>

  <!-- Divider -->
  <line x1="30" y1="214" x2="770" y2="214" stroke="#2C2C4E" stroke-width="1.5"/>

  <!-- Row 2: Pages -->
  <rect x="30" y="214" width="740" height="58" fill="#1A1A2E"/>
  <text x="95" y="242" text-anchor="middle" font-size="12" font-weight="600" fill="#A0A0B0">Page Count</text>
  <text x="320" y="248" text-anchor="middle" font-size="20" font-weight="700" fill="#F5F5F5">5 – 10</text>
  <text x="580" y="245" text-anchor="middle" font-size="20" font-weight="700" fill="#FFFFFF">20 – 50+</text>

  <!-- Divider -->
  <line x1="30" y1="272" x2="770" y2="272" stroke="#2C2C4E" stroke-width="1.5"/>

  <!-- Row 3: Navigation Depth -->
  <rect x="30" y="272" width="740" height="58" fill="#16213E"/>
  <text x="95" y="300" text-anchor="middle" font-size="12" font-weight="600" fill="#A0A0B0">Navigation</text>
  <text x="95" y="316" text-anchor="middle" font-size="12" font-weight="600" fill="#A0A0B0">Depth</text>
  <!-- 2 level visual -->
  <rect x="268" y="286" width="52" height="16" rx="3" fill="#A0A0B0"/>
  <rect x="278" y="306" width="32" height="12" rx="3" fill="#A0A0B0" opacity="0.5"/>
  <text x="320" y="315" text-anchor="middle" font-size="11" fill="#F5F5F5">2 levels</text>
  <!-- 4 level visual -->
  <rect x="528" y="280" width="52" height="12" rx="3" fill="#E94560"/>
  <rect x="536" y="295" width="44" height="10" rx="3" fill="#E94560" opacity="0.75"/>
  <rect x="541" y="308" width="34" height="9" rx="3" fill="#E94560" opacity="0.55"/>
  <rect x="544" y="320" width="28" height="8" rx="3" fill="#E94560" opacity="0.35"/>
  <text x="580" y="315" text-anchor="middle" font-size="11" fill="#FFFFFF">3 – 4 levels</text>

  <!-- Divider -->
  <line x1="30" y1="330" x2="770" y2="330" stroke="#2C2C4E" stroke-width="1.5"/>

  <!-- Row 4: Content Types -->
  <rect x="30" y="330" width="740" height="68" fill="#1A1A2E"/>
  <text x="95" y="358" text-anchor="middle" font-size="12" font-weight="600" fill="#A0A0B0">Content</text>
  <text x="95" y="374" text-anchor="middle" font-size="12" font-weight="600" fill="#A0A0B0">Types</text>
  <text x="320" y="358" text-anchor="middle" font-size="11.5" fill="#F5F5F5">Services · Contact · About</text>
  <text x="580" y="348" text-anchor="middle" font-size="11" fill="#FFFFFF">Annual Reports · Board of Directors</text>
  <text x="580" y="363" text-anchor="middle" font-size="11" fill="#FFFFFF">Press Room · Investor Relations</text>
  <text x="580" y="378" text-anchor="middle" font-size="11" fill="#FFFFFF">Careers · CSR · Tenders</text>

  <!-- Divider -->
  <line x1="30" y1="398" x2="770" y2="398" stroke="#2C2C4E" stroke-width="1.5"/>

  <!-- Row 5: Compliance -->
  <rect x="30" y="398" width="740" height="68" fill="#16213E"/>
  <text x="95" y="425" text-anchor="middle" font-size="12" font-weight="600" fill="#A0A0B0">Compliance</text>
  <text x="320" y="430" text-anchor="middle" font-size="12" fill="#F5F5F5">Basic / Standard</text>
  <text x="580" y="418" text-anchor="middle" font-size="11" fill="#FFFFFF">KDPA 2019 · KEBS</text>
  <text x="580" y="433" text-anchor="middle" font-size="11" fill="#FFFFFF">KRA PIN · Regulatory body</text>
  <text x="580" y="448" text-anchor="middle" font-size="11" fill="#E94560" font-weight="600">Penalty: up to Ksh 5M</text>

  <!-- Divider -->
  <line x1="30" y1="466" x2="770" y2="466" stroke="#2C2C4E" stroke-width="1.5"/>

  <!-- Row 6: Update Frequency -->
  <rect x="30" y="466" width="740" height="58" fill="#1A1A2E"/>
  <text x="95" y="494" text-anchor="middle" font-size="12" font-weight="600" fill="#A0A0B0">Update</text>
  <text x="95" y="510" text-anchor="middle" font-size="12" font-weight="600" fill="#A0A0B0">Frequency</text>
  <text x="320" y="500" text-anchor="middle" font-size="13" fill="#F5F5F5">Monthly</text>
  <text x="580" y="496" text-anchor="middle" font-size="13" fill="#FFFFFF" font-weight="700">Weekly</text>
  <text x="580" y="512" text-anchor="middle" font-size="11" fill="#A0A0B0">News · press releases · tenders</text>

  <!-- Divider -->
  <line x1="30" y1="524" x2="770" y2="524" stroke="#2C2C4E" stroke-width="1.5"/>

  <!-- Row 7: Typical Cost -->
  <rect x="30" y="524" width="740" height="68" rx="0" fill="#16213E"/>
  <text x="95" y="551" text-anchor="middle" font-size="12" font-weight="600" fill="#A0A0B0">Typical Cost</text>
  <text x="95" y="567" text-anchor="middle" font-size="12" font-weight="600" fill="#A0A0B0">Ksh (Kenya)</text>
  <!-- Business cost bar -->
  <rect x="210" y="548" width="120" height="20" rx="4" fill="#A0A0B0" opacity="0.4"/>
  <text x="320" y="563" text-anchor="middle" font-size="13" font-weight="700" fill="#F5F5F5">25,000 – 40,000</text>
  <text x="320" y="580" text-anchor="middle" font-size="10" fill="#A0A0B0">10–15 pages</text>
  <!-- Corporate cost bar -->
  <rect x="470" y="545" width="220" height="20" rx="4" fill="#E94560" opacity="0.3"/>
  <text x="580" y="560" text-anchor="middle" font-size="13" font-weight="700" fill="#E94560">60,000 – 150,000</text>
  <text x="580" y="578" text-anchor="middle" font-size="10" fill="#A0A0B0">Careers portal · CMS · KDPA compliance</text>

  <!-- Bottom border -->
  <rect x="30" y="592" width="740" height="1" fill="#2C2C4E"/>

  <!-- Vertical separators spanning rows -->
  <line x1="200" y1="156" x2="200" y2="592" stroke="#2C2C4E" stroke-width="1.5"/>
  <line x1="440" y1="156" x2="440" y2="592" stroke="#2C2C4E" stroke-width="1.5"/>
  <line x1="700" y1="156" x2="700" y2="592" stroke="#2C2C4E" stroke-width="1.5"/>
  <line x1="30" y1="156" x2="30" y2="592" stroke="#2C2C4E" stroke-width="1.5"/>
  <line x1="770" y1="156" x2="770" y2="592" stroke="#2C2C4E" stroke-width="1.5"/>

  <!-- Bottom message -->
  <rect x="0" y="610" width="800" height="42" fill="#E94560" opacity="0.12"/>
  <text x="400" y="635" text-anchor="middle" font-size="12.5" fill="#FFFFFF">Tupate Studio builds both — custom-coded, fast, KDPA-compliant. Starting Ksh 25,000.</text>

  <!-- Footer -->
  <text x="400" y="668" text-anchor="middle" font-size="11" fill="#999">tupate.studio</text>
</svg>
