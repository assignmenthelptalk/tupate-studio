<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700" width="100%" height="auto" role="img" aria-labelledby="infographic-title-1">
  <title id="infographic-title-1">Anatomy of a High-Converting Kenyan Business Website</title>

