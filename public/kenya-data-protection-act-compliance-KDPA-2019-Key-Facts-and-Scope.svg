<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 0 800 620" width="100%"
     role="img" aria-labelledby="infographic-title-1">
  <title id="infographic-title-1">KDPA 2019 Key Facts and Scope — Kenya Data Protection Act Overview</title>
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1A1A2E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c73652;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="620" fill="#F5F5F5" rx="0"/>

  <!-- Header band -->
  <rect width="800" height="90" fill="url(#headerGrad)" rx="0"/>
  <rect y="88" width="800" height="4" fill="#E94560"/>

  <!-- Header text -->
  <text x="400" y="38" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="22" font-weight="700"
        fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5">KENYA DATA PROTECTION ACT 2019</text>
  <text x="400" y="64" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" font-weight="400"
        fill="#E94560" text-anchor="middle" letter-spacing="1">KEY FACTS AND SCOPE</text>

  <!-- ── ROW 1: 3 stat cards ── -->

  <!-- Card 1: Enacted -->
  <rect x="30" y="112" width="222" height="120" rx="6" fill="#1A1A2E"/>
  <rect x="30" y="112" width="222" height="5" rx="3" fill="#E94560"/>
  <text x="141" y="158" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="38" font-weight="800"
        fill="#E94560" text-anchor="middle">2019</text>
  <text x="141" y="180" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" font-weight="600"
        fill="#FFFFFF" text-anchor="middle">ENACTED</text>
  <text x="141" y="200" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10.5" font-weight="400"
        fill="#aaaacc" text-anchor="middle">8 November 2019</text>
  <text x="141" y="218" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" font-weight="400"
        fill="#aaaacc" text-anchor="middle">Operational from 2021</text>

  <!-- Card 2: Regulatory Body -->
  <rect x="289" y="112" width="222" height="120" rx="6" fill="#1A1A2E"/>
  <rect x="289" y="112" width="222" height="5" rx="3" fill="#E94560"/>
  <text x="400" y="150" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="26" font-weight="800"
        fill="#E94560" text-anchor="middle">ODPC</text>
  <text x="400" y="172" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" font-weight="600"
        fill="#FFFFFF" text-anchor="middle">REGULATORY BODY</text>
  <text x="400" y="192" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" font-weight="400"
        fill="#aaaacc" text-anchor="middle">Office of the Data</text>
  <text x="400" y="207" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" font-weight="400"
        fill="#aaaacc" text-anchor="middle">Protection Commissioner</text>
  <text x="400" y="222" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" font-weight="400"
        fill="#aaaacc" text-anchor="middle">odpc.go.ke</text>

  <!-- Card 3: Max Fine -->
  <rect x="548" y="112" width="222" height="120" rx="6" fill="#1A1A2E"/>
  <rect x="548" y="112" width="222" height="5" rx="3" fill="#E94560"/>
  <text x="659" y="152" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="22" font-weight="800"
        fill="#E94560" text-anchor="middle">Ksh 5,000,000</text>
  <text x="659" y="172" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" font-weight="600"
        fill="#FFFFFF" text-anchor="middle">MAXIMUM FINE</text>
  <text x="659" y="192" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" font-weight="400"
        fill="#aaaacc" text-anchor="middle">or 1% annual gross turnover</text>
  <text x="659" y="208" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" font-weight="400"
        fill="#aaaacc" text-anchor="middle">(whichever is higher)</text>
  <text x="659" y="224" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" font-weight="400"
        fill="#aaaacc" text-anchor="middle">≈ USD 35,000</text>

  <!-- ── ROW 2: 2 more stat cards ── -->

  <!-- Card 4: Breach Notification -->
  <rect x="30" y="252" width="340" height="100" rx="6" fill="#16213E"/>
  <rect x="30" y="252" width="340" height="5" rx="3" fill="#E94560"/>
  <text x="200" y="291" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="40" font-weight="800"
        fill="#E94560" text-anchor="middle">72 hrs</text>
  <text x="200" y="315" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" font-weight="600"
        fill="#FFFFFF" text-anchor="middle">MANDATORY BREACH NOTIFICATION</text>
  <text x="200" y="335" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" font-weight="400"
        fill="#aaaacc" text-anchor="middle">Report to ODPC within 72 hours of discovering a data breach</text>

  <!-- Card 5: GDPR-modelled -->
  <rect x="430" y="252" width="340" height="100" rx="6" fill="#16213E"/>
  <rect x="430" y="252" width="340" height="5" rx="3" fill="#E94560"/>
  <text x="600" y="291" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="22" font-weight="800"
        fill="#E94560" text-anchor="middle">GDPR-Modelled</text>
  <text x="600" y="315" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" font-weight="600"
        fill="#FFFFFF" text-anchor="middle">INTERNATIONAL STANDARD</text>
  <text x="600" y="335" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" font-weight="400"
        fill="#aaaacc" text-anchor="middle">Adapted from EU GDPR for Kenya's regulatory context</text>

  <!-- ── 8 Data Principles section ── -->
  <rect x="30" y="372" width="740" height="36" rx="4" fill="url(#accentGrad)"/>
  <text x="400" y="396" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" font-weight="700"
        fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5">THE 8 CORE KDPA DATA PROTECTION PRINCIPLES</text>

  <!-- Principles grid: 4 + 4 -->
  <!-- Row A -->
  <!-- P1 -->
  <rect x="30" y="418" width="170" height="70" rx="5" fill="#FFFFFF"/>
  <rect x="30" y="418" width="170" height="4" rx="2" fill="#E94560"/>
  <text x="40" y="440" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="700"
        fill="#1A1A2E">1. Lawfulness, Fairness</text>
  <text x="40" y="455" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="700"
        fill="#1A1A2E">    &amp; Transparency</text>
  <text x="40" y="472" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" fill="#555">
    Process data with a legal basis</text>
  <text x="40" y="484" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" fill="#555">
    and inform users clearly</text>

  <!-- P2 -->
  <rect x="210" y="418" width="170" height="70" rx="5" fill="#FFFFFF"/>
  <rect x="210" y="418" width="170" height="4" rx="2" fill="#E94560"/>
  <text x="220" y="440" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="700"
        fill="#1A1A2E">2. Purpose Limitation</text>
  <text x="220" y="460" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" fill="#555">
    Collect only for specified,</text>
  <text x="220" y="473" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" fill="#555">
    explicit, legitimate purposes</text>

  <!-- P3 -->
  <rect x="390" y="418" width="170" height="70" rx="5" fill="#FFFFFF"/>
  <rect x="390" y="418" width="170" height="4" rx="2" fill="#E94560"/>
  <text x="400" y="440" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="700"
        fill="#1A1A2E">3. Data Minimisation</text>
  <text x="400" y="460" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" fill="#555">
    Collect only what is</text>
  <text x="400" y="473" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" fill="#555">
    necessary for the purpose</text>

  <!-- P4 -->
  <rect x="570" y="418" width="200" height="70" rx="5" fill="#FFFFFF"/>
  <rect x="570" y="418" width="200" height="4" rx="2" fill="#E94560"/>
  <text x="580" y="440" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="700"
        fill="#1A1A2E">4. Accuracy</text>
  <text x="580" y="460" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" fill="#555">
    Keep personal data accurate</text>
  <text x="580" y="473" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" fill="#555">
    and up to date</text>

  <!-- Row B -->
  <!-- P5 -->
  <rect x="30" y="500" width="170" height="70" rx="5" fill="#FFFFFF"/>
  <rect x="30" y="500" width="170" height="4" rx="2" fill="#1A1A2E"/>
  <text x="40" y="522" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="700"
        fill="#1A1A2E">5. Storage Limitation</text>
  <text x="40" y="542" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" fill="#555">
    Retain only as long as</text>
  <text x="40" y="555" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" fill="#555">
    necessary</text>

  <!-- P6 -->
  <rect x="210" y="500" width="170" height="70" rx="5" fill="#FFFFFF"/>
  <rect x="210" y="500" width="170" height="4" rx="2" fill="#1A1A2E"/>
  <text x="220" y="522" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="700"
        fill="#1A1A2E">6. Integrity &amp;</text>
  <text x="220" y="537" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="700"
        fill="#1A1A2E">    Confidentiality</text>
  <text x="220" y="554" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" fill="#555">
    Secure data against</text>
  <text x="220" y="566" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" fill="#555">
    unauthorised access</text>

  <!-- P7 -->
  <rect x="390" y="500" width="170" height="70" rx="5" fill="#FFFFFF"/>
  <rect x="390" y="500" width="170" height="4" rx="2" fill="#1A1A2E"/>
  <text x="400" y="522" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="700"
        fill="#1A1A2E">7. Accountability</text>
  <text x="400" y="542" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" fill="#555">
    Data controller is responsible</text>
  <text x="400" y="555" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" fill="#555">
    for compliance</text>

  <!-- P8 -->
  <rect x="570" y="500" width="200" height="70" rx="5" fill="#FFFFFF"/>
  <rect x="570" y="500" width="200" height="4" rx="2" fill="#1A1A2E"/>
  <text x="580" y="522" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="700"
        fill="#1A1A2E">8. Cross-Border Transfer</text>
  <text x="580" y="537" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="700"
        fill="#1A1A2E">    Restrictions</text>
  <text x="580" y="554" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" fill="#555">
    Transfer only to adequate</text>
  <text x="580" y="566" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" fill="#555">
    protection jurisdictions</text>

  <!-- Footer -->
  <text x="400" y="610" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11"
        fill="#999" text-anchor="middle">tupate.studio</text>
</svg>
